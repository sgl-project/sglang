# LiveCodeBench v6, thinking mode ON, temperature=0 (greedy/deterministic).
# Compute-budget note: full sweep (1,055 problems × 66 cells) is ~75
# GPU-hours at Qwen3-30B-A3B on 4×A100 (this pool).
#
# SECURITY: scoring EXECUTES model-generated Python in-process (with a
# per-test timeout). Only enable for trusted model outputs.
task: livecodebench_v6
variant: det

dataset:
  limit: 0
  start_date: null
  end_date: null

sampling:
  enable_thinking: true
  max_tokens: 8192
  temperature: 0              # greedy decoding
  top_p: 0.95
  top_k: 20
  presence_penalty: 1.5
  frequency_penalty: 0.5

calibration:
  num_prompts: 128            # LCB prompts are long; 128 is enough for KV sizing
  mc: 128
  gpu: 4                      # calib on GPU 4 (lcb pool 4-7)
  port: 31321
  nccl_port: 41321

sweep:
  mc_list: [8, 16, 32, 64, 128, 256]
  dynamic_variants: [hot0, hot20, hot40, hot60, hot80, hot100,
             thr32, thr64, thr128, thr256, thr512]
  gpus: [4, 5, 6, 7]          # split pool — supergpqa_det runs on 0-3
  num_prompts: 0

scoring:
  enabled: true
  extra_args: ["--timeout", "6"]
