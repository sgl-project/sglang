# Per-platform release codegen: prefer host-native target features so the
# auto-vectorized fused-pipeline inner loops emit AVX2/AVX-512/NEON as available.
# These flags are *only* applied for this bench crate (per-package .cargo config).

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=native"]

[target.x86_64-apple-darwin]
rustflags = ["-C", "target-cpu=native"]

[target.aarch64-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=native"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "target-cpu=apple-m1"]
