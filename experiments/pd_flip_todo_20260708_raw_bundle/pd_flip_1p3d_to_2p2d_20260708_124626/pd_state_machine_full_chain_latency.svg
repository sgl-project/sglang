<text x="864" y="640" class="detail">draining=false</text>
<rect x="70" y="800" width="1760" height="150" rx="8" fill="#f7f9fb" stroke="#c7d0db"/>
<text x="95" y="834" class="box-title">读图说明</text>
<text x="105" y="866" class="small">- 新增 waiting_queue 链路：扫描/筛选 -&gt; 构造 waiting manifest -&gt; 冻结源 waiting_queue -&gt; target transferred_held -&gt; commit 进入目标 waiting_queue -&gt; source release。</text>
<text x="105" y="892" class="small">- 图上的 HTTP action 使用 controller elapsed_seconds；KV transfer、held-&gt;adopt、source release 使用 worker timing_debug 推导。</text>
<text x="105" y="918" class="small">- waiting_manifest_count=0 时，图仍显示 waiting 阶段，但说明本次 trace 没制造出可迁移 waiting 请求。</text>
</svg>