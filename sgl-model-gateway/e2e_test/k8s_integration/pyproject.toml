[project]
name = "k8s-integration-tests"
version = "0.0.0"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27",
    "pytest>=8.0",
]

[tool.pytest.ini_options]
testpaths = ["."]
markers = [
    "slow: marks tests that wait for multiple reconciliation cycles (deselect with '-m \"not slow\"')",
]
