apiVersion: apps/v1
kind: Deployment
metadata:
  name: smg-gateway
  namespace: smg-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smg-gateway
  template:
    metadata:
      labels:
        app: smg-gateway
    spec:
      serviceAccountName: smg-gateway
      containers:
        - name: gateway
          image: smg-gateway:test
          imagePullPolicy: Never
          args:
            - "--service-discovery"
            - "--selector"
            - "app=fake-worker"
            - "--service-discovery-port"
            - "8000"
            - "--service-discovery-namespace"
            - "smg-test"
            - "--port"
            - "30000"
            - "--prometheus-port"
            - "29000"
            - "--disable-health-check"
            - "--worker-startup-timeout-secs"
            - "30"
            - "--log-level"
            - "debug"
          ports:
            - containerPort: 30000
              name: http
            - containerPort: 29000
              name: metrics
          # Use /liveness instead of /readiness for the K8s readiness probe
          # because /readiness returns 503 when no healthy workers are registered,
          # and with service discovery the gateway starts with 0 workers.
          readinessProbe:
            httpGet:
              path: /liveness
              port: 30000
            initialDelaySeconds: 3
            periodSeconds: 3
          livenessProbe:
            httpGet:
              path: /liveness
              port: 30000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: smg-gateway
  namespace: smg-test
spec:
  type: NodePort
  selector:
    app: smg-gateway
  ports:
    - name: http
      port: 30000
      targetPort: 30000
    - name: metrics
      port: 29000
      targetPort: 29000
