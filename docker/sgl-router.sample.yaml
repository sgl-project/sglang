# Sample sgl-router config for Docker / k8s users.
#
# Mount this at /etc/sgl-router/sgl-router.yaml inside the container, or
# point SGL_ROUTER_CONFIG at the on-host path.
#
# `Config` deserialization is documented in
# `experimental/sgl-router/src/config/types.rs`. Every section here maps
# 1:1 to a struct field; serde with `rename_all = "snake_case"` accepts
# YAML (this file) and TOML interchangeably.

server:
  host: "0.0.0.0"
  port: 8090

observability:
  # Anything `tracing-subscriber::EnvFilter` accepts:
  # "info", "warn", "sgl_router=debug", "info,sgl_router::policies=trace", ...
  log_level: "info"
  # "text" (human-readable) or "json" (one JSON record per line — for
  # k8s log aggregators / fluent-bit / vector).
  log_format: "json"

# Per-model routing config. The slim router uses one tokenizer per
# model_id; cache-aware-zmq scoring is keyed on the model's tokens.
models:
  - id: "Qwen/Qwen3-0.6B"
    tokenizer_path: "/etc/sgl-router/tokenizers/qwen3-0.6b.json"
    policy: "cache_aware_zmq"

# How worker URLs are discovered. Pick exactly one of:
#   - `static_file`  — periodically reload a TOML/YAML listing workers.
#   - `k8s`          — watch EndpointSlices for a label selector.
discovery:
  backend: "static_file"
  static_file:
    path: "/etc/sgl-router/workers.toml"
    poll_interval_ms: 1000

proxy:
  # Per-upstream HTTP request timeout. SGLang generation tails commonly
  # cross 60 s on long contexts; tighten this in e2e tests.
  request_timeout_secs: 60

active_load:
  # How long an in-flight request entry can live in the load registry
  # before the janitor reclaims it and surfaces 504 stale_request_expired
  # to the client. Production default 300 s.
  stale_request_timeout_secs: 300
