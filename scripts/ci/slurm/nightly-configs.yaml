# Nightly benchmark configurations for srt-slurm powered runners.
#
# Each top-level block defines one matrix dimension; per-recipe topology
# (prefill/decode TP, EP, workers, etc.) lives in the srt-slurm recipe YAML
# referenced by `config_file` and is not duplicated here.
#
# To add/remove concurrencies: edit conc-list for the relevant search-space entry.
# To add a new runner:         add a new top-level block and create a corresponding
#                              nightly-test-<runner>.yml workflow.
# Never edit workflow YAML files directly for these changes.

dsr1-fp8-gb200-dynamo-sglang:
  model: deepseek-ai/DeepSeek-R1-0528
  model-prefix: dsr1
  runner: gb200
  precision: fp8
  framework: dynamo-sglang
  multinode: true
  disagg: true
  seq-len-configs:
    - isl: 1024
      osl: 1024
      search-space:
        - conc-list: [1024, 2048, 4096, 6144]
          # https://github.com/NVIDIA/srt-slurm/blob/sglang-nightly-regression/recipes/gb200-fp8/1k1k/max-tpt.yaml
          config_file: recipes/gb200-fp8/1k1k/max-tpt.yaml

        - conc-list: [4096]
          # https://github.com/NVIDIA/srt-slurm/blob/sglang-nightly-regression/recipes/gb200-fp8/1k1k/ultra-tpt.yaml
          config_file: recipes/gb200-fp8/1k1k/ultra-tpt.yaml

dsr1-fp4-gb200-dynamo-sglang:
  model: nvidia/DeepSeek-R1-0528-NVFP4-v2
  model-prefix: dsr1
  runner: gb200
  precision: fp4
  framework: dynamo-sglang
  multinode: true
  disagg: true
  seq-len-configs:
    - isl: 1024
      osl: 1024
      search-space:
        - conc-list: [512, 2048, 4096, 8192]
          # https://github.com/NVIDIA/srt-slurm/blob/sglang-nightly-regression/recipes/gb200-fp4/1k1k/mid-curve.yaml
          config_file: recipes/gb200-fp4/1k1k/mid-curve.yaml

    # 8k1k is the eval-eligible seq-len. Server context-length is 9600 (vs
    # mid-curve's 2176), so gsm8k requests with ~1k input + ~1k output fit
    # comfortably without context-length tuning.
    - isl: 8192
      osl: 1024
      search-space:
        - conc-list: [2048]
          # https://github.com/NVIDIA/srt-slurm/blob/sglang-nightly-regression/recipes/gb200-fp4/8k1k/max-tpt.yaml
          config_file: recipes/gb200-fp4/8k1k/max-tpt.yaml

        # 5-node low-latency recipe — useful for fast eval validation via
        # workflow_dispatch with `eval_only: true`. Concs [4, 8] are below
        # MIN_EVAL_CONC=16 so the cron pipeline won't auto-mark it; max-tpt
        # remains the eval-eligible entry.
        - conc-list: [4, 8]
          # https://github.com/NVIDIA/srt-slurm/blob/sglang-nightly-regression/recipes/gb200-fp4/8k1k/low-latency.yaml
          config_file: recipes/gb200-fp4/8k1k/low-latency.yaml
