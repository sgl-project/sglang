# DSV4-Pro-FP8 1P1D — base topology + EAGLE MTP. Only the delta vs 1p1d.yaml.
extends: 1p1d.yaml

# MTP / EAGLE speculative decoding (NextN head from the base model, no external
# draft). Applied to both prefill and decode. Mirrors
# test/registered/amd/test_deepseek_v4_pro_fp4_mtp.py.
mtp:
  enabled: true
  num_steps: 3
  eagle_topk: 1
  num_draft_tokens: 4

bench:
  # Override the inherited sweep to drop conc256 for THIS leg only. At conc256
  # the disagg-decode SWA hybrid KV pool fills, the scheduler retracts running
  # requests, and the retract->offload_kv_cache path calls get_cpu_copy() which
  # is unimplemented for the SWA hybrid pool (raises NotImplementedError,
  # crashes the decode scheduler). Raising swa_full_tokens_ratio (tried up to
  # 0.3) does not help -- usage climbs to fill the larger budget and still
  # retracts. Until the upstream get_cpu_copy stub is implemented, cap at 128.
  # (num_prompts_factor / random_range_ratio / accuracy inherit from 1p1d.yaml.)
  concurrencies: [1, 8, 16, 32, 64, 128]
