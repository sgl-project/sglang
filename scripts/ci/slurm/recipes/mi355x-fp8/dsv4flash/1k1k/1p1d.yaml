# MI355X DeepSeek-V4-Flash-FP8 2-node 1P1D disaggregation recipe (base).
#
# Consumed by:
#   * scripts/ci/slurm/process_result.py reads `resources` and
#     `backend.sglang_config` (TP/EP/DP + worker counts) for the summary table.
#   * scripts/ci/slurm/launch_mi355x.sh reads `runtime`, `bench`, `model`, `mtp`.
#
# The DP8/EP8 + MTP variants in this dir `extends:` this file and override only
# their delta, so shared config lives here once.

resources:
  prefill_workers: 1
  decode_workers: 1

backend:
  sglang_config:
    prefill:
      tensor-parallel-size: 8
      expert-parallel-size: 1
      data-parallel-size: 1
    decode:
      tensor-parallel-size: 8
      expert-parallel-size: 1
      data-parallel-size: 1

# Model-specific docker env + sglang server args. The launcher writes these
# verbatim (via model_flags.sh) so DSV4 quirks live here, not in the launcher.
# Each server arg + its value is a SEPARATE list item (shlex.quote per token).
# See test/registered/amd/test_deepseek_v4_flash_fp8.py.
model:
  env:
    SGLANG_DEFAULT_THINKING: 1
    SGLANG_DSV4_REASONING_EFFORT: max
    SGLANG_OPT_DEEPGEMM_HC_PRENORM: false
    SGLANG_USE_AITER: 1
    SGLANG_USE_ROCM700A: 1
    SGLANG_OPT_USE_FUSED_COMPRESS: true
    SGLANG_OPT_USE_FUSED_COMPRESS_TRITON: true
    SGLANG_HACK_FLASHMLA_BACKEND: unified_kv_triton
    SGLANG_OPT_FP8_WO_A_GEMM: false
    SGLANG_OPT_USE_JIT_INDEXER_METADATA: false
    SGLANG_OPT_USE_TOPK_V2: false
    SGLANG_OPT_USE_AITER_INDEXER: true
    SGLANG_OPT_USE_TILELANG_INDEXER: false
    SGLANG_OPT_USE_TILELANG_MHC_PRE: false
    SGLANG_OPT_USE_TILELANG_MHC_POST: false
    SGLANG_FP8_PAGED_MQA_LOGITS_TORCH: 1
    SGLANG_OPT_USE_MULTI_STREAM_OVERLAP: false
    SGLANG_ROCM_USE_MULTI_STREAM: false
    AITER_BF16_FP8_MOE_BOUND: 0
    SGLANG_DSV4_FP4_EXPERTS: false   # fp8 weights
  server_args:
    - --disable-shared-experts-fusion
    - --tool-call-parser
    - deepseekv4
    - --reasoning-parser
    - deepseek-v4

runtime:
  image: lmsysorg/sglang-rocm:v0.5.13.post1-rocm720-mi35x-20260623
  attention_backend: dsv4
  # RoCE HCAs MORI uses for cross-node KV transfer.
  ib_devices: rdma0,rdma1,rdma2,rdma3
  prefill_port: 30025
  decode_port: 30026
  prefill_bootstrap_port: 8998
  decode_bootstrap_port: 9001
  lb_port: 8000
  mem_fraction_static: 0.90
  page_size: 256
  max_running_requests: 256
  chunked_prefill_size: 8192
  swa_full_tokens_ratio: 0.1

bench:
  # bench_serving --max-concurrency sweep; one result JSON per concurrency.
  concurrencies: [1, 8, 16, 32, 64, 128, 256]
  num_prompts_factor: 4      # num-prompts = concurrency * factor
  random_range_ratio: 1.0

  # Correctness gate run through the PD path after the perf sweep. Mirrors the
  # single-node registered test test/registered/amd/test_deepseek_v4_flash_fp8.py
  # (full GSM8K, 8-shot, accuracy > 0.91). A regression here fails the nightly
  # even when throughput looks fine ("fast but wrong").
  accuracy:
    enabled: true
    num_shots: 8
    num_questions: 1319    # full GSM8K test set
    threshold: 0.91
