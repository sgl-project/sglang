# DSV4-Flash-FP8 1P1D — DP-attention 8 + narrow EP8 + EAGLE MTP. Delta only;
# deep-merge keeps tensor-parallel-size: 8 from 1p1d.yaml.
extends: 1p1d.yaml

backend:
  sglang_config:
    prefill:
      expert-parallel-size: 8
      data-parallel-size: 8
    decode:
      expert-parallel-size: 8
      data-parallel-size: 8

mtp:
  enabled: true
  num_steps: 3
  eagle_topk: 1
  num_draft_tokens: 4
