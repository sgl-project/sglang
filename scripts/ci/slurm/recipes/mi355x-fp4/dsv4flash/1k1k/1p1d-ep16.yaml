# MI355X DeepSeek-V4-Flash FP4 4-node 1P1D disaggregation recipe — wide EP16.
#
# One prefill engine spans 2 nodes + one decode engine spans 2 nodes (still 1P1D,
# 4 nodes total). TP/EP/DP=16 => nodes-per-engine = ceil(16/8) = 2, so the launcher
# emits cross-node --nnodes/--node-rank/--dist-init-addr for each engine.
#
# Consumed by:
#   * scripts/ci/slurm/process_result.py reads `resources` and
#     `backend.sglang_config` (TP/EP/DP + worker counts) for the summary table.
#   * scripts/ci/slurm/launch_mi355x.sh reads `runtime`, `bench`, and `mtp`.

resources:
  prefill_workers: 1
  decode_workers: 1

backend:
  sglang_config:
    prefill:
      tensor-parallel-size: 16
      expert-parallel-size: 16
      data-parallel-size: 16
    decode:
      tensor-parallel-size: 16
      expert-parallel-size: 16
      data-parallel-size: 16

runtime:
  image: lmsysorg/sglang-rocm:v0.5.15-rocm720-mi35x-20260713
  attention_backend: dsv4
  # spur ionic RoCE HCAs (8/node).
  ib_devices: ionic_0,ionic_1,ionic_2,ionic_3,ionic_4,ionic_5,ionic_6,ionic_7
  # Wide-EP MoE all-to-all backend (cross-node expert dispatch/combine).
  moe_a2a_backend: mori
  # KV P->D transfer backend.
  kv_transfer_backend: mooncake
  # Cross-node torch-distributed NIC (spur internal 10.128 network).
  dist_socket_ifname: eth1
  prefill_port: 30025
  decode_port: 30026
  prefill_bootstrap_port: 8998
  decode_bootstrap_port: 9001
  lb_port: 8000
  mem_fraction_static: 0.90
  page_size: 256
  max_running_requests: 256
  max_total_tokens: 8551168
  chunked_prefill_size: 8192
  swa_full_tokens_ratio: 0.1

bench:
  # bench_serving --max-concurrency sweep; one result JSON per concurrency.
  concurrencies: [1, 8, 16, 32, 64, 128, 256]
  num_prompts_factor: 4      # num-prompts = concurrency * factor
  random_range_ratio: 1.0

  # Correctness gate run through the PD path before the perf sweep (full GSM8K,
  # 8-shot, accuracy > 0.91). A regression here fails the nightly even when
  # throughput looks fine ("fast but wrong").
  accuracy:
    enabled: true
    num_shots: 8
    num_questions: 1319    # full GSM8K test set
    threshold: 0.91
