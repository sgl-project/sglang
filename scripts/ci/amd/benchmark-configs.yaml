  #   framework: sglang
  #   model: deepseek-ai/DeepSeek-V4-Pro
  #   runs-on: linux-mi35x-gpu-8
  #   variants: [base, mtp]
  #   tp: 8
  #   dp-attn: true
  #   conc-list: "64 256 1024"
  #   env: { ... same as above ... }
  #   server-args: >- ... same ...
  #   mtp-server-args: >-
  #     --speculative-algorithm EAGLE --speculative-num-steps 2
  #     --speculative-eagle-topk 1 --speculative-num-draft-tokens 3
