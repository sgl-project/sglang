          " || TEST_EXIT_CODE=$?
          echo "$(<github_summary.md)" >> $GITHUB_STEP_SUMMARY || true
          exit ${TEST_EXIT_CODE:-0}

      - name: Cleanup container
        if: always()
        run: |
          docker run --rm -v "${{ github.workspace }}:/w" busybox:latest \
