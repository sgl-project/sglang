name: PR Test - JIT Kernel

on:
  workflow_call:
    inputs:
      jit_kernel:
        required: true
        type: string
      pr_head_sha:
        required: false
        type: string
        default: ''
      git_ref:
        required: false
        type: string
        default: ''
      target_stage:
        required: false
        type: string
        default: ''
      test_parallel_dispatch:
        required: false
        type: string
        default: 'false'

# TEMP: env block removed to test whether caller env vars propagate to called workflows
# env:
#   SGLANG_IS_IN_CI: true
#   SGLANG_CUDA_COREDUMP: "1"
#   SGLANG_JIT_DEEPGEMM_FAST_WARMUP: true
#   SGLANG_PR_TEST_BYPASS_MAINTENANCE_ON_MAIN: ${{ github.ref == 'refs/heads/main' && 'true' || 'false' }}

jobs:
  jit-kernel-unit-test:
    if: |
      github.event_name != 'schedule' &&
      inputs.test_parallel_dispatch != 'true' &&
      !inputs.target_stage
    runs-on: 1-gpu-h100
    timeout-minutes: 240
    steps:
      - name: "[DEBUG] Test env var inheritance from caller"
        run: |
          echo "=== Testing whether caller workflow env vars propagate ==="
          echo "SGLANG_IS_IN_CI=${SGLANG_IS_IN_CI:-UNSET}"
          echo "SGLANG_CUDA_COREDUMP=${SGLANG_CUDA_COREDUMP:-UNSET}"
          echo "SGLANG_JIT_DEEPGEMM_FAST_WARMUP=${SGLANG_JIT_DEEPGEMM_FAST_WARMUP:-UNSET}"
          echo "SGLANG_PR_TEST_BYPASS_MAINTENANCE_ON_MAIN=${SGLANG_PR_TEST_BYPASS_MAINTENANCE_ON_MAIN:-UNSET}"
          echo "=== If all show UNSET, env vars are NOT inherited ==="

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.pr_head_sha || inputs.git_ref || github.sha }}

      - uses: ./.github/actions/check-maintenance
        with:
          github-token: ${{ github.token }}

      - name: Install dependencies
        timeout-minutes: 20
        run: |
          bash scripts/ci/cuda/ci_install_dependency.sh diffusion

      - name: Run test
        timeout-minutes: 30
        run: |
          cd python/sglang/jit_kernel
          pytest tests/

  jit-kernel-unit-test-nightly:
    if: |
      github.event_name == 'schedule' &&
      inputs.jit_kernel == 'true'
    runs-on: 1-gpu-h100
    timeout-minutes: 240
    env:
      SGLANG_JIT_KERNEL_RUN_FULL_TESTS: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.pr_head_sha || inputs.git_ref || github.sha }}

      - uses: ./.github/actions/check-maintenance
        with:
          github-token: ${{ github.token }}

      - name: Install dependencies
        timeout-minutes: 20
        run: |
          bash scripts/ci/cuda/ci_install_dependency.sh

      - name: Run full nightly test
        timeout-minutes: 60
        run: |
          cd python/sglang/jit_kernel
          pytest tests/

  jit-kernel-benchmark-test:
    if: |
      github.event_name != 'schedule' &&
      inputs.test_parallel_dispatch != 'true' &&
      !inputs.target_stage
    runs-on: 1-gpu-h100
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.pr_head_sha || inputs.git_ref || github.sha }}

      - uses: ./.github/actions/check-maintenance
        with:
          github-token: ${{ github.token }}

      - name: Install dependencies
        timeout-minutes: 20
        run: |
          bash scripts/ci/cuda/ci_install_dependency.sh diffusion

      - name: Run benchmark tests
        timeout-minutes: 45
        run: |
          cd python/sglang/jit_kernel/benchmark
          echo "Running jit-kernel benchmark tests in CI mode..."

          failures=()

          for bench_file in bench_*.py; do
            echo "Testing $bench_file..."
            if ! timeout 120 python3 "$bench_file"; then
              failures+=("$bench_file")
            fi
            echo "Completed $bench_file"
            echo "---"
          done

          if [ ${#failures[@]} -ne 0 ]; then
            echo "The following benchmark tests failed: ${failures[*]}"
            exit 1
          fi

          echo "All jit-kernel benchmark tests completed successfully!"
