name: Release Docker Images Nightly Miles ROCm7.0 (AMD)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true

jobs:
  publish:
    if: github.repository == 'sgl-project/sglang'
    runs-on: amd-docker-scale
    environment: "prod"
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: rocm-mi300
            rocm_tag: rocm700-mi30x
    steps:
      - name: Checkout miles repository
        uses: actions/checkout@v4
        with:
          repository: radixark/miles
          ref: main
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build.py deps
        run: pip install typer

      - name: Login to Docker Hub (AMD)
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_AMD_USERNAME }}
          password: ${{ secrets.DOCKERHUB_AMD_TOKEN }}

      - name: Build and push miles image via build.py
        run: python3 docker/build.py --variant ${{ matrix.variant }} --image-tag dev --push

  push_local_registry:
    if: ${{ !cancelled() && github.repository == 'sgl-project/sglang' }}
    runs-on: linux-mi300-1gpu-sglang
    environment: "prod"
    needs: publish
    strategy:
      fail-fast: false
      matrix:
        include:
          - rocm_tag: rocm700-mi30x
    steps:
      - name: Login to Docker Hub (AMD)
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_AMD_USERNAME }}
          password: ${{ secrets.DOCKERHUB_AMD_TOKEN }}

      - name: Mirror miles image to local registry
        run: |
          tag="miles-${{ matrix.rocm_tag }}"
          src="rocm/sgl-dev:${tag}"
          dst="10.245.143.50:5000/rocm/sgl-dev:${tag}"
          docker pull "${src}"
          docker tag "${src}" "${dst}"
          docker push "${dst}"
