name: Diffusion CI Ground Truth Generation

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to checkout'
        required: false
        default: ''
        type: string
      case_ids:
        description: 'Specific case IDs to run (space-separated, optional)'
        required: false
        default: ''
        type: string
      output_name:
        description: 'Custom output folder name (also used for artifact names and publish target dir). Leave empty to use defaults.'
        required: false
        default: ''
        type: string
      kernel_artifact_run_id:
        description: "Optional sgl-kernel wheel source: GitHub Actions run ID of a pr-test.yml run on the SAME commit as 'ref' that uploaded wheel-python3.10-cuda13.0. Use only when this branch's torch/ABI change makes the PyPI sglang-kernel wheel incompatible. Find it under Actions > pr-test; artifacts expire after 90 days."
        required: false
        default: ''
        type: string
      ci_data_source_repo:
        description: 'Optional source repo for syncing non-generated ci-data files, e.g. mickqian/sglang-ci-data-upstream-pr.'
        required: false
        default: ''
        type: string
      ci_data_source_ref:
        description: 'Optional source ref for syncing non-generated ci-data files.'
        required: false
        default: ''
        type: string
      ci_data_sync_preset:
        description: 'Optional ci-data file sync preset.'
        required: false
        default: ''
        type: string
      ci_data_sync_only:
        description: 'Skip GT generation and only sync ci-data files from ci_data_source_repo/ref.'
        required: false
        default: false
        type: boolean

concurrency:
  group: diffusion-ci-gt-gen-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

env:
  SGLANG_IS_IN_CI: true
  SGLANG_CUDA_COREDUMP: "1"
  OUTPUT_NAME: ${{ inputs.output_name || 'diffusion-ci-outputs' }}

jobs:
  compute-diffusion-partitions:
    if: github.repository == 'sgl-project/sglang' && !inputs.ci_data_sync_only
    runs-on: ubuntu-latest
    outputs:
      matrix-1gpu: ${{ steps.compute.outputs.matrix-1gpu }}
      matrix-2gpu: ${{ steps.compute.outputs.matrix-2gpu }}
      matrix-b200: ${{ steps.compute.outputs.matrix-b200 }}
      partition-count-1gpu: ${{ steps.compute.outputs['partition-count-1gpu'] }}
      partition-count-2gpu: ${{ steps.compute.outputs['partition-count-2gpu'] }}
      partition-count-b200: ${{ steps.compute.outputs['partition-count-b200'] }}
      plan-1gpu: ${{ steps.compute.outputs.plan-1gpu }}
      plan-2gpu: ${{ steps.compute.outputs.plan-2gpu }}
      plan-b200: ${{ steps.compute.outputs.plan-b200 }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Compute partitions
        id: compute
        run: |
          python scripts/ci/utils/diffusion/compute_diffusion_partitions.py \
            --min-time 1200 \
            --target-time 1800 \
            --max-time 2400 \
            --max-partitions 10 \
            --parametrized-only

  multimodal-diffusion-gen-1gpu:
    needs: compute-diffusion-partitions
    if: |
      needs.compute-diffusion-partitions.result == 'success' &&
      needs.compute-diffusion-partitions.outputs.matrix-1gpu != '{"include":[]}'
    runs-on: 1-gpu-h100
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.compute-diffusion-partitions.outputs.matrix-1gpu) }}
    timeout-minutes: 150
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Prepare sgl-kernel/dist for prebuilt wheel
        if: inputs.kernel_artifact_run_id != ''
        run: |
          ls -alh sgl-kernel/dist || true
          rm -rf sgl-kernel/dist/* || true

      - name: Download prebuilt sgl-kernel wheel
        if: inputs.kernel_artifact_run_id != ''
        uses: actions/download-artifact@v4
        with:
          path: sgl-kernel/dist/
          merge-multiple: true
          name: wheel-python3.10-cuda13.0
          run-id: ${{ inputs.kernel_artifact_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          CUSTOM_BUILD_SGL_KERNEL="${{ inputs.kernel_artifact_run_id != '' && 'true' || 'false' }}" \
            bash scripts/ci/cuda/ci_install_dependency.sh diffusion

      - name: Generate outputs
        env:
          RUNAI_STREAMER_MEMORY_LIMIT: 0
          PARTITION_PLAN_JSON: ${{ needs.compute-diffusion-partitions.outputs.plan-1gpu }}
        run: |
          cd python
          python -m sglang.multimodal_gen.test.scripts.gen_diffusion_ci_outputs \
            --suite 1-gpu \
            --partition-id ${{ matrix.part }} \
            --total-partitions ${{ needs.compute-diffusion-partitions.outputs['partition-count-1gpu'] }} \
            --partition-plan-json "$PARTITION_PLAN_JSON" \
            --out-dir ./${{ env.OUTPUT_NAME }} \
            ${{ inputs.case_ids != '' && format('--case-ids {0}', inputs.case_ids) || '' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUTPUT_NAME }}-1gpu-part${{ matrix.part }}
          path: python/${{ env.OUTPUT_NAME }}
          retention-days: 7

      - name: Publish GT images to sglang-bot/sglang-ci-data
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_FOR_NIGHTLY_CI_DATA }}
        run: |
          python scripts/ci/utils/diffusion/publish_diffusion_gt.py \
            --source-dir python/${{ env.OUTPUT_NAME }} \
            ${{ inputs.output_name != '' && format('--target-dir diffusion-ci/{0}', inputs.output_name) || '' }}

  multimodal-diffusion-gen-2gpu:
    needs: compute-diffusion-partitions
    if: |
      needs.compute-diffusion-partitions.result == 'success' &&
      needs.compute-diffusion-partitions.outputs.matrix-2gpu != '{"include":[]}'
    runs-on: 2-gpu-h100
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.compute-diffusion-partitions.outputs.matrix-2gpu) }}
    timeout-minutes: 150
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Prepare sgl-kernel/dist for prebuilt wheel
        if: inputs.kernel_artifact_run_id != ''
        run: |
          ls -alh sgl-kernel/dist || true
          rm -rf sgl-kernel/dist/* || true

      - name: Download prebuilt sgl-kernel wheel
        if: inputs.kernel_artifact_run_id != ''
        uses: actions/download-artifact@v4
        with:
          path: sgl-kernel/dist/
          merge-multiple: true
          name: wheel-python3.10-cuda13.0
          run-id: ${{ inputs.kernel_artifact_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          CUSTOM_BUILD_SGL_KERNEL="${{ inputs.kernel_artifact_run_id != '' && 'true' || 'false' }}" \
            bash scripts/ci/cuda/ci_install_dependency.sh diffusion

      - name: Generate outputs
        env:
          RUNAI_STREAMER_MEMORY_LIMIT: 0
          PARTITION_PLAN_JSON: ${{ needs.compute-diffusion-partitions.outputs.plan-2gpu }}
        run: |
          cd python
          python -m sglang.multimodal_gen.test.scripts.gen_diffusion_ci_outputs \
            --suite 2-gpu \
            --partition-id ${{ matrix.part }} \
            --total-partitions ${{ needs.compute-diffusion-partitions.outputs['partition-count-2gpu'] }} \
            --partition-plan-json "$PARTITION_PLAN_JSON" \
            --out-dir ./${{ env.OUTPUT_NAME }} \
            ${{ inputs.case_ids != '' && format('--case-ids {0}', inputs.case_ids) || '' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUTPUT_NAME }}-2gpu-part${{ matrix.part }}
          path: python/${{ env.OUTPUT_NAME }}
          retention-days: 7

      - name: Publish GT images to sglang-bot/sglang-ci-data
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_FOR_NIGHTLY_CI_DATA }}
        run: |
          python scripts/ci/utils/diffusion/publish_diffusion_gt.py \
            --source-dir python/${{ env.OUTPUT_NAME }} \
            ${{ inputs.output_name != '' && format('--target-dir diffusion-ci/{0}', inputs.output_name) || '' }}

  multimodal-diffusion-gen-b200:
    needs: compute-diffusion-partitions
    if: |
      needs.compute-diffusion-partitions.result == 'success' &&
      needs.compute-diffusion-partitions.outputs.matrix-b200 != '{"include":[]}'
    runs-on: 4-gpu-b200
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.compute-diffusion-partitions.outputs.matrix-b200) }}
    timeout-minutes: 240
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Prepare sgl-kernel/dist for prebuilt wheel
        if: inputs.kernel_artifact_run_id != ''
        run: |
          ls -alh sgl-kernel/dist || true
          rm -rf sgl-kernel/dist/* || true

      - name: Download prebuilt sgl-kernel wheel
        if: inputs.kernel_artifact_run_id != ''
        uses: actions/download-artifact@v4
        with:
          path: sgl-kernel/dist/
          merge-multiple: true
          name: wheel-python3.10-cuda13.0
          run-id: ${{ inputs.kernel_artifact_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          CUSTOM_BUILD_SGL_KERNEL="${{ inputs.kernel_artifact_run_id != '' && 'true' || 'false' }}" \
            bash scripts/ci/cuda/ci_install_dependency.sh diffusion

      - name: Generate outputs
        env:
          RUNAI_STREAMER_MEMORY_LIMIT: 0
          PARTITION_PLAN_JSON: ${{ needs.compute-diffusion-partitions.outputs.plan-b200 }}
        run: |
          cd python
          python -m sglang.multimodal_gen.test.scripts.gen_diffusion_ci_outputs \
            --suite 1-gpu-b200 \
            --partition-id ${{ matrix.part }} \
            --total-partitions ${{ needs.compute-diffusion-partitions.outputs['partition-count-b200'] }} \
            --partition-plan-json "$PARTITION_PLAN_JSON" \
            --out-dir ./${{ env.OUTPUT_NAME }} \
            ${{ inputs.case_ids != '' && format('--case-ids {0}', inputs.case_ids) || '' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUTPUT_NAME }}-b200-part${{ matrix.part }}
          path: python/${{ env.OUTPUT_NAME }}
          retention-days: 7

      - name: Publish GT images to sglang-bot/sglang-ci-data
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_FOR_NIGHTLY_CI_DATA }}
        run: |
          python scripts/ci/utils/diffusion/publish_diffusion_gt.py \
            --source-dir python/${{ env.OUTPUT_NAME }} \
            ${{ inputs.output_name != '' && format('--target-dir diffusion-ci/{0}', inputs.output_name) || '' }}

  sync-ci-data-files:
    if: |
      always() &&
      github.repository == 'sgl-project/sglang' &&
      inputs.ci_data_source_repo != '' &&
      inputs.ci_data_source_ref != '' &&
      inputs.ci_data_sync_preset == 'ltx23-one-stage-ti2v'
    needs:
      - compute-diffusion-partitions
      - multimodal-diffusion-gen-1gpu
      - multimodal-diffusion-gen-2gpu
      - multimodal-diffusion-gen-b200
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Checkout ci-data source files
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.ci_data_source_repo }}
          ref: ${{ inputs.ci_data_source_ref }}
          path: ci-data-source
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            diffusion-ci/consistency_gt/ltx_2.3_one_stage_ti2v_2gpu_frame_0.png
            diffusion-ci/consistency_gt/ltx_2.3_one_stage_ti2v_2gpu_frame_mid.png
            diffusion-ci/consistency_gt/ltx_2.3_one_stage_ti2v_2gpu_frame_last.png
            diffusion-ci/consistency_gt/official_generated/ltx_2.3_one_stage_ti2v_2gpu_frame_0.png
            diffusion-ci/consistency_gt/official_generated/ltx_2.3_one_stage_ti2v_2gpu_frame_mid.png
            diffusion-ci/consistency_gt/official_generated/ltx_2.3_one_stage_ti2v_2gpu_frame_last.png
            diffusion-ci/consistency_gt/official_generated/ltx_2.3_two_stage_t2v_2gpus_2gpu_frame_0.png
            diffusion-ci/consistency_gt/official_generated/ltx_2.3_two_stage_t2v_2gpus_2gpu_frame_mid.png
            diffusion-ci/consistency_gt/official_generated/ltx_2.3_two_stage_t2v_2gpus_2gpu_frame_last.png
            diffusion-ci/repro_scripts/gen_official_ltx23.py
            diffusion-ci/repro_scripts/run_official_ltx23.sh
            diffusion-ci/repro_scripts/official_repro_case_map.json

      - name: Build ci-data path list
        run: |
          cat > /tmp/ci-data-paths.txt <<'EOF'
          diffusion-ci/consistency_gt/ltx_2.3_one_stage_ti2v_2gpu_frame_0.png
          diffusion-ci/consistency_gt/ltx_2.3_one_stage_ti2v_2gpu_frame_mid.png
          diffusion-ci/consistency_gt/ltx_2.3_one_stage_ti2v_2gpu_frame_last.png
          diffusion-ci/consistency_gt/official_generated/ltx_2.3_one_stage_ti2v_2gpu_frame_0.png
          diffusion-ci/consistency_gt/official_generated/ltx_2.3_one_stage_ti2v_2gpu_frame_mid.png
          diffusion-ci/consistency_gt/official_generated/ltx_2.3_one_stage_ti2v_2gpu_frame_last.png
          diffusion-ci/consistency_gt/official_generated/ltx_2.3_two_stage_t2v_2gpus_2gpu_frame_0.png
          diffusion-ci/consistency_gt/official_generated/ltx_2.3_two_stage_t2v_2gpus_2gpu_frame_mid.png
          diffusion-ci/consistency_gt/official_generated/ltx_2.3_two_stage_t2v_2gpus_2gpu_frame_last.png
          diffusion-ci/repro_scripts/gen_official_ltx23.py
          diffusion-ci/repro_scripts/run_official_ltx23.sh
          diffusion-ci/repro_scripts/official_repro_case_map.json
          EOF

      - name: Publish ci-data files to sglang-bot/sglang-ci-data
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_FOR_NIGHTLY_CI_DATA }}
          COMMIT_MESSAGE: 'diffusion-ci: refresh LTX2.3 one-stage TI2V GT and repro scripts [automated]'
        run: |
          python scripts/ci/utils/diffusion/publish_ci_data_files.py \
            --source-root ci-data-source \
            --paths-file /tmp/ci-data-paths.txt \
            --commit-message "$COMMIT_MESSAGE"
