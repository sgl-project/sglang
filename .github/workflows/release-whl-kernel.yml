name: Release SGLang Kernels

on:
  push:
    branches:
      - main
    paths:
      - sgl-kernel/python/sgl_kernel/version.py
  workflow_dispatch:
    inputs:
      target:
        type: choice
        description: 'Build target'
        required: false
        default: 'all'
        options:
          - 'all'
          - 'cu129'
          - 'cu130'
          - 'rocm700'
          - 'rocm720'
          - 'musa43'
      tag_name:
        description: "Version number, must be in the form of vX.Y.Z (e.g. v0.4.0)"
        type: string
        required: false
      pr_number:
        description: "PR number to build from (e.g. 12345)"
        type: string
        required: false

concurrency:
  group: release-sglang-kernels-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # cu130 is the PyPI-released variant; cu129 wheels are published only to the
  # sgl-project/whl index (consumed via `pip install ...+cu129` for the legacy
  # cuda 12.9 path), not to PyPI.
  build-cu129-matrix:
    if: |
      github.repository == 'sgl-project/sglang' &&
      (github.event_name == 'push' || github.event.inputs.target == 'all' || github.event.inputs.target == 'cu129')
    strategy:
      matrix:
        python-version: ["3.10"]
        cuda-version: ["12.9"]
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            runner: x64-kernel-build-node
          - arch: aarch64
            runner: arm-kernel-build-node
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: ./.github/actions/prepare-kernel-build-workspace
        with:
          python-version: ${{ matrix.python-version }}
          pr-number: ${{ inputs.pr_number }}

      - name: Build wheels
        run: |
          cd sgl-kernel
          chmod +x ./build.sh
          ./build.sh "${{ matrix.python-version }}" "${{ matrix.cuda-version }}" ${{ matrix.arch == 'aarch64' && 'aarch64' || '' }}
        env:
          BUILD_JOBS: 64
          NVCC_THREADS: 8

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheel-python${{ matrix.python-version }}-cuda${{ matrix.cuda-version }}${{ matrix.arch == 'aarch64' && '-aarch64' || '' }}
          path: sgl-kernel/dist/*

  build-cu130-matrix:
    if: |
      github.repository == 'sgl-project/sglang' &&
      (github.event_name == 'push' || github.event.inputs.target == 'all' || github.event.inputs.target == 'cu130')
    strategy:
      matrix:
        python-version: ["3.10"]
        cuda-version: ["13.0"]
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            runner: x64-kernel-build-node
          - arch: aarch64
            runner: arm-kernel-build-node
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: ./.github/actions/prepare-kernel-build-workspace
        with:
          python-version: ${{ matrix.python-version }}
          pr-number: ${{ inputs.pr_number }}

      - name: Build wheels
        run: |
          cd sgl-kernel
          chmod +x ./build.sh
          ./build.sh "${{ matrix.python-version }}" "${{ matrix.cuda-version }}" ${{ matrix.arch == 'aarch64' && 'aarch64' || '' }}
        env:
          BUILD_JOBS: 64
          NVCC_THREADS: 8

      - name: Strip +cu130 local version for PyPI upload
        working-directory: sgl-kernel
        run: |
          set -eux
          pip install wheel
          mkdir -p dist-pypi
          for w in dist/*.whl; do
            tmp=$(mktemp -d)
            python3 -m wheel unpack "$w" --dest "$tmp"
            unpacked=$(find "$tmp" -mindepth 1 -maxdepth 1 -type d | head -1)
            info=$(find "$unpacked" -maxdepth 1 -type d -name "*.dist-info" | head -1)
            meta="$info/METADATA"
            orig=$(grep '^Version:' "$meta" | head -1 | sed 's/^Version:[[:space:]]*//')
            new=$(echo "$orig" | sed 's/+cu[0-9]\+$//')
            if [ "$orig" != "$new" ]; then
              sed -i "s/^Version:.*/Version: ${new}/" "$meta"
              old_base=$(basename "$info")
              new_base="${old_base/${orig}/${new}}"
              mv "$info" "$(dirname "$info")/${new_base}"
            fi
            python3 -m wheel pack "$unpacked" --dest-dir dist-pypi
            rm -rf "$tmp"
          done
          ls -lh dist-pypi/

      - name: Upload to PyPI
        working-directory: sgl-kernel
        run: |
          pip install twine
          python3 -m twine upload --skip-existing dist-pypi/* -u __token__ -p ${{ secrets.PYPI_TOKEN_SGLANG_KERNEL }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheel-python${{ matrix.python-version }}-cuda${{ matrix.cuda-version }}${{ matrix.arch == 'aarch64' && '-aarch64' || '' }}
          path: sgl-kernel/dist/*

  build-rocm-matrix:
    if: |
      github.repository == 'sgl-project/sglang' &&
      (github.event_name == 'push' || github.event.inputs.target == 'all' || github.event.inputs.target == 'rocm700' || github.event.inputs.target == 'rocm720')
    runs-on: amd-docker-scale
    strategy:
      matrix:
        python-version: ["3.10"]
        rocm-version: ["700", "720"]
    steps:
      - uses: ./.github/actions/prepare-kernel-build-workspace
        with:
          python-version: ${{ matrix.python-version }}
          pr-number: ${{ inputs.pr_number }}

      - name: Build wheels
        run: |
          cp 3rdparty/amd/wheel/sgl-kernel/* sgl-kernel/
          cd sgl-kernel
          chmod +x ./build_rocm.sh
          ./build_rocm.sh "${{ matrix.rocm-version }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheel-python${{ matrix.python-version }}-rocm${{ matrix.rocm-version }}
          path: sgl-kernel/dist/*

  build-musa43:
    if: |
      github.repository == 'sgl-project/sglang' &&
      (github.event_name == 'push' || github.event.inputs.target == 'all' || github.event.inputs.target == 'musa43')
    runs-on: kernel-build-node-musa
    strategy:
      matrix:
        python-version: ["3.10"]
        musa-version: ["43"]
    steps:
      - uses: ./.github/actions/prepare-kernel-build-workspace
        with:
          pr-number: ${{ inputs.pr_number }}

      - name: Clean stale torchada extension locks
        run: |
          if ps -eo comm=,args= | grep -E '(^|[[:space:]])(mcc|ninja)([[:space:]]|$)|torchada_cpp_ops' | grep -v grep; then
            echo "::error::Active torchada extension build detected; refusing to remove lock files"
            exit 1
          fi
          find "${HOME}/.cache/torch_extensions" \
            -path '*/torchada_cpp_ops/lock' \
            -type f \
            -print \
            -delete 2>/dev/null || true

      - name: Build wheels
        run: |
          cd sgl-kernel
          mv pyproject_musa.toml pyproject.toml
          python setup_musa.py sdist bdist_wheel

      - name: Rename MUSA wheels
        run: |
          bash scripts/ci/musa/rename_wheels_musa.sh ${{ matrix.musa-version }} sgl-kernel/dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheel-python${{ matrix.python-version }}-musa${{ matrix.musa-version }}
          path: sgl-kernel/dist/*

  # Single tail job: aggregate all backend wheels, publish them to the wheel
  # repo's GH Release once, then regenerate every backend's pip index in one
  # `git clone -> commit -> push`. Replaces the per-backend release-* jobs
  # that each cloned/pushed the index repo and could race on the push.
  release-and-update-index:
    needs: [build-cu129-matrix, build-cu130-matrix, build-rocm-matrix, build-musa43]
    if: |
      !cancelled() && (
        needs.build-cu129-matrix.result == 'success' ||
        needs.build-cu130-matrix.result == 'success' ||
        needs.build-rocm-matrix.result == 'success' ||
        needs.build-musa43.result == 'success'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.pr_number && format('refs/pull/{0}/head', inputs.pr_number) || '' }}

      - name: Resolve tag name
        id: tag
        env:
          OVERRIDE_TAG: ${{ inputs.tag_name }}
        run: |
          if [ -n "$OVERRIDE_TAG" ]; then
            echo "value=$OVERRIDE_TAG" >> "$GITHUB_OUTPUT"
          else
            ver=$(cut -d'"' -f2 sgl-kernel/python/sgl_kernel/version.py)
            echo "value=v${ver}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: sgl-kernel/dist/
          merge-multiple: true
          pattern: wheel-*

      - name: Verify wheels were downloaded
        run: |
          set -euo pipefail
          count=$(find sgl-kernel/dist -maxdepth 1 -name '*.whl' -type f | wc -l)
          echo "Downloaded ${count} wheel file(s):"
          ls -lh sgl-kernel/dist/ || true
          if [ "${count}" -eq 0 ]; then
            echo "::error::No wheels in sgl-kernel/dist/ — at least one build job reported success but produced no downloadable artifacts. Refusing to publish an empty release."
            exit 1
          fi

      - name: Publish wheels to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          repository: sgl-project/whl
          token: ${{ secrets.GH_PAT_FOR_WHL_RELEASE }}
          files: sgl-kernel/dist/*
          fail_on_unmatched_files: true

      - name: Clone wheel index
        env:
          WHL_TOKEN: ${{ secrets.GH_PAT_FOR_WHL_RELEASE }}
        run: git clone "https://oauth2:${WHL_TOKEN}@github.com/sgl-project/whl.git" sgl-whl

      - name: Update cu129 wheel index
        if: needs.build-cu129-matrix.result == 'success'
        run: python3 scripts/update_kernel_whl_index.py --cuda 129

      - name: Update cu130 wheel index
        if: needs.build-cu130-matrix.result == 'success'
        run: python3 scripts/update_kernel_whl_index.py --cuda 130

      - name: Update rocm700 wheel index
        if: needs.build-rocm-matrix.result == 'success'
        run: python3 scripts/update_kernel_whl_index.py --rocm 700

      - name: Update rocm720 wheel index
        if: needs.build-rocm-matrix.result == 'success'
        run: python3 scripts/update_kernel_whl_index.py --rocm 720

      - name: Update musa43 wheel index
        if: needs.build-musa43.result == 'success'
        run: python3 scripts/update_kernel_whl_index.py --musa 43

      - name: Push wheel index
        working-directory: sgl-whl
        run: |
          set -euo pipefail
          git config --local user.name "sglang-bot"
          git config --local user.email "sglangbot@gmail.com"
          git add -A
          # The job's `if:` already required at least one build to succeed, and
          # every successful backend's update_kernel_whl_index.py invocation
          # appends to its own backend's index.html. So an empty staged diff
          # here means an update step ran against an empty/wrong sgl-kernel/dist
          # — fail loudly rather than silently push nothing.
          if git diff --cached --quiet; then
            echo "::error::No index changes after running update_kernel_whl_index.py for every successful backend; one or more update steps must have produced zero entries. Investigate sgl-kernel/dist contents."
            exit 1
          fi
          git commit -m "update whl index"
          git push
