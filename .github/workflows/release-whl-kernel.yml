name: Build SGLang Kernel Wheel

on:
  workflow_dispatch:
    inputs:
      checkout_ref:
        description: "Git ref to build from. Defaults to the workflow ref."
        required: false
        type: string
        default: ""
      python_version:
        description: "Python version passed to sgl-kernel/build.sh"
        required: false
        type: string
        default: "3.10"
      cuda_version:
        description: "CUDA version passed to sgl-kernel/build.sh"
        required: true
        type: string
        default: "12.9"
      arch:
        description: "Optional architecture override passed to sgl-kernel/build.sh"
        required: false
        type: string
        default: ""
      artifact_name:
        description: "Uploaded artifact name"
        required: false
        type: string
        default: "sgl-kernel-wheel"
      runner:
        description: "Runner label for the wheel build"
        required: false
        type: string
        default: "x64-kernel-build-node"
      build_jobs:
        description: "BUILD_JOBS passed to sgl-kernel/build.sh"
        required: false
        type: string
        default: "64"
      nvcc_threads:
        description: "NVCC_THREADS passed to sgl-kernel/build.sh"
        required: false
        type: string
        default: "8"
      use_ccache:
        description: "USE_CCACHE passed to sgl-kernel/build.sh"
        required: false
        type: string
        default: "1"
  workflow_call:
    inputs:
      checkout_ref:
        required: true
        type: string
      python_version:
        required: false
        type: string
        default: "3.10"
      cuda_version:
        required: true
        type: string
      arch:
        required: false
        type: string
        default: ""
      artifact_name:
        required: true
        type: string
      runner:
        required: false
        type: string
        default: "x64-kernel-build-node"
      build_jobs:
        required: false
        type: string
        default: "64"
      nvcc_threads:
        required: false
        type: string
        default: "8"
      use_ccache:
        required: false
        type: string
        default: "1"

jobs:
  build-wheel:
    runs-on: ${{ inputs.runner }}
    env:
      HTTP_PROXY: http://100.68.162.211:3128
      HTTPS_PROXY: http://100.68.162.211:3128
      ALL_PROXY: http://100.68.162.211:3128
      NO_PROXY: localhost,127.0.0.1,::1,mirrors.ivolces.com,.ivolces.com,.volceapi.com,.byted.org,eic-sdk-release.tos-cn-beijing.ivolces.com,scqq9isgq31i0fb8nt4eg.apigateway-cn-beijing.volceapi.com,bytedpypi.byted.org,mirrors.byted.org,iaas-gpu-cn-beijing.cr.volces.com
      BUILDKIT_NO_PROXY: 127.0.0.1
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"
          ref: ${{ inputs.checkout_ref || github.ref }}

      - name: Set up Python ${{ inputs.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Set up sgl-kernel Buildx builder
        run: |
          set -euo pipefail
          docker buildx rm sgl-kernel-builder 2>/dev/null || true
          cat > /tmp/sgl-kernel-buildkitd.toml <<'EOF'
          [registry."docker.io"]
            mirrors = ["127.0.0.1:5000"]
          EOF
          docker buildx create \
            --name sgl-kernel-builder \
            --driver docker-container \
            --driver-opt network=host \
            --driver-opt env.HTTP_PROXY="${HTTP_PROXY}" \
            --driver-opt env.HTTPS_PROXY="${HTTPS_PROXY}" \
            --driver-opt env.ALL_PROXY="${ALL_PROXY}" \
            --driver-opt env.NO_PROXY="${BUILDKIT_NO_PROXY}" \
            --config /tmp/sgl-kernel-buildkitd.toml \
            --use \
            --bootstrap

      - name: Build wheel
        run: |
          set -euo pipefail
          cd sgl-kernel
          chmod +x ./build.sh
          if [ -n "${{ inputs.arch }}" ]; then
            ./build.sh "${{ inputs.python_version }}" "${{ inputs.cuda_version }}" "${{ inputs.arch }}"
          else
            ./build.sh "${{ inputs.python_version }}" "${{ inputs.cuda_version }}"
          fi
        env:
          BUILD_JOBS: ${{ inputs.build_jobs }}
          NVCC_THREADS: ${{ inputs.nvcc_threads }}
          USE_CCACHE: ${{ inputs.use_ccache }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: sgl-kernel/dist/*
          if-no-files-found: error
