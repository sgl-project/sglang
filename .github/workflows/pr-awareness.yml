name: PR Awareness
# Standalone PR-event-triggered workflow that maintains an "awareness block"
# at the bottom of the PR body, surfacing extra-CI opt-in state + latest
# PR Test / PR Test Extra run URLs.
#
# Trigger-driven (not reusable) so `pulls: write` stays scoped to this file
# only — does NOT propagate up the pr-test.yml caller chain (e.g.
# release-branch-cut.yml does not need `pulls: write`).

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  pull-requests: write
  actions: read

concurrency:
  # cancel-in-progress: false — multiple events fire in quick succession
  # (push + label change), serialize them so each run sees the latest state.
  group: pr-awareness-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  update-pr-body:
    runs-on: ubuntu-latest
    steps:
      - name: Update awareness block in PR body
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.pull_request.head.sha;
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const hasExtra = labels.includes('run-ci-extra');

            // pr-test / pr-test-extra fire on the same PR event, but may
            // not yet be visible via the API by the time this workflow
            // starts. Retry briefly so the first sync's awareness lands
            // with real URLs instead of "Not run yet".
            async function findRunBySha(workflowFile) {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflowFile,
                head_sha: sha,
                per_page: 1,
              });
              return data.workflow_runs[0] || null;
            }
            async function findRunWithRetry(workflowFile, maxAttempts = 6, delayMs = 5000) {
              for (let i = 0; i < maxAttempts; i++) {
                const run = await findRunBySha(workflowFile);
                if (run) return run;
                if (i < maxAttempts - 1) await new Promise(r => setTimeout(r, delayMs));
              }
              return null;
            }

            const ptRun = await findRunWithRetry('pr-test.yml');
            // pr-test-extra only runs when the label is set; skip the
            // retry when it would never appear.
            const peRun = hasExtra ? await findRunWithRetry('pr-test-extra.yml') : null;

            const notEnabledText = ':warning: **Not enabled** — add `run-ci-extra` label to opt in.';
            const ptText = ptRun ? `[Run #${ptRun.id}](${ptRun.html_url})` : '_Not run yet_';
            const peText = !hasExtra
              ? notEnabledText
              : (peRun ? `[Run #${peRun.id}](${peRun.html_url})` : '_Not run yet_');

            const outerStart = '<!-- pr-awareness:start -->';
            const outerEnd   = '<!-- pr-awareness:end -->';
            const ptStart    = '<!-- slot:pr-test:start -->';
            const ptEnd      = '<!-- slot:pr-test:end -->';
            const peStart    = '<!-- slot:pr-test-extra:start -->';
            const peEnd      = '<!-- slot:pr-test-extra:end -->';

            const newBlock = [
              outerStart,
              '---',
              '### CI Awareness',
              '',
              `Latest PR Test: ${ptStart}${ptText}${ptEnd}`,
              `Latest PR Test (Extra): ${peStart}${peText}${peEnd}`,
              outerEnd,
            ].join('\n');

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const body = pr.body || '';

            // Replace existing block in place, or append at body end.
            const blockRe = new RegExp(`${outerStart}[\\s\\S]*?${outerEnd}`);
            let newBody;
            if (blockRe.test(body)) {
              newBody = body.replace(blockRe, newBlock);
            } else {
              const sep = body.length === 0
                ? ''
                : (body.endsWith('\n') ? '\n---\n\n' : '\n\n---\n\n');
              newBody = `${body}${sep}${newBlock}`;
            }

            if (newBody !== body) {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                body: newBody,
              });
              core.info('Updated PR body awareness block.');
            } else {
              core.info('PR body awareness block already up-to-date.');
            }
