name: Release PyPI
on:
  push:
    tags:
      - 'v[0-9]+.*'
  workflow_dispatch:

jobs:
  publish:
    if: github.repository == 'sgl-project/sglang'
    runs-on: ubuntu-latest
    environment: "prod"
    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for setuptools-scm to determine version from tags

      # Needed by setuptools-rust to build the bundled native gRPC extension
      # (rust/sglang-grpc) when `python -m build` builds the sglang wheel.
      - name: Install protoc
        run: sudo bash scripts/ci/utils/install_protoc.sh

      - name: Build wheel
        run: |
          cd python
          cp ../README.md ../LICENSE .
          pip install build wheel setuptools setuptools-scm
          python3 -m build --wheel

      # PyPI rejects plain `linux_x86_64` platform tags; auditwheel rewrites
      # the wheel's platform tag to a `manylinux_*` tag and bundles any
      # external native deps. The runner's glibc determines the lowest
      # acceptable manylinux policy (ubuntu-24.04 -> glibc 2.39).
      - name: Repair wheel for manylinux
        run: |
          cd python
          pip install auditwheel patchelf
          mkdir -p dist-repaired
          python3 -m auditwheel repair dist/*.whl -w dist-repaired/
          rm dist/*.whl
          mv dist-repaired/*.whl dist/

      - name: Upload to pypi
        run: |
          cd python
          pip install twine
          python3 -m twine upload dist/* -u __token__ -p ${{ secrets.PYPI_TOKEN }}
