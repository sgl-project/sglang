name: PR Test (sgl-router)

on:
  push:
    branches: [main]
    paths:
      - "sgl-router/**"
      - ".github/workflows/pr-test-sgl-router.yml"
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]
    paths:
      - "sgl-router/**"
      - ".github/workflows/pr-test-sgl-router.yml"
  workflow_dispatch:

concurrency:
  group: sgl-router-${{ github.ref }}
  cancel-in-progress: true

env:
  SGLANG_IS_IN_CI: true

jobs:
  sgl-router-lint:
    name: tier-1 — lint
    if: |
      github.event_name != 'pull_request' ||
      (github.event.action != 'labeled' && contains(github.event.pull_request.labels.*.name, 'run-ci')) ||
      (github.event.action == 'labeled' && github.event.label.name == 'run-ci')
    runs-on: ubuntu-latest
    env:
      # Scoped per-job (not workflow-wide) to avoid SMG's documented breakage
      # of self-hosted-runner pip installs that compile Rust extensions.
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Configure sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        with:
          version: "v0.12.0"
          disable_annotations: true

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: sgl-router
          shared-key: "sgl-router-cache"
          cache-all-crates: true
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: cargo check
        working-directory: sgl-router
        run: cargo check --all-targets

      - name: cargo clippy
        working-directory: sgl-router
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo fmt
        working-directory: sgl-router
        run: |
          rustup toolchain install nightly --profile minimal --component rustfmt
          cargo +nightly fmt -- --check

      # Supply-chain gaps SMG doesn't cover — close them here (see sgl-router/CI_PARITY.md).
      # cargo-deny is pinned to 0.19+ because 0.16 cannot parse CVSS 4.0 advisories.
      # cargo-audit uses --deny unsound --deny yanked (block CVEs + yanked, not unmaintained).
      - name: Install cargo-deny + cargo-audit
        run: |
          cargo install --locked cargo-deny@0.19.6
          cargo install --locked cargo-audit@0.21.2

      - name: cargo deny check
        working-directory: sgl-router
        run: cargo deny check licenses bans sources advisories

      - name: cargo audit
        working-directory: sgl-router
        run: cargo audit --deny unsound --deny yanked

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

  sgl-router-build-and-test:
    name: tier-2 — build + test
    needs: sgl-router-lint
    if: |
      github.event_name != 'pull_request' ||
      (github.event.action != 'labeled' && contains(github.event.pull_request.labels.*.name, 'run-ci')) ||
      (github.event.action == 'labeled' && github.event.label.name == 'run-ci')
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install OS deps (libssl, pkg-config)
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Configure sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        with:
          version: "v0.12.0"
          disable_annotations: true

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: sgl-router
          shared-key: "sgl-router-cache"
          cache-all-crates: true
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: cargo build (record wall time)
        working-directory: sgl-router
        run: |
          START=$(date +%s)
          cargo build --release --all-targets
          END=$(date +%s)
          BUILD_SECONDS=$((END - START))
          echo "tier_2_build_duration_seconds=${BUILD_SECONDS}" >> "$GITHUB_ENV"
          echo "::notice title=Tier-2 build duration::${BUILD_SECONDS}s"

      - name: cargo test
        working-directory: sgl-router
        run: cargo test --release

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

      - name: Summary
        if: always()
        run: |
          echo "## Tier-2 results" >> "$GITHUB_STEP_SUMMARY"
          echo "- Build duration: \`${tier_2_build_duration_seconds:-(not recorded)}\` s" >> "$GITHUB_STEP_SUMMARY"

  sgl-router-docker-build-test:
    name: tier-3 — docker (placeholder)
    needs: sgl-router-build-and-test
    if: |
      github.event_name != 'pull_request' ||
      (github.event.action != 'labeled' && contains(github.event.pull_request.labels.*.name, 'run-ci')) ||
      (github.event.action == 'labeled' && github.event.label.name == 'run-ci')
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Placeholder — populated in M6
        run: |
          echo "docker-build-test placeholder. To be populated in M6 (Observability + Docker)."
          exit 0

  sgl-router-k8s-integration:
    name: tier-3 — k8s integration (placeholder)
    needs: sgl-router-build-and-test
    if: |
      github.event_name != 'pull_request' ||
      (github.event.action != 'labeled' && contains(github.event.pull_request.labels.*.name, 'run-ci')) ||
      (github.event.action == 'labeled' && github.event.label.name == 'run-ci')
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Placeholder — populated in M2
        run: |
          echo "k8s-integration placeholder. To be populated in M2 (Service discovery)."
          exit 0

  sgl-router-e2e:
    name: tier-3 — e2e (placeholder)
    needs: sgl-router-build-and-test
    if: |
      github.event_name != 'pull_request' ||
      (github.event.action != 'labeled' && contains(github.event.pull_request.labels.*.name, 'run-ci')) ||
      (github.event.action == 'labeled' && github.event.label.name == 'run-ci')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Placeholder — populated in M1
        run: |
          echo "e2e placeholder. To be populated in M1 (HTTP skeleton + tokenizer)."
          exit 0

  sgl-router-finish:
    name: finish
    needs:
      - sgl-router-lint
      - sgl-router-build-and-test
      - sgl-router-docker-build-test
      - sgl-router-k8s-integration
      - sgl-router-e2e
    runs-on: ubuntu-latest
    steps:
      - name: All required checks completed
        run: echo "OK"
