name: Build and Publish Volcengine Docker Image

# Reusable workflow: builds one amd64 CUDA image variant and publishes the
# matching Volcengine CR tag. Callers use a matrix when multiple variants are
# needed, so the Docker build command stays in one file.

on:
  workflow_call:
    inputs:
      docker_target:
        description: "Dockerfile target stage"
        required: true
        type: string
      cuda_key:
        description: "Logical CUDA tag key, e.g. cu129 or cu130"
        required: false
        type: string
        default: "cu129"
      cuda_version:
        description: "CUDA_VERSION build arg"
        required: false
        type: string
        default: "12.9.1"
      sgl_version:
        description: "Version string passed as SGL_VERSION build arg"
        required: false
        type: string
        default: ""
      extra_build_args:
        description: "Additional --build-arg flags appended to docker buildx build"
        required: false
        type: string
        default: ""
      checkout_ref:
        description: "Git ref to checkout"
        required: false
        type: string
        default: ""
      tag_config:
        description: "Deprecated compatibility input; Volcengine tags are generated from tag_mode."
        required: false
        type: string
        default: ""
      tag_mode:
        description: "Tag mode passed to scripts/ci/get_volcengine_image_tag.py"
        required: false
        type: string
        default: "version"
      tag_value:
        description: "Tag value passed for version-mode Volcengine tags"
        required: false
        type: string
        default: ""
      variant_suffix:
        description: "Optional variant suffix appended before CUDA suffix"
        required: false
        type: string
        default: ""
      cuda_suffix:
        description: "Optional CUDA suffix appended to Volcengine tags"
        required: false
        type: string
        default: ""
      publish_default_cuda_alias:
        description: "Also publish an unsuffixed default tag for this CUDA variant"
        required: false
        type: boolean
        default: false
      use_environment:
        description: "GitHub environment name (e.g. prod) or empty for none"
        required: false
        type: string
        default: ""
      registry_host:
        description: "Volcengine CR registry host"
        required: false
        type: string
        default: ""
      image_repo:
        description: "Full Volcengine CR image repository"
        required: false
        type: string
        default: ""
      artifact_name:
        description: "Optional local sgl-kernel wheel artifact name"
        required: false
        type: string
        default: ""

jobs:
  build-and-publish:
    if: github.repository == 'bytedance-iaas/sglang'
    environment: ${{ inputs.use_environment || null }}
    runs-on: x64-docker-build-node
    env:
      CUDA_KEY: ${{ inputs.cuda_key }}
      CUDA_SUFFIX: ${{ inputs.cuda_suffix }}
      IMAGE_REPO: ${{ inputs.image_repo }}
      PUBLISH_DEFAULT_CUDA_ALIAS: ${{ inputs.publish_default_cuda_alias }}
      REGISTRY_HOST: ${{ inputs.registry_host }}
      SGL_VERSION: ${{ inputs.sgl_version }}
      TAG_MODE: ${{ inputs.tag_mode }}
      TAG_VALUE: ${{ inputs.tag_value }}
      VARIANT_SUFFIX: ${{ inputs.variant_suffix }}
      VOLCENGINE_CR_REGISTRY: ${{ vars.VOLCENGINE_CR_REGISTRY }}
      VOLCENGINE_CR_NAMESPACE: ${{ vars.VOLCENGINE_CR_NAMESPACE }}
      VOLCENGINE_CR_REPOSITORY: ${{ vars.VOLCENGINE_CR_REPOSITORY || 'sglang' }}
      VOLCENGINE_CR_USERNAME: ${{ secrets.VOLCENGINE_CR_USERNAME }}
      VOLCENGINE_CR_PASSWORD: ${{ secrets.VOLCENGINE_CR_PASSWORD }}
    steps:
      - name: Delete huge unnecessary tools folder
        run: rm -rf /opt/hostedtoolcache

      - name: Cleanup workspace (remove root-owned files from prior runs)
        run: sudo rm -rf "$GITHUB_WORKSPACE"/* || true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref || github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve Volcengine publish target
        run: |
          set -euo pipefail

          if [ -z "${IMAGE_REPO}" ]; then
            if [ -z "${VOLCENGINE_CR_REGISTRY}" ] || [ -z "${VOLCENGINE_CR_NAMESPACE}" ]; then
              echo "::error::Volcengine CR variables are required: VOLCENGINE_CR_REGISTRY and VOLCENGINE_CR_NAMESPACE"
              exit 1
            fi
            IMAGE_REPO="${VOLCENGINE_CR_REGISTRY}/${VOLCENGINE_CR_NAMESPACE}/${VOLCENGINE_CR_REPOSITORY:-sglang}"
          fi

          if [ -z "${REGISTRY_HOST}" ] && [ -n "${VOLCENGINE_CR_REGISTRY}" ] && [[ "${IMAGE_REPO}" == "${VOLCENGINE_CR_REGISTRY}/"* ]]; then
            REGISTRY_HOST="${VOLCENGINE_CR_REGISTRY}"
          fi

          if [ -z "${IMAGE_REPO}" ] || [[ "${IMAGE_REPO}" == /* ]] || [[ "${IMAGE_REPO}" == *'//'* ]]; then
            echo "::error::Invalid image repository: '${IMAGE_REPO}'"
            exit 1
          fi

          echo "IMAGE_REPO=${IMAGE_REPO}" >> "${GITHUB_ENV}"
          echo "REGISTRY_HOST=${REGISTRY_HOST}" >> "${GITHUB_ENV}"
          echo "Resolved image repository ${IMAGE_REPO}"

      - name: Resolve Volcengine image tag
        id: image-tag
        run: |
          set -euo pipefail
          resolve_tag() {
            local cuda_suffix="$1"
            local tag_cmd=(python3 scripts/ci/get_volcengine_image_tag.py --mode "${TAG_MODE}")
            if [ -n "${TAG_VALUE}" ]; then
              tag_cmd+=(--tag-value "${TAG_VALUE}")
            fi
            if [ -n "${VARIANT_SUFFIX}" ]; then
              tag_cmd+=(--variant-suffix "${VARIANT_SUFFIX}")
            fi
            if [ -n "${cuda_suffix}" ]; then
              tag_cmd+=(--cuda-suffix "${cuda_suffix}")
            fi
            "${tag_cmd[@]}"
          }

          IMAGE_TAGS=()
          if [ "${PUBLISH_DEFAULT_CUDA_ALIAS}" = "true" ]; then
            IMAGE_TAGS+=("$(resolve_tag "")")
          fi
          IMAGE_TAGS+=("$(resolve_tag "${CUDA_SUFFIX}")")

          {
            echo "image-tags<<EOF"
            printf '%s\n' "${IMAGE_TAGS[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Compute Docker build metadata args
        env:
          IMAGE_TAGS: ${{ steps.image-tag.outputs.image-tags }}
        run: |
          set -euo pipefail
          BUILD_COMMIT="$(git rev-parse HEAD)"
          BUILD_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          TAG_CONFIG="$(CUDA_KEY="${CUDA_KEY}" IMAGE_TAGS="${IMAGE_TAGS}" python3 -c 'import json, os; tags = [tag for tag in os.environ["IMAGE_TAGS"].splitlines() if tag]; print(json.dumps([{"cuda": os.environ["CUDA_KEY"], "tags": tags}], separators=(",", ":")))')"
          python3 scripts/ci/utils/docker_build_metadata_args.py \
            --cuda "${CUDA_KEY}" \
            --tag-config "${TAG_CONFIG}" \
            --image-repo "${IMAGE_REPO}" \
            --sgl-version "${SGL_VERSION}" \
            --build-commit "${BUILD_COMMIT}" \
            --build-url "${BUILD_URL}" \
            > /tmp/docker-metadata.args

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          docker-images: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: false

      - name: Prune Docker to reclaim disk space
        run: |
          docker buildx prune --filter "until=72h" -f
          docker system prune -af --filter "until=72h"
          docker volume prune -af

      - name: Download local sgl-kernel wheel
        if: ${{ inputs.artifact_name != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: .ci-artifacts/sgl-kernel

      - name: Set up Docker Buildx with local Docker Hub mirror
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["127.0.0.1:5000"]

      - name: Login to Volcengine CR
        run: |
          set -euo pipefail
          echo "${VOLCENGINE_CR_PASSWORD}" | docker login "${REGISTRY_HOST}" --username "${VOLCENGINE_CR_USERNAME}" --password-stdin

      - name: Build and push AMD64 image
        id: build
        run: |
          set -euo pipefail
          VERSION_ARG=""
          if [ -n "${SGL_VERSION}" ]; then
            VERSION_ARG="--build-arg SGL_VERSION=${SGL_VERSION}"
          fi
          mapfile -t METADATA_ARGS < /tmp/docker-metadata.args

          docker buildx build \
            --target ${{ inputs.docker_target }} \
            --platform linux/amd64 \
            --output type=image,name=${IMAGE_REPO},push-by-digest=true,name-canonical=true,push=true \
            -f docker/Dockerfile \
            --build-arg CUDA_VERSION=${{ inputs.cuda_version }} \
            --build-arg BUILD_TYPE=all \
            --build-arg GRACE_BLACKWELL=0 \
            --build-arg INSTALL_FLASHINFER_JIT_CACHE=1 \
            "${METADATA_ARGS[@]}" \
            ${VERSION_ARG} \
            ${{ inputs.extra_build_args }} \
            --metadata-file /tmp/metadata.json \
            --no-cache \
            .

          DIGEST=$(python3 -c "import json; print(json.load(open('/tmp/metadata.json'))['containerimage.digest'])")
          echo "Pushed digest: ${DIGEST}"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Create Volcengine image tag
        env:
          IMAGE_TAGS: ${{ steps.image-tag.outputs.image-tags }}
        run: |
          set -euo pipefail
          mapfile -t image_tags <<< "${IMAGE_TAGS}"
          tag_args=()
          for image_tag in "${image_tags[@]}"; do
            [ -n "${image_tag}" ] || continue
            tag_args+=(-t "${IMAGE_REPO}:${image_tag}")
          done

          docker buildx imagetools create \
            "${tag_args[@]}" \
            "${IMAGE_REPO}@${{ steps.build.outputs.digest }}"
          for image_tag in "${image_tags[@]}"; do
            [ -n "${image_tag}" ] || continue
            echo "Published ${IMAGE_REPO}:${image_tag}"
          done
