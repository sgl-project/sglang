name: Patch Docker Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Base image tag to patch (e.g. dev-x86, glm5-grace-blackwell)"
        required: true
      pr_branch:
        description: "PR branch to merge into the image's source branch (e.g. feature/anthropic-api)"
        required: false
        default: ""
      commits:
        description: "Comma-separated commit SHAs to cherry-pick (e.g. abc123,def456)"
        required: false
        default: ""

concurrency:
  group: patch-docker-${{ inputs.image_tag }}
  cancel-in-progress: true

jobs:
  patch:
    if: github.repository == 'sgl-project/sglang'
    runs-on: x64-docker-build-node
    timeout-minutes: 120
    steps:
      - name: Validate inputs
        run: |
          IMAGE_TAG="${{ inputs.image_tag }}"
          if ! [[ "${IMAGE_TAG}" =~ ^[a-zA-Z0-9._-]+$ ]]; then
            echo "::error::Invalid image_tag: ${IMAGE_TAG}"
            exit 1
          fi

          # Must provide exactly one of pr_branch or commits
          if [ -n "${{ inputs.pr_branch }}" ] && [ -n "${{ inputs.commits }}" ]; then
            echo "::error::Provide either pr_branch or commits, not both"
            exit 1
          fi
          if [ -z "${{ inputs.pr_branch }}" ] && [ -z "${{ inputs.commits }}" ]; then
            echo "::error::Must provide either pr_branch or commits"
            exit 1
          fi

          if [ -n "${{ inputs.commits }}" ]; then
            IFS=',' read -ra SHAS <<< "${{ inputs.commits }}"
            for sha in "${SHAS[@]}"; do
              sha=$(echo "${sha}" | xargs)
              if ! [[ "${sha}" =~ ^[0-9a-fA-F]{7,40}$ ]]; then
                echo "::error::Invalid commit SHA: ${sha}"
                exit 1
              fi
            done
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull base image and extract source branch
        run: |
          IMAGE="lmsysorg/sglang:${{ inputs.image_tag }}"
          docker pull "${IMAGE}"

          # Start a container to inspect the image's git state
          CONTAINER_ID=$(docker run -d "${IMAGE}" sleep infinity)

          # Extract the source branch and commit
          BASE_SHA=$(docker exec "${CONTAINER_ID}" \
            git -C /sgl-workspace/sglang rev-parse HEAD 2>/dev/null \
            | tr -d '[:space:]') || true
          if [ -z "${BASE_SHA}" ]; then
            echo "::error::Image has no .git directory — cannot patch"
            docker rm -f "${CONTAINER_ID}"
            exit 1
          fi

          BASE_BRANCH=$(docker exec "${CONTAINER_ID}" \
            git -C /sgl-workspace/sglang branch --show-current 2>/dev/null \
            | tr -d '[:space:]') || true
          if [ -z "${BASE_BRANCH}" ]; then
            echo "::error::Image is in detached HEAD state — cannot determine source branch"
            docker rm -f "${CONTAINER_ID}"
            exit 1
          fi

          docker rm -f "${CONTAINER_ID}"

          echo "Image built from branch: ${BASE_BRANCH} @ ${BASE_SHA}"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          echo "BASE_SHA=${BASE_SHA}" >> "$GITHUB_ENV"
          echo "BASE_BRANCH=${BASE_BRANCH}" >> "$GITHUB_ENV"

      - name: Checkout repo at image's source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BASE_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.GH_PAT_FOR_DOCKER_PATCH }}

      - name: Merge PR branch or cherry-pick commits
        run: |
          set -eo pipefail
          git config user.email "ci@sglang.ai"
          git config user.name "SGLang CI"

          if [ -n "${{ inputs.pr_branch }}" ]; then
            # --- Branch merge mode ---
            echo "=== Merging ${{ inputs.pr_branch }} into ${BASE_BRANCH} ==="
            git fetch origin "${{ inputs.pr_branch }}"

            # Merge WITHOUT auto-resolution — fail on conflicts so they
            # can be resolved manually
            if ! git merge "origin/${{ inputs.pr_branch }}" --no-edit; then
              echo ""
              echo "::error::Merge conflict detected. Conflicting files:"
              git diff --name-only --diff-filter=U
              echo ""
              echo "Resolve conflicts manually by merging ${{ inputs.pr_branch }} into ${BASE_BRANCH}, then re-run."
              exit 1
            fi
            echo "Merge successful"

          else
            # --- Cherry-pick mode ---
            IFS=',' read -ra SHAS <<< "${{ inputs.commits }}"
            for sha in "${SHAS[@]}"; do
              sha=$(echo "${sha}" | xargs)
              echo "=== Cherry-picking ${sha} ==="

              git fetch origin "${sha}"

              if ! git cat-file -e "${sha}^{commit}" 2>/dev/null; then
                echo "::error::Commit ${sha} not found"
                exit 1
              fi

              PARENT_COUNT=$(git cat-file -p "${sha}" | grep -c '^parent' || true)
              if [ "${PARENT_COUNT}" -gt 1 ]; then
                echo "::error::${sha} is a merge commit — supply individual commit SHAs"
                exit 1
              fi

              if git merge-base --is-ancestor "${sha}" HEAD 2>/dev/null; then
                echo "  Already applied — skipping"
                continue
              fi

              # Fail on conflicts — no auto-resolution
              if ! git cherry-pick "${sha}" --no-edit; then
                echo ""
                echo "::error::Cherry-pick conflict on ${sha}. Conflicting files:"
                git diff --name-only --diff-filter=U
                echo ""
                echo "Resolve conflicts manually, then re-run."
                git cherry-pick --abort
                exit 1
              fi
              echo "  Applied successfully"
            done
          fi

          echo "PATCHED_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Rebuild Docker image
        run: |
          echo "=== Rebuilding image from patched source ==="
          echo "Base branch: ${BASE_BRANCH}"
          echo "Base commit: ${BASE_SHA}"
          echo "New HEAD:    ${PATCHED_SHA}"

          # Determine build args from the image tag
          # Grace Blackwell images need GRACE_BLACKWELL=1 and CUDA 13
          DOCKER_BUILD_ARGS=""
          case "${{ inputs.image_tag }}" in
            *grace-blackwell*)
              DOCKER_BUILD_ARGS="--build-arg GRACE_BLACKWELL=1 --build-arg CUDA_VERSION=13.0.1 --build-arg BRANCH_TYPE=local --build-arg BUILD_TYPE=all --build-arg USE_LATEST_SGLANG=0"
              ;;
            *hopper-sbo*)
              DOCKER_BUILD_ARGS="--build-arg HOPPER_SBO=1 --build-arg BRANCH_TYPE=local --build-arg BUILD_TYPE=all --build-arg USE_LATEST_SGLANG=0"
              ;;
            *)
              DOCKER_BUILD_ARGS="--build-arg BRANCH_TYPE=local --build-arg BUILD_TYPE=all --build-arg USE_LATEST_SGLANG=0"
              ;;
          esac

          docker build \
            ${DOCKER_BUILD_ARGS} \
            --target framework \
            -t "${IMAGE}" \
            -f docker/Dockerfile \
            .

      - name: Smoke test
        run: |
          echo "=== Running smoke test ==="
          docker run --rm "${IMAGE}" python3 -c "
          import sglang as sgl
          from sglang.srt.server import launch_server
          print('Smoke test passed: sglang imports OK')
          "

      - name: Push image
        run: |
          docker push "${IMAGE}"

          echo "### Patched \`${IMAGE}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Base branch:** \`${BASE_BRANCH}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Base commit:** \`${BASE_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **New commit:** \`${PATCHED_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Source:** ${{ inputs.pr_branch && format('branch: {0}', inputs.pr_branch) || format('commits: {0}', inputs.commits) }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup
        if: always()
        run: |
          docker rmi "${IMAGE}" 2>/dev/null || true
