name: Diffusion CI Utils Test

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/diffusion-ci-utils-test.yml"
      - "scripts/ci/utils/diffusion/**"
      - "scripts/ci/utils/publish_traces.py"
  push:
    branches: [main]
    paths:
      - ".github/workflows/diffusion-ci-utils-test.yml"
      - "scripts/ci/utils/diffusion/**"
      - "scripts/ci/utils/publish_traces.py"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install numpy pillow pytest

      - name: Run diffusion CI utility tests
        run: python -m pytest scripts/ci/utils/diffusion/test_publish_diffusion_gt.py
