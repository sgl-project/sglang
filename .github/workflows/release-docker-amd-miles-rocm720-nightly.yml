name: Release Docker Images Nightly Miles ROCm7.2 (AMD)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true

jobs:
  publish:
    if: github.repository == 'sgl-project/sglang'
    runs-on: amd-docker-scale
    environment: "prod"
    strategy:
      fail-fast: false
      matrix:
        variant:
          - rocm720-mi35x
    steps:
      - name: Checkout miles repository
        uses: actions/checkout@v4
        with:
          repository: radixark/miles
          ref: main
          fetch-depth: 0

      - name: Record miles commit
        run: echo "Building from miles main @ $(git rev-parse HEAD)"

      - name: Set date
        run: echo "DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

      - name: Login to Docker Hub (AMD)
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_AMD_USERNAME }}
          password: ${{ secrets.DOCKERHUB_AMD_TOKEN }}

      - name: Build via miles docker/build.py and push dated tag
        run: |
          python3 docker/build.py --variant ${{ matrix.variant }} --image-tag custom --custom-tag miles
          docker tag  rocm/sgl-dev:miles-${{ matrix.variant }} rocm/sgl-dev:miles-${{ matrix.variant }}-${DATE}
          docker push rocm/sgl-dev:miles-${{ matrix.variant }}-${DATE}
