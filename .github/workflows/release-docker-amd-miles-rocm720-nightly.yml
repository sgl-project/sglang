name: "[EXPERIMENT] PR 31757 Miles ROCm7.2 build (no push)"

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  build-rocm720-mi35x:
    if: github.repository == 'sgl-project/sglang'
    runs-on: amd-docker-scale
    timeout-minutes: 180
    permissions:
      contents: read
    steps:
      - name: Checkout miles repository
        uses: actions/checkout@v4
        with:
          repository: radixark/miles
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Record miles commit
        run: echo "Building from miles main @ $(git rev-parse HEAD)"

      - name: Install docker/build.py dependencies
        run: python3 -m pip install --quiet typer

      - name: Build ROCm 7.2 MI35X image without pushing
        run: |
          python3 docker/build.py --variant rocm720-mi35x --image-tag custom --custom-tag miles
          source_image="rocm/sgl-dev:miles-rocm720-mi35x"
          experiment_image="${source_image}-pr31757-${GITHUB_RUN_ID}"
          docker image inspect "${source_image}" >/dev/null
          docker tag "${source_image}" "${experiment_image}"
          docker image inspect "${experiment_image}" --format '{{.Id}} {{.RepoTags}}'

      - name: Remove experiment tags
        if: always()
        run: |
          source_image="rocm/sgl-dev:miles-rocm720-mi35x"
          experiment_image="${source_image}-pr31757-${GITHUB_RUN_ID}"
          docker image rm "${experiment_image}" "${source_image}" >/dev/null 2>&1 || true
