name: Nightly Test (Xeon)

on:
  schedule:
    # Nightly test at 23:30 Beijing Time (UTC+8) = 15:30 UTC
    # Offset from XPU nightly (15:00 UTC) to avoid simultaneous docker pulls.
    - cron: '30 15 * * *'
  push:
    branches:
      - main
    paths:
      - "python/sglang/version.py"
      - ".github/workflows/nightly-test-xeon.yml"
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: "Branch, tag or SHA to checkout"
        required: false
        type: string
        default: ""

concurrency:
  group: nightly-xeon-${{ inputs.ref || github.ref }}
  cancel-in-progress: false

jobs:
  nightly-test-cpu:
    runs-on: xeon-gnr
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          REPO="https://github.com/${{ github.repository }}.git"
          BRANCH="${{ inputs.ref || github.ref_name }}"
          echo "Building with REPO=$REPO, BRANCH=$BRANCH"
          docker build \
            --build-arg SGLANG_REPO=$REPO \
            --build-arg VER_SGLANG=$BRANCH \
            --no-cache --progress=plain -f docker/xeon.Dockerfile -t sglang_xeon_nightly .

      - name: Run container
        run: |
          docker run -dt \
            -v ${{ github.workspace }}:/sglang-checkout/ --ipc=host \
            -v $HOME/.cache/huggingface:/root/.cache/huggingface \
            --name ci_sglang_xeon_nightly \
            sglang_xeon_nightly

      - name: Check AMX support
        timeout-minutes: 5
        run: |
          docker exec -w /sglang-checkout/ ci_sglang_xeon_nightly \
            bash -c "source /opt/.venv/bin/activate && python3 -c 'import torch; import sgl_kernel; assert torch._C._cpu._is_amx_tile_supported(); assert hasattr(torch.ops.sgl_kernel, \"convert_weight_packed\"); '"

      - name: Install Dependency
        timeout-minutes: 10
        run: |
          docker exec -w /sglang-checkout/ ci_sglang_xeon_nightly \
            bash -c "source /opt/.venv/bin/activate && pip install pytest expecttest tabulate"

      - name: Run Nightly CPU tests
        timeout-minutes: 60
        run: |
          docker exec -w /sglang-checkout/ ci_sglang_xeon_nightly \
            bash -c "source /opt/.venv/bin/activate && cd ./test/srt && python3 run_suite.py --suite per-commit-cpu --timeout-per-file 1500"

      - name: Change permission
        if: always()
        timeout-minutes: 2
        run: |
          docker exec -u root ci_sglang_xeon_nightly bash -c "
            rm -rf /tmp/ci-home  &&
            chown -R  $(id -u):$(id -g) /sglang-checkout/ 2>/dev/null || true
          " || true

      - name: Cleanup container
        if: always()
        run: |
          docker rm -f ci_sglang_xeon_nightly || true

  finish:
    if: always()
    needs: [nightly-test-cpu]
    runs-on: ubuntu-latest
    steps:
      - name: Check job status
        run: |
          cpu_result="${{ needs.nightly-test-cpu.result }}"
          if [ "$cpu_result" != "success" ] && [ "$cpu_result" != "skipped" ]; then
            echo "CPU job failed with result: $cpu_result"
            exit 1
          fi
          echo "CPU job completed successfully (result: $cpu_result)"
