name: Nightly Test (Xeon)

on:
  schedule:
    # Nightly test at 23:30 Beijing Time (UTC+8) = 15:30 UTC
    # Offset from XPU nightly (15:00 UTC) to avoid simultaneous docker pulls.
    - cron: '30 15 * * *'
  push:
    branches:
      - main
    paths:
      - "python/sglang/version.py"
      - ".github/workflows/nightly-test-xeon.yml"
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: "Branch, tag or SHA to checkout"
        required: false
        type: string
        default: ""

concurrency:
  group: nightly-xeon-${{ inputs.ref || github.ref }}
  cancel-in-progress: false

jobs:
  nightly-test-cpu:
    runs-on: xeon-gnr
    env:
      HF_HOME: /home/sdp/.cache/huggingface
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          REPO="https://github.com/${{ github.repository }}.git"
          BRANCH="${{ inputs.ref || github.ref_name }}"
          echo "Building with REPO=$REPO, BRANCH=$BRANCH"
          docker build \
            --build-arg SGLANG_REPO=$REPO \
            --build-arg VER_SGLANG=$BRANCH \
            --no-cache --progress=plain -f docker/xeon.Dockerfile -t sglang_xeon_nightly .

      - name: Run container
        id: start_container
        run: |
          container_id=$(docker run -dt \
            -v ${HF_HOME}:/root/.cache/huggingface \
            --ipc=host \
            sglang_xeon_nightly)
          echo "Started container: $container_id"
          echo "container_id=$container_id" >> "$GITHUB_OUTPUT"

      - name: Install Dependency
        timeout-minutes: 10
        run: |
          cid="${{ steps.start_container.outputs.container_id }}"
          docker exec "$cid" bash -c "source /opt/.venv/bin/activate && pip install pytest expecttest tabulate"

      - name: Run Nightly CPU tests
        timeout-minutes: 60
        run: |
          cid="${{ steps.start_container.outputs.container_id }}"
          docker exec "$cid" bash -c "source /opt/.venv/bin/activate && cd /sgl-workspace/sglang/test/srt && python3 run_suite.py --suite per-commit-cpu --timeout-per-file 1500"

      - name: Cleanup container
        if: always()
        run: |
          cid="${{ steps.start_container.outputs.container_id }}"
          docker rm -f "$cid" || true

  finish:
    if: always()
    needs: [nightly-test-cpu]
    runs-on: ubuntu-latest
    steps:
      - name: Check job status
        run: |
          cpu_result="${{ needs.nightly-test-cpu.result }}"
          if [ "$cpu_result" != "success" ] && [ "$cpu_result" != "skipped" ]; then
            echo "CPU job failed with result: $cpu_result"
            exit 1
          fi
          echo "CPU job completed successfully (result: $cpu_result)"
