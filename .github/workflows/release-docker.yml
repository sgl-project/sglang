name: Release Docker Images
#
# Builds and publishes framework Docker images to Volcengine CR:
#   - v{sglang}.byted.{release}.{timestamp}
#   - v{sglang}.byted.{release}.{timestamp}-cu130
#
on:
  push:
    tags:
      - "v[0-9]+.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (without v prefix, e.g. 0.5.7)"
        required: true

jobs:
  validate-volcengine-version-tag:
    if: github.repository == 'bytedance-iaas/sglang'
    runs-on: ubuntu-22.04
    outputs:
      git-tag-value: ${{ steps.tag.outputs.value }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch version tags
        run: git fetch --force --tags origin

      - name: Resolve required git tag
        id: tag
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_TAG="v${{ github.event.inputs.version }}"
            if ! git rev-parse -q --verify "refs/tags/${RAW_TAG}" >/dev/null; then
              RAW_TAG="${{ github.event.inputs.version }}"
            fi
          else
            RAW_TAG="${GITHUB_REF_NAME}"
          fi

          if [ -z "${RAW_TAG}" ] || ! git rev-parse -q --verify "refs/tags/${RAW_TAG}" >/dev/null; then
            echo "::error::Version image publishing requires an existing git tag"
            exit 1
          fi

          echo "value=${RAW_TAG#v}" >> "$GITHUB_OUTPUT"

  build-and-publish-volcengine:
    if: github.repository == 'bytedance-iaas/sglang'
    needs: [validate-volcengine-version-tag]
    strategy:
      fail-fast: false
      matrix:
        include:
          - cuda_key: cu129
            cuda_version: 12.9.1
            cuda_suffix: ""
          - cuda_key: cu130
            cuda_version: 13.0.1
            cuda_suffix: cu130
    uses: ./.github/workflows/_docker-build-and-publish.yml
    with:
      docker_target: framework_final
      cuda_key: ${{ matrix.cuda_key }}
      cuda_version: ${{ matrix.cuda_version }}
      cuda_suffix: ${{ matrix.cuda_suffix }}
      sgl_version: ${{ needs.validate-volcengine-version-tag.outputs.git-tag-value }}
      tag_mode: version
      tag_value: ${{ needs.validate-volcengine-version-tag.outputs.git-tag-value }}
      use_environment: prod
      extra_build_args: >-
        --build-arg HTTP_PROXY=http://100.68.162.211:3128
        --build-arg HTTPS_PROXY=http://100.68.162.211:3128
        --build-arg ALL_PROXY=http://100.68.162.211:3128
        --build-arg NO_PROXY=localhost,127.0.0.1,::1,mirrors.ivolces.com,.ivolces.com,.volceapi.com,.byted.org,eic-sdk-release.tos-cn-beijing.ivolces.com,scqq9isgq31i0fb8nt4eg.apigateway-cn-beijing.volceapi.com,bytedpypi.byted.org,mirrors.byted.org,iaas-gpu-cn-beijing.cr.volces.com
        --build-arg BYTED_INTERNAL_EXTRA_TOOLS_APT_URL=${{ vars.BYTED_INTERNAL_EXTRA_TOOLS_APT_URL || 'http://mirrors.ivolces.com/extra-tools/ubuntu' }}
        --build-arg BYTED_INTERNAL_EXTRA_TOOLS_GPG_URL=${{ vars.BYTED_INTERNAL_EXTRA_TOOLS_GPG_URL || 'https://mirrors.ivolces.com/extra-tools/ubuntu/GPG-KEY-system' }}
    secrets: inherit
