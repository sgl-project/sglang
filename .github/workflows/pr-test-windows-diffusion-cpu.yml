name: PR Test Windows Diffusion CPU

on:
  pull_request:
    branches: [main]
    paths:
      - "python/sglang/multimodal_gen/**"
      - "python/pyproject.toml"
      - ".github/workflows/pr-test-windows-diffusion-cpu.yml"
  workflow_dispatch:

jobs:
  windows-diffusion-cpu-e2e:
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      PYTHONPATH: python
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install minimal test dependencies
        run: |
          pip install pytest IPython torch==2.9.1 numpy pydantic psutil pyzmq fastapi uvicorn requests packaging pybase64 diffusers==0.36.0 addict==2.4.0 PyYAML==6.0.1

      - name: Install project package without dependency resolution
        run: |
          pip install -e python --no-deps

      - name: Run tiny diffusion generation on Windows CPU
        shell: pwsh
        run: |
          $script = @'
          from pathlib import Path

          from sglang.multimodal_gen import DiffGenerator

          model_id = "diffusers/tiny-stable-diffusion-torch"
          output_dir = Path("windows_diffusion_outputs")
          output_dir.mkdir(parents=True, exist_ok=True)

          generator = DiffGenerator.from_pretrained(
              model_path=model_id,
              backend="diffusers",
              num_gpus=1,
              dit_precision="fp32",
              vae_precision="fp32",
              local_mode=True,
          )

          try:
              result = generator.generate(
                  sampling_params_kwargs={
                      "prompt": "a tiny robot on a desk",
                      "height": 64,
                      "width": 64,
                      "num_inference_steps": 1,
                      "num_outputs_per_prompt": 1,
                      "seed": 7,
                      "save_output": True,
                      "output_path": str(output_dir),
                      "generator_device": "cpu",
                  }
              )
          finally:
              generator.shutdown()

          if isinstance(result, list):
              first = result[0] if result else None
          else:
              first = result

          assert first is not None, "No generation result returned"
          assert first.output_file_path is not None, "No output file path in generation result"

          output_path = Path(first.output_file_path)
          assert output_path.exists(), f"Generated output not found: {output_path}"
          print(f"Generated output: {output_path}")
          '@
          python -c $script

      - name: Run backend-policy unit tests
        run: |
          python -m pytest -q python/sglang/multimodal_gen/test/unit/test_windows_support_policy.py
