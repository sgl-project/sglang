name: Nightly Test (AMD ROCm 7.2)

on:
  schedule:
    - cron: '30 17 * * *'
  push:
    branches:
      - main
    paths:
      - "python/sglang/version.py"
  workflow_dispatch:
    inputs:
      aiter_ref:
        description: 'Override AITER commit (optional, leave empty to use Dockerfile default)'
        required: false
        type: string
        default: ''
      continue_on_error:
        description: 'Continue on error (do not fail the workflow on test failures)'
        required: false
        type: boolean
        default: true
      job_select:
        description: 'Select a job to run from dropdown (choose "all" to run all jobs)'
        required: false
        type: choice
        default: 'all'
        options:
          - 'all'
          # 1-GPU Unit Tests (MI30x + MI35x)
          - nightly-test-1-gpu-unit-rocm720
          - nightly-test-1-gpu-kernel-rocm720
          - nightly-test-1-gpu-mi35x-rocm720
          # Diagnostic: isolate the AITER CKTile cold-JIT build on MI35x
          - aiter-cktile-jit-probe-rocm720
          # Diagnostic: isolate DSV4 Pro A8W8 Triton routing regressions
          - aiter-dsv4-a8w8-route-probe-rocm720
          # 2-GPU and 4-GPU Tests (MI30x + MI35x)
          - nightly-accuracy-2-gpu-rocm720
          - nightly-accuracy-2-gpu-vlm-rocm720
          - nightly-perf-2-gpu-text-rocm720
          - nightly-perf-2-gpu-vlm-rocm720
          - nightly-4-gpu-rocm720
          # 2-GPU GLM-5.1-MXFP4 (MI35x only)
          - nightly-2-gpu-mi35x-glm51-mxfp4-rocm720
          # 2-GPU DeepSeek-R1-MXFP4 TP2 (MI35x only)
          - nightly-2-gpu-mi35x-deepseek-r1-mxfp4-tp2-rocm720
          # 8-GPU GPT-OSS (MI30x mixes Grok1-FP8; MI35x mixes Qwen3-Coder-Next)
          - nightly-accuracy-8-gpu-rocm720
          - nightly-accuracy-8-gpu-mi35x-rocm720
          # 8-GPU Grok1-INT4 (MI30x + MI35x)
          - nightly-8-gpu-grok1-int4-rocm720
          - nightly-8-gpu-mi35x-grok1-int4-rocm720
          # 8-GPU Grok2 (MI30x + MI35x)
          - nightly-8-gpu-grok2-rocm720
          - nightly-8-gpu-mi35x-grok2-rocm720
          # 8-GPU DeepSeek-V3.x (MI30x)
          - nightly-8-gpu-deepseek-v31-rocm720
          - nightly-8-gpu-deepseek-v32-rocm720
          - nightly-8-gpu-deepseek-v32-mtp-rocm720
          - nightly-8-gpu-deepseek-v3-kv-fp8-rocm720
          # 8-GPU DeepSeek-V3.2 (MI35x)
          - nightly-accuracy-8-gpu-mi35x-deepseek-v32-rocm720
          - nightly-accuracy-8-gpu-mi35x-deepseek-v32-mtp-rocm720
          - nightly-perf-8-gpu-mi35x-deepseek-v32-basic-rocm720
          - nightly-perf-8-gpu-mi35x-deepseek-v32-mtp-rocm720
          # 8-GPU DeepSeek-R1 (MI35x only)
          - nightly-8-gpu-mi35x-deepseek-r1-mxfp4-rocm720
          - nightly-8-gpu-mi35x-deepseek-r1-mxfp4-kv-fp8-rocm720
          - nightly-8-gpu-mi35x-deepseek-r1-mxfp4-ar-fusion-rocm720
          - nightly-8-gpu-mi35x-deepseek-r1-mxfp4-tp4-rocm720
          - nightly-8-gpu-mi35x-deepseek-r1-hicache-rocm720
          # 8-GPU DeepSeek-V4 (MI35x only)
          - nightly-8-gpu-mi35x-deepseek-v4-flash-rocm720
          - nightly-8-gpu-mi35x-deepseek-v4-pro-rocm720
          - nightly-8-gpu-mi35x-deepseek-v4-pro-mtp-rocm720
          # 8-GPU Kimi-K2.6 (MI30x + MI35x)
          - nightly-8-gpu-kimi-k26-rocm720
          - nightly-8-gpu-mi35x-kimi-k26-rocm720
          # 8-GPU Qwen3-235B (MI30x + MI35x MXFP4)
          - nightly-8-gpu-qwen3-235b-rocm720
          - nightly-8-gpu-mi35x-qwen3-235b-mxfp4-rocm720
          # 8-GPU Qwen 3.5 (MI30x + MI35x)
          - nightly-8-gpu-qwen35-rocm720
          - nightly-8-gpu-mi35x-qwen35-rocm720
          - nightly-8-gpu-mi35x-qwen35-triton-dcp-rocm720
          # 8-GPU GLM-5.1 (MI30x + MI35x)
          - nightly-8-gpu-glm51-rocm720
          - nightly-8-gpu-mi35x-glm51-rocm720
          # 8-GPU GLM-5-MXFP4 (MI35x only)
          - nightly-8-gpu-mi35x-glm5-mxfp4-rocm720
          # 4-GPU MiniMax-M2.5 (MI35x)
          - nightly-4-gpu-mi35x-minimax-m25-rocm720
          # 8-GPU MiniMax-M2.7 (MI30x only)
          - nightly-8-gpu-minimax-m27-rocm720
          # Diffusion (MI30x)
          - nightly-1-gpu-zimage-turbo-rocm720
      job_filter:
        description: 'Or type comma-separated job names (overrides dropdown if non-empty)'
        required: false
        type: string
        default: ''
  workflow_call:
    inputs:
      ref:
        description: 'Git ref (branch, tag, or SHA) to test. If not provided, uses the default branch.'
        required: false
        type: string
        default: ''
      aiter_ref:
        description: 'Override AITER commit (optional, leave empty to use Dockerfile default)'
        required: false
        type: string
        default: ''
      job_filter:
        description: 'Select which job to run (leave empty or "all" to run all jobs)'
        required: false
        type: string
        default: 'all'
      continue_on_error:
        description: 'Continue on error (do not fail the workflow on test failures)'
        required: false
        type: boolean
        default: true

env:
  AITER_COMMIT_OVERRIDE: ${{ inputs.aiter_ref }}
  DOCKERHUB_AMD_USERNAME: ${{ secrets.DOCKERHUB_AMD_USERNAME }}
  DOCKERHUB_AMD_TOKEN: ${{ secrets.DOCKERHUB_AMD_TOKEN }}

concurrency:
  # When called via workflow_call with ref set, use a unique group per caller run to avoid
  # collisions with direct schedule/push triggers. We use inputs.ref (not github.event_name)
  # to detect this, because github.event_name inherits from the caller in workflow_call.
  # Manual dispatch runs also get unique groups so they never cancel each other.
  group: nightly-test-amd-rocm720-${{ github.event_name == 'workflow_dispatch' && format('manual-{0}', github.run_id) || inputs.ref && format('caller-{0}', github.run_id) || github.ref }}
  cancel-in-progress: ${{ !inputs.ref && github.event_name != 'workflow_call' && github.event_name != 'workflow_dispatch' }}

jobs:
  # Diagnostic-only job. Unlike the nightly jobs below, this intentionally does
  # not run for job_select=all; it must be selected explicitly.
  aiter-cktile-jit-probe-rocm720:
    if: (github.repository == 'sgl-project/sglang' || github.event_name == 'pull_request') && contains(format(',{0},', inputs.job_filter || inputs.job_select), ',aiter-cktile-jit-probe-rocm720,')
    name: AITER CKTile cold-JIT probe (${{ matrix.case_name }})
    runs-on: linux-mi35x-gpu-1
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        include:
          - case_name: new-32
            aiter_commit: 2174467dfb06ad885bb973aa73dd001222de1469
            patch_preload: false
          - case_name: new-16
            aiter_commit: 2174467dfb06ad885bb973aa73dd001222de1469
            patch_preload: true
          - case_name: old-16
            aiter_commit: 9127c94a18e4398e1eba91f6639e910f0994ad02
            patch_preload: false
    env:
      AITER_COMMIT_OVERRIDE: ${{ matrix.aiter_commit }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Ensure VRAM is clear
        run: bash scripts/ci/amd/ensure_vram_clear.sh rocm

      - name: Setup docker (ROCm 7.2)
        run: |
          touch github_summary.md
          bash scripts/ci/amd/amd_ci_start_container.sh --rocm-version rocm720
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Install selected AITER commit
        run: bash scripts/ci/amd/amd_ci_install_dependency.sh --skip-test-time-deps

      - name: Restore kernarg preload count to 16
        if: matrix.patch_preload
        run: |
          set -euo pipefail
          docker exec ci_sglang bash -lc '
            core=/sgl-workspace/aiter/aiter/jit/core.py
            grep -Fq -- "--amdgpu-kernarg-preload-count=32" "$core"
            sed -i "s/--amdgpu-kernarg-preload-count=32/--amdgpu-kernarg-preload-count=16/" "$core"
            grep -n -- "amdgpu-kernarg-preload-count" "$core"
          '

      - name: Verify experiment inputs
        run: |
          set -euo pipefail
          docker exec ci_sglang bash -lc '
            git -C /sgl-workspace/aiter rev-parse HEAD
            grep -n -- "amdgpu-kernarg-preload-count" /sgl-workspace/aiter/aiter/jit/core.py
            python3 -c "import torch; print(torch.version.hip); print(torch.cuda.get_device_name(0))"
          '

      - name: Cold-build CKTile module with compiler heartbeat
        id: probe
        timeout-minutes: 30
        env:
          CASE_NAME: ${{ matrix.case_name }}
        run: |
          set -uo pipefail
          module=module_gemm_a8w8_blockscale_bpreshuffle_cktile
          probe_log="aiter-cktile-jit-${CASE_NAME}.log"

          # The AITER checkout is fresh, but assert a cold module-specific state
          # so image contents or a partial prior build cannot bias the result.
          docker exec ci_sglang bash -lc "
            rm -f /sgl-workspace/aiter/aiter/jit/${module}.so
            rm -f /sgl-workspace/aiter/aiter/jit/build/lock_${module}
            rm -rf /sgl-workspace/aiter/aiter/jit/build/${module}
          "

          started=$(date +%s)
          docker exec \
            -e GPU_ARCHS=gfx950 \
            -e AITER_LOG_MORE=1 \
            -e PROBE_CASE_NAME="${CASE_NAME}" \
            ci_sglang \
            timeout --signal=TERM --kill-after=60s 25m \
            python3 -u /sglang-checkout/scripts/ci/amd/aiter_cktile_jit_probe.py \
            >"${probe_log}" 2>&1 &
          probe_pid=$!

          while kill -0 "${probe_pid}" 2>/dev/null; do
            now=$(date +%s)
            echo "[heartbeat] case=${CASE_NAME} elapsed=$((now - started))s utc=$(date -u +%FT%TZ)"
            tail -n 20 "${probe_log}" || true
            docker exec ci_sglang bash -lc "
              ps -eo pid,ppid,etimes,stat,pcpu,pmem,comm,args --sort=-pcpu \
                | grep -E '[h]ipcc|[c]lang\\+\\+|[c]lang-[0-9]|[n]inja|aiter_cktile_jit_probe' \
                | head -n 40 || true
              find /sgl-workspace/aiter/aiter/jit/build/${module} \
                -maxdepth 3 -type f -printf '%s %TY-%Tm-%TdT%TH:%TM:%TS %p\\n' 2>/dev/null \
                | sort -nr | head -n 15 || true
            "
            sleep 60
          done

          set +e
          wait "${probe_pid}"
          probe_rc=$?
          set -e
          finished=$(date +%s)

          echo "[result] case=${CASE_NAME} rc=${probe_rc} elapsed=$((finished - started))s"
          cat "${probe_log}"
          docker exec ci_sglang bash -lc "
            ls -lh /sgl-workspace/aiter/aiter/jit/${module}.so 2>/dev/null || true
            ps -eo pid,ppid,etimes,stat,pcpu,pmem,comm,args \
              | grep -E '[h]ipcc|[c]lang\\+\\+|[c]lang-[0-9]|[n]inja|aiter_cktile_jit_probe' || true
          "
          exit "${probe_rc}"

      - name: Upload probe log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aiter-cktile-jit-${{ matrix.case_name }}
          path: aiter-cktile-jit-${{ matrix.case_name }}.log
          if-no-files-found: warn

      - name: Summarize probe
        if: always()
        run: |
          {
            echo "### AITER CKTile cold-JIT probe"
            echo "- case: \`${{ matrix.case_name }}\`"
            echo "- AITER: \`${{ matrix.aiter_commit }}\`"
            echo "- preload patched to 16: \`${{ matrix.patch_preload }}\`"
            echo "- probe outcome: \`${{ steps.probe.outcome }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # Diagnostic-only job. Compare the exact DSV4 Pro failure shapes with the
  # current tuned routes, the routes before AITER #4202, and the old AITER.
  aiter-dsv4-a8w8-route-probe-rocm720:
    if: (github.repository == 'sgl-project/sglang' || github.event_name == 'pull_request') && contains(format(',{0},', inputs.job_filter || inputs.job_select), ',aiter-dsv4-a8w8-route-probe-rocm720,')
    name: AITER DSV4 A8W8 route probe (${{ matrix.case_name }})
    runs-on: linux-mi35x-gpu-1
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        include:
          - case_name: pro-new-routes
            shape_name: pro
            aiter_commit: 2174467dfb06ad885bb973aa73dd001222de1469
            restore_old_routes: false
          - case_name: pro-new-old-routes
            shape_name: pro
            aiter_commit: 2174467dfb06ad885bb973aa73dd001222de1469
            restore_old_routes: true
          - case_name: pro-old
            shape_name: pro
            aiter_commit: 9127c94a18e4398e1eba91f6639e910f0994ad02
            restore_old_routes: false
          - case_name: pro-mtp-new-routes
            shape_name: pro-mtp
            aiter_commit: 2174467dfb06ad885bb973aa73dd001222de1469
            restore_old_routes: false
          - case_name: pro-mtp-new-old-routes
            shape_name: pro-mtp
            aiter_commit: 2174467dfb06ad885bb973aa73dd001222de1469
            restore_old_routes: true
          - case_name: pro-mtp-old
            shape_name: pro-mtp
            aiter_commit: 9127c94a18e4398e1eba91f6639e910f0994ad02
            restore_old_routes: false
    env:
      AITER_COMMIT_OVERRIDE: ${{ matrix.aiter_commit }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Ensure VRAM is clear
        run: bash scripts/ci/amd/ensure_vram_clear.sh rocm

      - name: Setup docker (ROCm 7.2)
        run: |
          touch github_summary.md
          bash scripts/ci/amd/amd_ci_start_container.sh --rocm-version rocm720
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Install selected AITER commit
        run: bash scripts/ci/amd/amd_ci_install_dependency.sh --skip-test-time-deps

      - name: Restore pre-#4202 DeepSeek routes
        if: matrix.restore_old_routes
        run: |
          docker exec ci_sglang bash -lc '
            set -euo pipefail
            base=95abba4755d22bab343db04b79b6840c4f44a581^
            repo=/sgl-workspace/aiter
            for file in \
              aiter/configs/model_configs/a8w8_blockscale_bpreshuffle_tuned_gemm_dsv3.csv \
              aiter/configs/model_configs/dsv4_a8w8_blockscale_bpreshuffle_tuned_gemm.csv; do
              git -C "$repo" show "$base:$file" > "$repo/$file"
            done
            rm -rf /tmp/aiter_configs
            git -C "$repo" diff --stat
          '

      - name: Verify experiment inputs
        run: |
          docker exec ci_sglang bash -lc '
            git -C /sgl-workspace/aiter rev-parse HEAD
            git -C /sgl-workspace/aiter status --short
            python3 -c "import torch; print(torch.version.hip); print(torch.cuda.get_device_name(0))"
          '

      - name: Run routed GEMM and CUDA graph probe
        id: probe
        timeout-minutes: 35
        env:
          CASE_NAME: ${{ matrix.case_name }}
          SHAPE_NAME: ${{ matrix.shape_name }}
        run: |
          set -o pipefail
          docker exec \
            -e AITER_LOG_MORE=1 \
            -e AITER_LOG_TUNED_CONFIG=1 \
            ci_sglang \
            timeout --signal=TERM --kill-after=60s 30m \
            python3 -u /sglang-checkout/scripts/ci/amd/aiter_dsv4_a8w8_route_probe.py \
              --shape "${SHAPE_NAME}" \
            2>&1 | tee "aiter-dsv4-a8w8-${CASE_NAME}.log"

      - name: Upload probe log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aiter-dsv4-a8w8-${{ matrix.case_name }}
          path: aiter-dsv4-a8w8-${{ matrix.case_name }}.log
          if-no-files-found: warn

      - name: Summarize probe
        if: always()
        run: |
          {
            echo "### AITER DSV4 A8W8 route probe"
            echo "- case: \`${{ matrix.case_name }}\`"
            echo "- shape: \`${{ matrix.shape_name }}\`"
            echo "- AITER: \`${{ matrix.aiter_commit }}\`"
            echo "- restored pre-#4202 routes: \`${{ matrix.restore_old_routes }}\`"
            echo "- probe outcome: \`${{ steps.probe.outcome }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ============================================== MI30x ROCm 7.2 Unit Tests ==============================================
  # 1-GPU Unit Tests - LoRA, debug utils, scheduler, etc. (MI30x ROCm 7.2)

  # ==============================================================================
  # 1-GPU Unit Tests (MI30x + MI35x)
  # ==============================================================================

  nightly-test-1-gpu-unit-rocm720:
    if: (github.repository == 'sgl-project/sglang' || github.event_name == 'pull_request') && (!(inputs.job_filter || inputs.job_select) || (inputs.job_filter || inputs.job_select) == 'all' || contains(format(',{0},', inputs.job_filter || inputs.job_select), ',nightly-test-1-gpu-unit-rocm720,'))
    runs-on: linux-mi325-1gpu-sglang
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Ensure VRAM is clear
        run: bash scripts/ci/amd/ensure_vram_clear.sh rocm

      - name: Setup docker (ROCm 7.2)
        run: |
          touch github_summary.md
          bash scripts/ci/amd/amd_ci_start_container.sh --rocm-version rocm720
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Install dependencies
        run: bash scripts/ci/amd/amd_ci_install_dependency.sh
      - name: Nightly Unit Test ROCm 7.2 (1-GPU)
        timeout-minutes: 90
        run: |
          bash scripts/ci/amd/amd_ci_exec.sh -w /sglang-checkout/test \
            -e GITHUB_STEP_SUMMARY="/sglang-checkout/github_summary.md" \
            python3 run_suite.py --hw amd --suite nightly-amd-1-gpu --nightly --timeout-per-file 900 ${{ (github.event_name == 'schedule' || inputs.continue_on_error) && '--continue-on-error' || '' }} || TEST_EXIT_CODE=$?
          echo "$(<github_summary.md )" >> $GITHUB_STEP_SUMMARY || true
          exit ${TEST_EXIT_CODE:-0}

  nightly-test-1-gpu-kernel-rocm720:
    if: (github.repository == 'sgl-project/sglang' || github.event_name == 'pull_request') && (!(inputs.job_filter || inputs.job_select) || (inputs.job_filter || inputs.job_select) == 'all' || contains(format(',{0},', inputs.job_filter || inputs.job_select), ',nightly-test-1-gpu-kernel-rocm720,'))
    runs-on: linux-mi325-1gpu-sglang
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Ensure VRAM is clear
        run: bash scripts/ci/amd/ensure_vram_clear.sh rocm

      - name: Setup docker (ROCm 7.2)
        run: |
          touch github_summary.md
          bash scripts/ci/amd/amd_ci_start_container.sh --rocm-version rocm720
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Install dependencies
        run: bash scripts/ci/amd/amd_ci_install_dependency.sh
      - name: Nightly Kernel Benchmark ROCm 7.2 (1-GPU)
        timeout-minutes: 60
        run: |
          bash scripts/ci/amd/amd_ci_exec.sh -w /sglang-checkout/test \
            -e GITHUB_STEP_SUMMARY="/sglang-checkout/github_summary.md" \
            python3 run_suite.py --hw amd --suite nightly-amd-kernel-1-gpu --nightly --timeout-per-file 900 ${{ (github.event_name == 'schedule' || inputs.continue_on_error) && '--continue-on-error' || '' }} || TEST_EXIT_CODE=$?
          echo "$(<github_summary.md )" >> $GITHUB_STEP_SUMMARY || true
          exit ${TEST_EXIT_CODE:-0}

  nightly-test-1-gpu-mi35x-rocm720:
    if: (github.repository == 'sgl-project/sglang' || github.event_name == 'pull_request') && (!(inputs.job_filter || inputs.job_select) || (inputs.job_filter || inputs.job_select) == 'all' || contains(format(',{0},', inputs.job_filter || inputs.job_select), ',nightly-test-1-gpu-mi35x-rocm720,'))
    runs-on: linux-mi35x-gpu-1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Ensure VRAM is clear
        run: bash scripts/ci/amd/ensure_vram_clear.sh rocm

      - name: Setup docker (ROCm 7.2)
        run: |
          touch github_summary.md
          bash scripts/ci/amd/amd_ci_start_container.sh --rocm-version rocm720
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Install dependencies
        run: |
          bash scripts/ci/amd/amd_ci_install_dependency.sh
      - name: Nightly Test MI35x ROCm 7.2 (1-GPU)
        timeout-minutes: 90
        run: |
          bash scripts/ci/amd/amd_ci_exec.sh -w /sglang-checkout/test \
            -e GITHUB_STEP_SUMMARY="/sglang-checkout/github_summary.md" \
            python3 run_suite.py --hw amd --suite nightly-amd-1-gpu-mi35x --nightly --timeout-per-file 900 ${{ (github.event_name == 'schedule' || inputs.continue_on_error) && '--continue-on-error' || '' }} || TEST_EXIT_CODE=$?
          echo "$(<github_summary.md )" >> $GITHUB_STEP_SUMMARY || true
          exit ${TEST_EXIT_CODE:-0}

  # ==============================================================================
  # 2-GPU and 4-GPU Tests (MI30x + MI35x)
  # ==============================================================================

  nightly-accuracy-2-gpu-rocm720:
    if: (github.repository == 'sgl-project/sglang' || github.event_name == 'pull_request') && (!(inputs.job_filter || inputs.job_select) || (inputs.job_filter || inputs.job_select) == 'all' || contains(format(',{0},', inputs.job_filter || inputs.job_select), ',nightly-accuracy-2-gpu-rocm720,'))
    runs-on: linux-mi325-2gpu-sglang
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Ensure VRAM is clear
        run: bash scripts/ci/amd/ensure_vram_clear.sh rocm

      - name: Setup docker (ROCm 7.2)
        run: |
          touch github_summary.md
          bash scripts/ci/amd/amd_ci_start_container.sh --rocm-version rocm720
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Install dependencies
        run: bash scripts/ci/amd/amd_ci_install_dependency.sh
      - name: Nightly Test ROCm 7.2 (2-GPU)
        run: |
          > github_summary.md  # Clear summary file
