name: PR Test (XPU)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref (branch, tag, or SHA) to test. If not provided, uses the default branch.'
        required: false
        type: string
        default: ''
      run_all_tests:
        description: "Run all tests (for releasing or testing purpose)"
        required: false
        type: boolean
        default: false

concurrency:
  group: pr-test-xpu-${{ inputs.ref || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_call' }}

jobs:
  # ==================== Check Changes ==================== #
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      main_package: ${{ steps.filter.outputs.main_package || steps.run-mode.outputs.run_all_tests }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Determine run mode
        id: run-mode
        run: |
          # Run all tests for workflow_call (when ref input is provided)
          # Note: github.event_name is inherited from caller, so we detect workflow_call by checking inputs.ref
          if [[ "${{ inputs.run_all_tests }}" == "true" ]]; then
            echo "run_all_tests=true" >> $GITHUB_OUTPUT
            echo "Run mode: ALL TESTS (run_all_tests=${{ inputs.run_all_tests }})"
          else
            echo "run_all_tests=false" >> $GITHUB_OUTPUT
            echo "Run mode: FILTERED (triggered by ${{ github.event_name }})"
          fi
      - name: Detect file changes
        id: filter
        uses: dorny/paths-filter@v3
        if: steps.run-mode.outputs.run_all_tests != 'true'
        with:
          filters: |
            main_package:
              - "python/sglang/!(multimodal_gen)/**/!(*.md)"
              - "python/pyproject_xpu.toml"
              - "test/**/!(*.md)"
              - "sgl-kernel/**/!(*.md|THIRDPARTYNOTICES.txt|LICENSE)"
              - ".github/workflows/pr-test-xpu.yml"
              - "docker/xpu.Dockerfile"

  # ==================== PR Gate ==================== #
  pr-gate:
    needs: check-changes
    if: needs.check-changes.outputs.main_package == 'true'
    uses: ./.github/workflows/pr-gate.yml
    secrets: inherit

  build-and-test:
    needs: [check-changes, pr-gate]
    if: needs.check-changes.outputs.main_package == 'true'
    runs-on: b70
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}

      - name: Build Docker image
        run: |
          # For PR events, use PR head repo/branch; for push events, use current repo/branch
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            REPO="${{ github.event.pull_request.head.repo.clone_url }}"
            BRANCH="${{ github.head_ref }}"
          else
            REPO="https://github.com/${{ github.repository }}.git"
            BRANCH="${{ github.ref_name }}"
          fi
          echo "Building with REPO=$REPO, BRANCH=$BRANCH"
          TAG="bmg${RUNNER_SLOT:+-s$RUNNER_SLOT}"
          docker build \
            --build-arg SG_LANG_REPO=$REPO \
            --build-arg SG_LANG_BRANCH=$BRANCH \
            --no-cache --progress=plain -f docker/xpu.Dockerfile -t xpu_sglang_main:${TAG} .

      - name: Run container
        id: start_container
        run: |
          TAG="bmg${RUNNER_SLOT:+-s$RUNNER_SLOT}"
          # Build --device args from GPU_RENDER_DEVICES / GPU_CARD_DEVICES (set via runner .env).
          # On single-runner hosts where these are empty, fall back to mounting all of /dev/dri.
          DEVICE_ARGS=""
          if [[ -n "${GPU_RENDER_DEVICES}${GPU_CARD_DEVICES}" ]]; then
            for d in ${GPU_RENDER_DEVICES//,/ } ${GPU_CARD_DEVICES//,/ }; do
              DEVICE_ARGS="$DEVICE_ARGS --device $d"
            done
          else
            DEVICE_ARGS="--device /dev/dri"
          fi
          # CPU / memory pinning (empty -> no pinning on single-runner hosts)
          CPUSET_ARGS=""
          [[ -n "$CPU_CORES" ]] && CPUSET_ARGS="$CPUSET_ARGS --cpuset-cpus=$CPU_CORES"
          [[ -n "$NUMA_NODE" ]] && CPUSET_ARGS="$CPUSET_ARGS --cpuset-mems=$NUMA_NODE"

          container_id=$(docker run -dt \
            --name ci_sglang_xpu${RUNNER_SLOT:+_s$RUNNER_SLOT} \
            $CPUSET_ARGS \
            --group-add 992 \
            --group-add $(getent group video | cut -d: -f3) \
            --group-add $(getent group render | cut -d: -f3) \
            -v $HOME/.cache/huggingface:/root/.cache/huggingface \
            --device /dev/dri \
            -v /dev/dri/by-path:/dev/dri/by-path \
            $DEVICE_ARGS \
            -e ZE_AFFINITY_MASK=0,1,2,3 \
            -e HF_TOKEN="$(cat ~/huggingface_token.txt)" \
            xpu_sglang_main:${TAG})
          echo "Started container: $container_id"
          echo "container_id=$container_id" >> "$GITHUB_OUTPUT"

      - name: Install Dependency
        timeout-minutes: 20
        run: |
          cid="${{ steps.start_container.outputs.container_id }}"
          docker exec "$cid" /home/sdp/miniforge3/envs/py3.12/bin/python3 -m pip install --upgrade pip
          docker exec "$cid" /home/sdp/miniforge3/envs/py3.12/bin/python3 -m pip install pytest expecttest ray huggingface_hub
          docker exec "$cid" /home/sdp/miniforge3/envs/py3.12/bin/python3 -m pip uninstall -y flashinfer-python
          docker exec "$cid" /bin/bash -c '/home/sdp/miniforge3/envs/py3.12/bin/hf auth login --token ${HF_TOKEN} '


      - name: Run E2E Bfloat16 tests
        timeout-minutes: 20
        run: |
          cid="${{ steps.start_container.outputs.container_id }}"
          docker exec "$cid" bash -c "source /home/sdp/miniforge3/bin/activate && conda activate py3.12 && cd /home/sdp/sglang/test/srt && python3 run_suite.py --suite per-commit-xpu"
      - name: Cleanup container
        if: always()
        run: |
          cid="${{ steps.start_container.outputs.container_id }}"
          docker rm -f "$cid" || true

  finish:
    if: always()
    needs: [build-and-test, pr-gate]
    runs-on: ubuntu-latest
    steps:
      - name: Check job status
        run: |
          result="${{ needs.build-and-test.result }}"
          if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
            echo "Job failed with result: $result"
            exit 1
          fi
          echo "All jobs completed successfully (result: $result)"
          exit 0
