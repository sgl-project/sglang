    with:
      runner: linux-aarch64-a3-0
      test_type: ${{ matrix.test_config.test_type }}
      test_config_name: ${{ matrix.test_config.name }}
      prefill_size: ${{ matrix.test_config.prefill_size }}
      decode_size: ${{ matrix.test_config.decode_size }}
      router_size: ${{ matrix.test_config.router_size }}
      test_case: ${{ matrix.test_config.test_case }}
      image: ${{ needs.set-image-config.outputs.image_a3 }}
      install_sglang_from_source: false
      prefill_decode_deployment: ${{ matrix.test_config.prefill_decode_deployment }}
      transformers_version: ''

  nightly-poc-multi-node-mix-tests:
    name: multi-node-mix-poc
    needs: [ set-image-config, nightly-poc-single-node-tests ]
    if: ${{ !cancelled() && (needs.set-image-config.outputs.test_scope == 'all' || needs.set-image-config.outputs.test_scope == 'poc') }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        test_config:
          # glm-w4a8
          - name: test_npu_glm5_1_w4a8_16p_gpqa
            node_size: 2
            test_case: test/registered/ascend/accuracy/test_npu_glm5_1_w4a8_16p_gpqa.py
          - name: test_npu_glm5_1_w4a8_16p_aime2025
            node_size: 2
            test_case: test/registered/ascend/accuracy/test_npu_glm5_1_w4a8_16p_aime2025.py
            # GLM5 16p additional performance
          - name: test_npu_glm5_1_w4a8_16p_in3k5_out1k5_50ms
            node_size: 2
            test_case: test/registered/ascend/performance/test_npu_glm5_1_w4a8_16p_in3k5_out1k5_50ms.py
