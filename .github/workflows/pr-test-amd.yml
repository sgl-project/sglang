          - id: multimodal-gen-test-1-gpu-amd-1
            job: multimodal-gen-test-1-gpu-amd
            runner: linux-mi300-1gpu-sglang
            part: "1"
          - id: multimodal-gen-test-1-gpu-amd-2
            job: multimodal-gen-test-1-gpu-amd
