# Configuration for the GitHub Labeler action
# Automatically adds labels to PRs based on the files changed

# Router specific (Rust code in sgl-model-gateway)
model-gateway:
  - changed-files:
    - any-glob-to-any-file: 'sgl-model-gateway/**/*'

# Kernel specific
sgl-kernel:
  - changed-files:
    - any-glob-to-any-file: 'sgl-kernel/**/*'

# JIT kernel specific
jit-kernel:
  - changed-files:
    - any-glob-to-any-file: 'python/sglang/jit_kernel/**/*'

# Documentation
documentation:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.md'
      - '**/*.mdx'
      - 'docs/**/*'
      - 'README*'
      - 'docs_new/**/*'

# Dependencies
dependencies:
  - changed-files:
    - any-glob-to-any-file:
      - '**/requirements*.txt'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '**/pyproject*.toml'
      - '**/setup.py'
      - '**/poetry.lock'
      - '**/package.json'
      - '**/package-lock.json'

# Multi-modal
Multi-modal:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*multimodal*'
      - '**/*vision*'
      - '**/*vlm*'

# Diffusion
diffusion:
  - changed-files:
    - any-glob-to-any-file: 'python/sglang/multimodal_gen/**/*'

# LoRA
lora:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*lora*'

# Quantization
quant:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*quant*'
      - '**/*quantization*'

# Speculative decoding
speculative-decoding:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*speculative*'

# AMD specific
amd:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*amd*'
      - '**/*rocm*'

# NPU specific
npu:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*npu*'
      - '**/*ascend*'

# Blackwell
blackwell:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*nvfp4*'
      - 'sgl-kernel/csrc/attention/cutlass_sm100_mla/**/*'
      - 'python/sglang/srt/layers/attention/trtllm_mla_backend.py'
      - 'python/sglang/srt/layers/attention/trtllm_mha_backend.py'

# DeepSeek specific
deepseek:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*deepseek*'

# HiCache
hicache:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*hicache*'

# Deterministic
deterministic:
  - changed-files:
    - any-glob-to-any-file: 'python/sglang/srt/batch_invariant_ops/**/*'

# Piecewise CUDA Graph
piecewise-cuda-graph:
  - changed-files:
    - any-glob-to-any-file: 'python/sglang/srt/compilation/**/*'

# Moore Threads specific
mthreads:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*mthreads*'
      - '**/*musa*'

# ─── tags added for tag-gated nightly migration ─────────────────────────────
# These labels drive the --include-tags pull-in in pr-test.yml so a PR that
# touches the relevant code paths automatically runs the matching nightly
# tests in addition to the simplified per-commit set.

# Attention backends (FA3, torch-native, Triton SWA, FP8-KV-on-Triton, etc.)
attention-backend:
  - changed-files:
    - any-glob-to-any-file: 'python/sglang/srt/layers/attention/**/*'

# Mixture-of-Experts (fused-MoE, EP, DeepEP, CuteDSL-MoE, routed-experts)
moe:
  - changed-files:
    - any-glob-to-any-file: 'python/sglang/srt/layers/moe/**/*'

# RL / online-weight-sync surface (update_weights_from_*, load_weights_from_remote_instance,
# release_memory_occupation). NOT engine.py — that path is too broad and triggers
# false-positive RL pulls on unrelated changes.
rl:
  - changed-files:
    - any-glob-to-any-file: 'python/sglang/srt/weight_sync/**/*'

# Scoring / embeddings / pooled-hidden-states (distinct surface from generation)
scoring:
  - changed-files:
    - any-glob-to-any-file:
      - 'python/sglang/srt/entrypoints/openai/serving_embedding*'
      - 'python/sglang/srt/entrypoints/openai/serving_score*'
      - 'python/sglang/srt/entrypoints/engine_score_mixin.py'

# Streaming-session lifecycle (control / abort / latency)
session:
  - changed-files:
    - any-glob-to-any-file:
      - 'python/sglang/srt/session/**/*'
      - 'python/sglang/srt/entrypoints/http_server*'
      - 'python/sglang/srt/entrypoints/openai/serving_chat*'

# Performance benches + latency hot-paths. Anyone touching these should re-run
# perf nightly tests; without the auto-glob, perf regressions could only be
# caught by a manual `perf` label, which is unreliable.
perf:
  - changed-files:
    - any-glob-to-any-file:
      - 'python/sglang/bench_*.py'
      - 'python/sglang/srt/model_executor*'
      - 'python/sglang/srt/forward_batch_info*'

# Scheduler internals (priority, batching). Catches test_priority_scheduling
# nightly when the scheduler changes.
scheduler:
  - changed-files:
    - any-glob-to-any-file:
      - 'python/sglang/srt/managers/scheduler*'
      - 'python/sglang/srt/managers/schedule_batch*'

# Model-architecture coverage (catches test_generation_models nightly when
# any model file changes).
model-coverage:
  - changed-files:
    - any-glob-to-any-file: 'python/sglang/srt/models/**/*'
