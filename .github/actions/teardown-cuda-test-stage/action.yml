name: Teardown CUDA Test Stage
description: >-
  Boilerplate run at the end of every CUDA test stage in pr-test.yml:
  upload any cuda coredumps on failure, then clean up the venv.
inputs:
  artifact_suffix:
    description: >-
      Suffix appended to the cuda-coredump artifact name. Typically
      `${{ matrix.partition }}` or `${{ matrix.part }}` for partitioned
      stages; empty for non-partitioned stages.
    default: ''
runs:
  using: composite
  steps:
    - uses: ./.github/actions/upload-cuda-coredumps
      if: ${{ failure() }}
      with:
        artifact-suffix: ${{ inputs.artifact_suffix }}

    - name: Cleanup venv
      if: ${{ always() }}
      shell: bash
      run: bash scripts/ci/cuda/ci_cleanup_venv.sh
