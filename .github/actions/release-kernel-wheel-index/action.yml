name: Release sgl-kernel wheels and update wheel index
description: |
  Publish wheels in `wheel-dir` to a GitHub Release on the wheel-index repo
  (defaults to sgl-project/whl), then regenerate and push the per-backend
  pip index (cuXXX/, rocmXXX/, musaXX/) using
  scripts/update_kernel_whl_index.py.

inputs:
  backend:
    description: 'Backend the wheels target. One of: cuda, rocm, musa.'
    required: true
  version:
    description: 'Backend version label (e.g. 130, 700, 43). Passed verbatim as --<backend> <version>.'
    required: true
  whl-token:
    description: 'PAT with write access to the wheel-index repo.'
    required: true
  tag-name:
    description: 'Override release tag. Empty = read sgl-kernel/python/sgl_kernel/version.py.'
    required: false
    default: ''
  whl-repo:
    description: 'Wheel index repo, in <owner>/<name> form.'
    required: false
    default: 'sgl-project/whl'
  wheel-dir:
    description: 'Directory containing the wheels to publish, relative to the workspace.'
    required: false
    default: 'sgl-kernel/dist'

runs:
  using: composite
  steps:
    - name: Validate backend
      shell: bash
      env:
        BACKEND: ${{ inputs.backend }}
      run: |
        case "$BACKEND" in
          cuda|rocm|musa) ;;
          *)
            echo "::error::Invalid backend '$BACKEND'. Must be one of: cuda, rocm, musa." >&2
            exit 1
            ;;
        esac

    - name: Resolve tag name
      id: tag
      shell: bash
      env:
        OVERRIDE_TAG: ${{ inputs.tag-name }}
      run: |
        if [ -n "$OVERRIDE_TAG" ]; then
          echo "value=$OVERRIDE_TAG" >> "$GITHUB_OUTPUT"
        else
          ver=$(cut -d'"' -f2 sgl-kernel/python/sgl_kernel/version.py)
          echo "value=v${ver}" >> "$GITHUB_OUTPUT"
        fi

    - name: Publish wheels to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.value }}
        repository: ${{ inputs.whl-repo }}
        token: ${{ inputs.whl-token }}
        files: ${{ inputs.wheel-dir }}/*

    - name: Clone wheel index
      shell: bash
      env:
        WHL_TOKEN: ${{ inputs.whl-token }}
        WHL_REPO: ${{ inputs.whl-repo }}
      run: git clone "https://oauth2:${WHL_TOKEN}@github.com/${WHL_REPO}.git" sgl-whl

    - name: Update wheel index
      shell: bash
      env:
        BACKEND: ${{ inputs.backend }}
        VERSION: ${{ inputs.version }}
      run: python3 scripts/update_kernel_whl_index.py "--${BACKEND}" "${VERSION}"

    - name: Push wheel index
      shell: bash
      working-directory: sgl-whl
      run: |
        git config --local user.name "sglang-bot"
        git config --local user.email "sglangbot@gmail.com"
        git add -A
        git commit -m "update whl index"
        git push
