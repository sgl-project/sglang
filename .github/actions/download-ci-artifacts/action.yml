name: Download CI Artifacts
description: Download current-run artifacts without depending on actions/download-artifact.

inputs:
  path:
    description: Directory to place downloaded artifact files.
    required: true
  pattern:
    description: Artifact name pattern.
    required: true
  github-token:
    description: GitHub token for API calls.
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - name: Download artifacts
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        INPUT_PATH: ${{ inputs.path }}
        INPUT_PATTERN: ${{ inputs.pattern }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_RUN_ID: ${{ github.run_id }}
      run: |
        set -euo pipefail

        tmp_dir="$(mktemp -d)"
        cleanup() {
          rm -rf "$tmp_dir"
        }
        trap cleanup EXIT

        mkdir -p "$INPUT_PATH"
        python3 - "$tmp_dir" <<'PY'
        import fnmatch
        import io
        import json
        import os
        import sys
        import urllib.error
        import urllib.request
        import zipfile

        tmp_dir = sys.argv[1]
        repo = os.environ["GITHUB_REPOSITORY"]
        run_id = os.environ["GITHUB_RUN_ID"]
        pattern = os.environ["INPUT_PATTERN"]
        token = os.environ["GH_TOKEN"]

        def request_json(url):
            request = urllib.request.Request(
                url,
                headers={
                    "Accept": "application/vnd.github+json",
                    "Authorization": f"Bearer {token}",
                    "X-GitHub-Api-Version": "2022-11-28",
                },
            )
            with urllib.request.urlopen(request, timeout=60) as response:
                return json.load(response)

        class NoRedirectHandler(urllib.request.HTTPRedirectHandler):
            def redirect_request(self, req, fp, code, msg, headers, newurl):
                return None

        def resolve_download_url(url):
            request = urllib.request.Request(
                url,
                headers={
                    "Accept": "application/vnd.github+json",
                    "Authorization": f"Bearer {token}",
                    "X-GitHub-Api-Version": "2022-11-28",
                },
            )
            opener = urllib.request.build_opener(NoRedirectHandler)
            try:
                with opener.open(request, timeout=60) as response:
                    return response.geturl()
            except urllib.error.HTTPError as error:
                if error.code in (301, 302, 303, 307, 308):
                    location = error.headers.get("Location")
                    if location:
                        return location
                raise

        artifacts = []
        page = 1
        while True:
            payload = request_json(
                f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/artifacts"
                f"?per_page=100&page={page}"
            )
            artifacts.extend(payload.get("artifacts", []))
            if len(artifacts) >= payload.get("total_count", len(artifacts)):
                break
            page += 1

        matches = [
            artifact
            for artifact in artifacts
            if fnmatch.fnmatch(artifact.get("name", ""), pattern)
        ]
        if not matches:
            print(f"::error::No artifacts matched pattern '{pattern}'")
            sys.exit(1)

        for artifact in matches:
            download_url = resolve_download_url(artifact["archive_download_url"])
            request = urllib.request.Request(download_url)
            with urllib.request.urlopen(request, timeout=300) as response:
                with zipfile.ZipFile(io.BytesIO(response.read())) as archive:
                    archive.extractall(tmp_dir)
        PY

        found=0
        while IFS= read -r file; do
          found=1
          mv -f "$file" "$INPUT_PATH/"
        done < <(find "$tmp_dir" -type f)

        if [[ "$found" -ne 1 ]]; then
          echo "::error::No files were downloaded for artifact pattern '$INPUT_PATTERN'"
          exit 1
        fi

        find "$INPUT_PATH" -maxdepth 1 -type f -printf 'Downloaded artifact file: %f\n'
