name: Run CUDA Test Suite
description: >-
  Runs `run_suite.py` for one CUDA test stage. Wraps the parameterised
  invocation that every stage shares (cd test, run_suite.py with hw=cuda,
  suite name, optional partition flags, optional --timeout-per-file, and the
  continue-on-error flag). Composite-action steps cannot use timeout-minutes
  natively, so the per-suite wall-clock cap is enforced via bash `timeout`
  (SIGTERM then SIGKILL after a short grace period -- same signal pair as
  GitHub Actions' native step timeout).
inputs:
  suite_name:
    description: 'Suite name passed via --suite (e.g. stage-b-test-1-gpu-small).'
    required: true
  partition_size:
    description: >-
      Value passed to --auto-partition-size. Empty (default) omits both
      partition flags entirely, matching the non-partitioned stages.
    default: ''
  partition_id:
    description: >-
      Value passed to --auto-partition-id. Typically ${{ matrix.partition }}
      or ${{ matrix.part }}. Ignored when partition_size is empty.
    default: ''
  run_timeout_minutes:
    description: 'Wall-clock cap (in minutes) for the run_suite.py invocation, enforced via bash `timeout`.'
    default: '30'
  timeout_per_file:
    description: >-
      Value forwarded to run_suite.py --timeout-per-file. Empty (default)
      omits the flag, so run_suite.py applies its own default.
    default: ''
  continue_on_error_flag:
    description: >-
      Empty string or the literal `--continue-on-error`. Callers typically
      forward `${{ needs.check-changes.outputs.continue_on_error == 'true'
      && '--continue-on-error' || '' }}`.
    required: true
runs:
  using: composite
  steps:
    - name: Run test
      shell: bash
      env:
        CONTINUE_ON_ERROR_FLAG: ${{ inputs.continue_on_error_flag }}
      run: |
        cd test
        timeout ${{ inputs.run_timeout_minutes }}m python3 run_suite.py \
          --hw cuda --suite ${{ inputs.suite_name }} \
          ${{ inputs.partition_size && format('--auto-partition-id {0} --auto-partition-size {1}', inputs.partition_id, inputs.partition_size) || '' }} \
          ${{ inputs.timeout_per_file && format('--timeout-per-file {0}', inputs.timeout_per_file) || '' }} \
          $CONTINUE_ON_ERROR_FLAG
