name: Run CUDA Test Suite
description: >-
  Runs `run_suite.py` for one CUDA test stage. Partition id is read from the
  matrix context; partition size is looked up from the `partitions` JSON
  (check-changes.outputs.partitions) keyed by suite name. Composite-action
  steps cannot use `timeout-minutes` natively, so the per-suite wall-clock cap
  is enforced via bash `timeout` (SIGTERM then SIGKILL after a short grace
  period -- the same signal pair GitHub Actions uses for its native step
  timeout).
inputs:
  suite_name:
    description: 'Suite name passed via --suite (e.g. stage-b-test-1-gpu-small).'
    required: true
  partitions_json:
    description: >-
      The full `partitions` JSON output from check-changes
      (`needs.check-changes.outputs.partitions`). Looked up by `suite_name`
      to derive --auto-partition-size.
    required: true
  run_timeout_minutes:
    description: 'Wall-clock cap (in minutes) for the run_suite.py invocation, enforced via bash `timeout`.'
    default: '30'
  timeout_per_file:
    description: >-
      Value forwarded to run_suite.py --timeout-per-file. Empty (default)
      omits the flag, so run_suite.py applies its own default.
    default: ''
  continue_on_error_flag:
    description: >-
      Empty string or the literal `--continue-on-error`. Callers typically
      forward `${{ needs.check-changes.outputs.continue_on_error == 'true'
      && '--continue-on-error' || '' }}`.
    required: true
runs:
  using: composite
  steps:
    - name: Run test
      shell: bash
      env:
        CONTINUE_ON_ERROR_FLAG: ${{ inputs.continue_on_error_flag }}
        SUITE: ${{ inputs.suite_name }}
        PARTITION_ID: ${{ matrix.partition }}
        PARTITION_SIZE: ${{ fromJson(inputs.partitions_json)[inputs.suite_name].size }}
      run: |
        cd test
        timeout ${{ inputs.run_timeout_minutes }}m python3 run_suite.py \
          --hw cuda --suite "$SUITE" \
          --auto-partition-id "$PARTITION_ID" --auto-partition-size "$PARTITION_SIZE" \
          ${{ inputs.timeout_per_file && format('--timeout-per-file {0}', inputs.timeout_per_file) || '' }} \
          $CONTINUE_ON_ERROR_FLAG
