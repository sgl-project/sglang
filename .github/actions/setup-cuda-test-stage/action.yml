name: Setup CUDA Test Stage
description: >-
  Boilerplate run at the start of every CUDA test stage in pr-test.yml:
  stage-health / maintenance gates, sgl-kernel wheel download (when the PR
  has kernel changes), and install CUDA deps. All runner-specific details
  (install script, download-artifact major version, install timeout) are
  looked up by `runner_config` from scripts/ci/runner_configs.yml.

  Caller must run `actions/checkout` first — composite-action local references
  (`uses: ./...`) cannot bootstrap their own action.yml from an empty workspace.
inputs:
  runner_config:
    description: >-
      The runner-config string declared by register_cuda_ci(stage=..., runner_config=...).
    required: true
  sgl_kernel:
    description: 'check-changes.outputs.sgl_kernel value ("true" or "false").'
    required: true
runs:
  using: composite
  steps:
    - name: Resolve runner_config
      id: rc
      shell: bash
      run: |
        python3 scripts/ci/runner_configs.py '${{ inputs.runner_config }}' >> "$GITHUB_OUTPUT"

    - uses: ./.github/actions/check-stage-health

    - uses: ./.github/actions/check-maintenance

    - name: Download artifacts (v4)
      if: ${{ inputs.sgl_kernel == 'true' && steps.rc.outputs.artifact_version == 'v4' }}
      uses: actions/download-artifact@v4
      with:
        path: sgl-kernel/dist/
        merge-multiple: true
        pattern: wheel-python3.10-cuda*

    - name: Download artifacts (v6)
      if: ${{ inputs.sgl_kernel == 'true' && steps.rc.outputs.artifact_version == 'v6' }}
      uses: actions/download-artifact@v6
      with:
        path: sgl-kernel/dist/
        merge-multiple: true
        pattern: wheel-python3.10-cuda*

    - name: Install dependencies
      shell: bash
      env:
        CUSTOM_BUILD_SGL_KERNEL: ${{ inputs.sgl_kernel }}
      run: |
        timeout ${{ steps.rc.outputs.install_timeout }}m bash ${{ steps.rc.outputs.install }}
