name: Setup CUDA Test Stage
description: >-
  Boilerplate run at the start of every CUDA test stage in pr-test.yml:
  checkout the PR ref, run the stage-health and maintenance gates, download
  the sgl-kernel wheel artifact (when the PR has kernel changes), and install
  the CUDA dependencies. All runner-specific details (install script,
  download-artifact major version, install timeout) are looked up by
  `runner_config` from scripts/ci/runner_configs.py. The PR head SHA / git
  ref are read from workflow-level env (PR_HEAD_SHA, GIT_REF) that pr-test.yml
  exports.
inputs:
  runner_config:
    description: >-
      The runner-config string declared by register_cuda_ci(stage=..., runner_config=...).
    required: true
  sgl_kernel:
    description: 'check-changes.outputs.sgl_kernel value ("true" or "false").'
    required: true
runs:
  using: composite
  steps:
    - name: Resolve runner_config
      id: rc
      shell: bash
      run: |
        python3 scripts/ci/runner_configs.py github_output \
          --runner-config '${{ inputs.runner_config }}' >> "$GITHUB_OUTPUT"

    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ env.PR_HEAD_SHA || env.GIT_REF || github.sha }}

    - uses: ./.github/actions/check-stage-health

    - uses: ./.github/actions/check-maintenance

    - name: Download artifacts (v4)
      if: ${{ inputs.sgl_kernel == 'true' && steps.rc.outputs.artifact_version == 'v4' }}
      uses: actions/download-artifact@v4
      with:
        path: sgl-kernel/dist/
        merge-multiple: true
        pattern: wheel-python3.10-cuda*

    - name: Download artifacts (v6)
      if: ${{ inputs.sgl_kernel == 'true' && steps.rc.outputs.artifact_version == 'v6' }}
      uses: actions/download-artifact@v6
      with:
        path: sgl-kernel/dist/
        merge-multiple: true
        pattern: wheel-python3.10-cuda*

    - name: Install dependencies
      shell: bash
      env:
        CUSTOM_BUILD_SGL_KERNEL: ${{ inputs.sgl_kernel }}
      run: |
        timeout ${{ steps.rc.outputs.install_timeout }}m bash ${{ steps.rc.outputs.install }}
