# Default values for sgl-router.
#
# Override with `helm install ... -f my-values.yaml` or `--set` flags.
# The chart renders four templates: Deployment, Service, ConfigMap (the
# router config), and an optional ServiceMonitor (Prometheus operator).

replicaCount: 2

image:
  repository: lmsysorg/sgl-router
  tag: "0.1.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP
  port: 8090
  # Annotations and labels apply to the Service object only. Use these
  # for ingress integration / scrape labels.
  annotations: {}

# The router config rendered as a ConfigMap and mounted into the pod at
# /etc/sgl-router/sgl-router.yaml. Override per deployment by setting
# `config.*` keys; the schema mirrors `experimental/sgl-router/src/config/types.rs`.
config:
  server:
    host: "0.0.0.0"
    port: 8090

  observability:
    log_level: "info"
    log_format: "json"

  models: []
  # Example (uncomment and edit):
  # models:
  #   - id: "Qwen/Qwen3-0.6B"
  #     tokenizer_path: "/etc/sgl-router/tokenizers/qwen3-0.6b.json"
  #     policy: "cache_aware_zmq"

  discovery:
    backend: "k8s"
    k8s:
      namespace: "default"
      label_selector: "app=sglang"
      # PD-disaggregation via K8s is intentionally rejected at
      # config-load — pod-annotation plumbing isn't there yet (see
      # ConfigError::PdNotImplemented). Use static_file for PD.

  proxy:
    request_timeout_secs: 60

  active_load:
    stale_request_timeout_secs: 300

# Optional pod-level resource limits. The router is CPU-bound on routing
# decisions + I/O-bound on stream pumps; memory scales with worker count
# and the KV-event hash tree.
resources:
  requests:
    cpu: "500m"
    memory: "256Mi"
  limits:
    cpu: "2000m"
    memory: "1Gi"

# Liveness / readiness probes hit the router's own endpoints. `/readyz`
# returns 503 until `AppContext::mark_ready()` has been called by main;
# `/healthz` only checks the process is responsive.
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 3
  periodSeconds: 5

# Graceful-shutdown window — kubelet sends SIGTERM, then waits
# `terminationGracePeriodSeconds` before SIGKILL. The router drains
# in-flight requests during this window. Set this above the longest
# expected generation tail.
terminationGracePeriodSeconds: 120

# When true, a Prometheus Operator `ServiceMonitor` is rendered so the
# operator's controller starts scraping /metrics automatically.
serviceMonitor:
  enabled: false
  # Scrape interval — match your Prometheus default unless you have a
  # reason to override.
  interval: "30s"
  scrapeTimeout: "10s"
  # Extra labels to attach so the operator's selector matches.
  labels: {}

# Workload affinity / tolerations / nodeSelector — passed through to the
# Deployment's pod template.
nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}
podLabels: {}

# Service account for the pod. RBAC for k8s discovery requires `list`/
# `watch` on EndpointSlices in the configured namespace; we don't
# render the Role/RoleBinding here — bring your own service account
# with the right perms via `serviceAccount.name`.
serviceAccount:
  create: false
  name: ""
