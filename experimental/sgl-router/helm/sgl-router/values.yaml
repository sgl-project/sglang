# Default values for sgl-router.
#
# Override with `helm install ... -f my-values.yaml` or `--set` flags.
# The chart renders ConfigMap + Deployment + Service + optional
# ServiceAccount + optional RBAC + optional ServiceMonitor.

replicaCount: 2

image:
  repository: lmsysorg/sgl-router
  # Empty string falls back to .Chart.AppVersion in the Deployment
  # template so a single appVersion bump in Chart.yaml updates both the
  # chart label and the running image tag — no two-edit drift.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP
  # Defaults to config.server.port via a helper; override only when an
  # external L4 LB rewrites the port.
  port: ""
  annotations: {}

# The router config rendered as a ConfigMap and mounted into the pod at
# /etc/sgl-router/sgl-router.yaml. Override per deployment by setting
# `config.*` keys; the schema mirrors `experimental/sgl-router/src/config/types.rs`.
config:
  server:
    host: "0.0.0.0"
    port: 8090

  observability:
    log_level: "info"
    log_format: "json"

  models: []
  # Example (uncomment and edit):
  # models:
  #   - id: "Qwen/Qwen3-0.6B"
  #     tokenizer_path: "/etc/sgl-router/tokenizers/qwen3-0.6b.json"
  #     policy: "cache_aware_zmq"

  # Default to static_file so a fresh `helm install` works without
  # provisioning RBAC. Switch to "k8s" and set `rbac.create: true` to
  # discover workers from EndpointSlices.
  discovery:
    backend: "static_file"
    static_file:
      path: "/etc/sgl-router/workers.toml"
      poll_interval_ms: 1000

  proxy:
    request_timeout_secs: 60

  active_load:
    stale_request_timeout_secs: 300

# Pod-level resource limits. Routing decisions are CPU-bound, streaming
# pumps are I/O-bound, memory scales with worker count + KV-event tree.
resources:
  requests:
    cpu: "500m"
    memory: "256Mi"
  limits:
    cpu: "2000m"
    memory: "1Gi"

# Liveness / readiness probes hit the router's own endpoints. `/readyz`
# returns 503 until the worker registry has at least one entry AND
# `AppContext::mark_ready()` has been called; without the registry
# check the Service would route traffic to a pod whose registry is
# still empty (every request would return 503 no_healthy_workers).
# `/healthz` only checks the process is responsive.
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 3
  periodSeconds: 5

# Graceful-shutdown window. The kubelet sends SIGTERM, then waits
# `terminationGracePeriodSeconds` before SIGKILL. The router drains
# in-flight requests during this window. Set above the longest
# expected generation tail.
terminationGracePeriodSeconds: 120

# Pre-stop hook. distroless images lack `/bin/sh`, so the standard
# `exec: ["sleep", "10"]` recipe doesn't work — use `httpGet`/`sleep`
# (k8s 1.30+) instead. Defaults to k8s 1.30+ native sleep so kube-proxy
# has time to remove the endpoint before the router stops accepting new
# connections; set to `null` (or override) on older clusters.
lifecycle:
  preStop:
    sleep:
      seconds: 10

# Pod-Security-Admission "restricted" requires every pod to declare
# its security posture. Without these blocks the pod is rejected on
# clusters that enforce PSA. Both default to the strictest workable
# settings for sgl-router — the image is built on distroless with a
# nonroot user, so the container can run without privilege escalation.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# Optional Prometheus Operator ServiceMonitor — when `enabled: true` the
# operator's controller starts scraping /metrics automatically.
serviceMonitor:
  enabled: false
  interval: "30s"
  scrapeTimeout: "10s"
  labels: {}

# Workload affinity / tolerations / nodeSelector — passed through to the
# Deployment's pod template.
nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}
podLabels: {}

# ServiceAccount + RBAC. Render when `serviceAccount.create: true`. The
# default off-by-default posture keeps `helm install` minimal — turn
# both on together when using k8s discovery.
serviceAccount:
  create: false
  name: ""
  annotations: {}

# RBAC for `discovery.backend: "k8s"`. Renders a Role + RoleBinding that
# grants get/list/watch on EndpointSlices in the release namespace.
# Without this, the manager hits 403 on every watch and the registry
# stays empty.
rbac:
  create: false

# Extra volumes / volumeMounts to attach to the pod. Use this to mount
# tokenizer files, a static-file worker list, or any other sidecar data.
# Example:
#   extraVolumes:
#     - name: tokenizers
#       configMap:
#         name: my-tokenizers-configmap
#   extraVolumeMounts:
#     - name: tokenizers
#       mountPath: /etc/sgl-router/tokenizers
#       readOnly: true
extraVolumes: []
extraVolumeMounts: []

# Extra env vars on the container. Use this for `RUST_LOG=debug` per-pod
# overrides or secrets injected via a sidecar.
extraEnv: []
