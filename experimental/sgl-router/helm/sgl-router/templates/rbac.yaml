{{- if .Values.rbac.create }}
# K8s discovery (config.discovery.backend == "k8s") watches
# EndpointSlices in the configured namespace. Without these RBAC
# objects the manager hits a 403 on every list/watch and the worker
# registry stays empty. Skipped entirely when the chart is configured
# for the static_file backend.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "sgl-router.fullname" . }}
  labels:
    {{- include "sgl-router.labels" . | nindent 4 }}
rules:
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "sgl-router.fullname" . }}
  labels:
    {{- include "sgl-router.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "sgl-router.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "sgl-router.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
