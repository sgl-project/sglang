apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sgl-router.fullname" . }}
  labels:
    {{- include "sgl-router.labels" . | nindent 4 }}
data:
  # The Rust Config struct (experimental/sgl-router/src/config/types.rs)
  # is serde-derived; YAML and TOML are both accepted via the `.yaml`
  # extension dispatch in Config::from_path.
  sgl-router.yaml: |
    {{- toYaml .Values.config | nindent 4 }}
