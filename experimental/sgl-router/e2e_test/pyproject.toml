# Pytest configuration for sgl-router e2e_test/.
# Lives next to conftest.py so `pytest experimental/sgl-router/e2e_test/`
# picks it up automatically.

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = [
    "chat_completions",
    "m4_acceptance",
]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
markers = [
    "real_gpu: requires at least one NVIDIA GPU (skipped on CPU-only hosts)",
    "pd_mode: requires the router started in PD-disaggregation mode",
    "slow: takes >30s (model load, multi-request convergence checks)",
]
log_cli = true
log_cli_level = "INFO"
log_cli_format = "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
log_cli_date_format = "%H:%M:%S"
