apiVersion: v1
kind: ServiceAccount
metadata:
  name: sgl-router
  namespace: sglang-pd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sgl-router
  namespace: sglang-pd
rules:
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sgl-router
  namespace: sglang-pd
subjects:
  - kind: ServiceAccount
    name: sgl-router
    namespace: sglang-pd
roleRef:
  kind: Role
  name: sgl-router
  apiGroup: rbac.authorization.k8s.io
