<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">4x100 2GiB bandwidth: portcap multi-HCA vs prior manual split</title>
  <desc id="desc">Prior split uses four manual 100G shards; portcap multi-HCA uses one logical foreground flow with capfill on each physical 200G port.</desc>
