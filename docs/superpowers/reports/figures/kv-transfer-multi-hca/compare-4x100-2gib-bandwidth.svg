<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">4x100 2GiB foreground bandwidth: split vs multi-HCA</title>
  <desc id="desc">p50 bandwidth_GBps from aggregated summaries; split uses four manual 100G shards, multi-HCA uses one logical foreground flow across four HCA names.</desc>
  <style>
    .title { font: 700 18px "Segoe UI", Arial, sans-serif; fill: #1F2430; }
    .subtitle { font: 400 12px "Segoe UI", Arial, sans-serif; fill: #6F768A; }
    .tick { font: 400 11px "Consolas", "Segoe UI", monospace; fill: #6F768A; }
    .axis-label { font: 600 12px "Segoe UI", Arial, sans-serif; fill: #1F2430; }
    .legend { font: 500 12px "Segoe UI", Arial, sans-serif; fill: #1F2430; }
  </style>
  <rect width="980" height="540" fill="#FCFCFD" />
  <rect x="92" y="118" width="840" height="344" fill="#FFFFFF" />
  <text x="92" y="24" class="title">4x100 2GiB foreground bandwidth: split vs multi-HCA</text>
  <text x="92" y="38" class="subtitle">p50 bandwidth_GBps from aggregated summaries; split uses four manual 100G shards, multi-HCA uses one logical foreground flow across</text>
<text x="92" y="55" class="subtitle">four HCA names.</text>
