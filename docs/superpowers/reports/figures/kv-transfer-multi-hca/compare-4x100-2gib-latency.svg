<circle cx="372.00" cy="325.95" r="4.5" fill="#F0986E" stroke="#804126" stroke-width="1.2"><title>multi-HCA single flow bg10: 92.195</title></circle>
<circle cx="652.00" cy="289.87" r="4.5" fill="#F0986E" stroke="#804126" stroke-width="1.2"><title>multi-HCA single flow bg50: 122.811</title></circle>
