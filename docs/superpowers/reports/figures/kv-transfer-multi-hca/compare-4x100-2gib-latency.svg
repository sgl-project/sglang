  <text x="18" y="290" class="axis-label" transform="rotate(-90 18 290)" text-anchor="middle">p50 latency ms (log)</text>
  <path d="M 92.00 420.65 L 372.00 408.65 L 652.00 334.75 L 932.00 132.26" fill="none" stroke="#2E4780" stroke-width="2.2"  />
<circle cx="92.00" cy="420.65" r="4.5" fill="#A3BEFA" stroke="#2E4780" stroke-width="1.2"><title>split 4 shards bg1: 43.444</title></circle>
<circle cx="372.00" cy="408.65" r="4.5" fill="#A3BEFA" stroke="#2E4780" stroke-width="1.2"><title>split 4 shards bg10: 47.794</title></circle>
