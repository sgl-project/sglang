<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">4x100 2GiB foreground p50 latency: split vs multi-HCA</title>
  <desc id="desc">p50 latency in milliseconds; y-axis uses a log scale so bg1/bg10/bg50/bg90 remain visible together.</desc>
  <style>
    .title { font: 700 18px "Segoe UI", Arial, sans-serif; fill: #1F2430; }
    .subtitle { font: 400 12px "Segoe UI", Arial, sans-serif; fill: #6F768A; }
    .tick { font: 400 11px "Consolas", "Segoe UI", monospace; fill: #6F768A; }
    .axis-label { font: 600 12px "Segoe UI", Arial, sans-serif; fill: #1F2430; }
    .legend { font: 500 12px "Segoe UI", Arial, sans-serif; fill: #1F2430; }
  </style>
  <rect width="980" height="540" fill="#FCFCFD" />
  <rect x="92" y="118" width="840" height="344" fill="#FFFFFF" />
  <text x="92" y="24" class="title">4x100 2GiB foreground p50 latency: split vs multi-HCA</text>
  <text x="92" y="38" class="subtitle">p50 latency in milliseconds; y-axis uses a log scale so bg1/bg10/bg50/bg90 remain visible together.</text>
  <line x1="92" x2="120" y1="78" y2="78" stroke="#2E4780" stroke-width="2.2"  />
<circle cx="106" cy="78" r="4.2" fill="#A3BEFA" stroke="#2E4780" stroke-width="1" />
<text x="128" y="82" class="legend">split 4 shards</text>
<line x1="242.2" x2="270.2" y1="78" y2="78" stroke="#804126" stroke-width="2.2" stroke-dasharray="7 4" />
<circle cx="256.2" cy="78" r="4.2" fill="#F0986E" stroke="#804126" stroke-width="1" />
<text x="278.2" y="82" class="legend">multi-HCA single flow</text>
  <line x1="92" x2="932" y1="431.05038721365594" y2="431.05038721365594" stroke="#E6E8F0" stroke-width="1" />
<text x="80" y="435.05038721365594" text-anchor="end" class="tick">40</text>
<line x1="92" x2="932" y1="343.81164528615943" y2="343.81164528615943" stroke="#E6E8F0" stroke-width="1" />
