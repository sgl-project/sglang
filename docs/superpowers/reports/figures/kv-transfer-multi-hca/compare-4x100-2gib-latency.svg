<line x1="92" x2="932" y1="169.3341614311663" y2="169.3341614311663" stroke="#E6E8F0" stroke-width="1" />
<text x="80" y="173.3341614311663" text-anchor="end" class="tick">320</text>
  <line x1="92" x2="92" y1="118" y2="462" stroke="#D7DBE7" stroke-width="1.2" />
  <line x1="92" x2="932" y1="462" y2="462" stroke="#D7DBE7" stroke-width="1.2" />
  <line x1="92" x2="92" y1="462" y2="468" stroke="#D7DBE7" />
<text x="92" y="490" text-anchor="middle" class="tick">bg1</text>
<line x1="372" x2="372" y1="462" y2="468" stroke="#D7DBE7" />
<text x="372" y="490" text-anchor="middle" class="tick">bg10</text>
<line x1="652" x2="652" y1="462" y2="468" stroke="#D7DBE7" />
