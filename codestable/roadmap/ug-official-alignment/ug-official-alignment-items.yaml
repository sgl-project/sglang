  - slug: ug-native-model-hardening
    description: 基于 parity 证据继续收敛 BAGEL/Qwen2-MoT native model path，清理临时 shell/observer 边界并补齐 loader/权重映射
    depends_on: [ug-entrypoint-official-smoke]
    status: done
    feature: 2026-04-30-ug-native-model-hardening
    minimal_loop: false
    notes: "完成：1) post-image U decode 改为 SRT-owned BAGEL decode loop，文本由 SRT tokenizer decode 后通过 SRT metadata 返回；2) BAGEL logical kv_len/rope 通过 UGSessionRuntime ug_model_state 保存和传播，BAGEL native helpers 在 text/image/denoise 前从 SRT-owned state resync；3) CFG text/img logical context、token_count、sidecar marker 也进入 ug_model_state，prepare_latents/predict_velocity 从 session view resync CFG state，同时 full KV length 仍来自 SRT token binding。CPU runtime+BAGEL 56 tests、adapter+diffusion 29 tests 均通过；远端 GPU2 真权重 Python entry smoke 输出 image+text，text 为 '<think>\\n'，stats 为 prefill_count=1、velocity_count=3、append_image_count=1、srt_u_decode_request_count=5。下一步进入 ug-single-card-batching-guards。"

