    notes: "完成单卡正确性 guard 收口：保留现有 scheduler/ScheduleBatch compatibility key 作为边界，新增测试证明 mixed ordinary causal + UG non-causal-query extend batch 在分配前早失败；新增带 sidecar 的两 UG session close/release 隔离测试，关闭一个 session 只释放 owner 和自己的 sidecar，另一个 session 可继续 prefill。远端 CPU test_ug_session_runtime.py 22 tests、test_ug_diffusion_pipeline.py 24 tests、test_prefill_adder.py 11 tests 通过；未触发 scheduler 重写、KV 暴露或 official runtime import stop signal。"

