    notes: "完成 VLM text/token parity 收口：root cause 是 SRT U decode 没按官方 BAGEL do_sample=False 走 greedy，而是沿用默认 sampling；修复后远端真权重 /tmp/ug-vlm-align-greedy 通过，official/SGLang token_ids 和 text 均为 Audrey Hepburn in a red。完整 logits parity 暂不要求。"

