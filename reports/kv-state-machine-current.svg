<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#e9eef7" stroke-width="1"/>
    </pattern>
    <linearGradient id="monitorGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1e5bff"/>
      <stop offset="100%" stop-color="#00a7c8"/>
    </linearGradient>
    <linearGradient id="selectedGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#eef7ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0b1f44" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#dc2626"/>
    </marker>
    <style>
      .bg { fill: #f8fbff; }
      .title { font: 700 38px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #10213f; }
      .subtitle { font: 500 18px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #49627f; }
      .label { font: 700 18px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #10213f; }
      .body { font: 500 16px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #34445f; }
      .small { font: 500 13px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #52647b; }
      .whiteLabel { font: 700 23px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #ffffff; }
      .whiteSmall { font: 500 15px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #e9f5ff; }
      .state { font: 700 18px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #0f2a4d; }
      .chipText { font: 700 13px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #ffffff; }
      .card { fill: #ffffff; stroke: #d8e2f0; stroke-width: 1.5; rx: 18; filter: url(#softShadow); }
      .node { fill: #ffffff; stroke: #d8e2f0; stroke-width: 1.5; rx: 16; }
      .nodeSelected { fill: url(#selectedGrad); stroke: #2563eb; stroke-width: 3; rx: 18; filter: url(#softShadow); }
      .lane { fill: #ffffff; stroke: #c9d8ea; stroke-width: 1.5; rx: 24; filter: url(#softShadow); }
      .processOk { fill: #ecfdf5; stroke: #16a34a; stroke-width: 1.8; rx: 14; }
      .processPartial { fill: #fffbeb; stroke: #f59e0b; stroke-width: 1.8; rx: 14; }
      .processBlock { fill: #fef2f2; stroke: #ef4444; stroke-width: 1.8; rx: 14; }
      .processGhost { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 8 6; rx: 14; }
      .metricLine { fill: none; stroke: #7b8ba3; stroke-width: 2; stroke-dasharray: 6 8; }
      .controlLine { fill: none; stroke: #f59e0b; stroke-width: 4; marker-end: url(#arrowAmber); }
      .blueLine { fill: none; stroke: #2563eb; stroke-width: 3.2; marker-end: url(#arrowBlue); }
      .amberLine { fill: none; stroke: #f59e0b; stroke-width: 3.2; stroke-dasharray: 9 7; marker-end: url(#arrowAmber); }
      .redLine { fill: none; stroke: #dc2626; stroke-width: 3; stroke-dasharray: 9 7; marker-end: url(#arrowRed); }
      .divider { stroke: #dbe6f3; stroke-width: 1.5; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="900"/>
  <rect x="0" y="0" width="1600" height="900" fill="url(#grid)" opacity="0.55"/>

  <text x="80" y="62" class="title">图 2：当前已实现部分与阻塞点</text>
  <text x="82" y="94" class="subtitle">沿用图 1 的同一条链路：绿色表示已接通，黄色表示骨架完成但需验证，红色表示当前缺口</text>

  <rect x="520" y="78" width="560" height="134" rx="26" fill="url(#monitorGrad)" filter="url(#softShadow)"/>
  <text x="565" y="126" class="whiteLabel">Monitor / Controller</text>
  <text x="565" y="160" class="whiteSmall">已实现：脚本触发、Controller 执行动作、状态查询</text>
  <text x="565" y="186" class="whiteSmall">未完全实现：自动 Monitor 闭环策略与生产化调参</text>

  <g opacity="0.9">
    <path class="metricLine" d="M205 248 C310 145 430 137 520 135"/>
    <path class="metricLine" d="M530 248 C590 185 630 168 700 212"/>
    <path class="metricLine" d="M910 248 C900 206 912 190 890 212"/>
    <path class="metricLine" d="M1205 248 C1135 164 1084 152 1080 145"/>
  </g>
  <path class="controlLine" d="M800 212 L800 282"/>

  <rect class="node" x="70" y="248" width="270" height="160"/>
  <text x="98" y="286" class="label">Node 0</text>
  <text x="98" y="314" class="body">Role: Prefill</text>
  <line class="divider" x1="98" y1="330" x2="312" y2="330"/>
  <text x="98" y="358" class="small">状态观测：已接入</text>
  <text x="98" y="382" class="small">runtime role：已接入</text>

  <rect class="node" x="390" y="248" width="270" height="160"/>
  <text x="418" y="286" class="label">Node 1</text>
  <text x="418" y="314" class="body">Role: Prefill</text>
  <line class="divider" x1="418" y1="330" x2="632" y2="330"/>
  <text x="418" y="358" class="small">状态观测：已接入</text>
  <text x="418" y="382" class="small">runtime role：已接入</text>

  <rect class="nodeSelected" x="710" y="238" width="370" height="180"/>
  <text x="740" y="278" class="label">Node 2：Source Decode</text>
  <text x="740" y="306" class="body">KV Flip StateMachine：已实现</text>
  <line class="divider" x1="740" y1="324" x2="1040" y2="324"/>
  <text x="740" y="354" class="small">PREPARING / FLIPPING：已接通</text>
  <text x="740" y="378" class="small">manifest / metadata：已接通</text>
  <text x="740" y="402" class="small">真实后端实测：待完成</text>

  <rect class="node" x="1200" y="248" width="270" height="160"/>
  <text x="1228" y="286" class="label">Node 3</text>
  <text x="1228" y="314" class="body">Role: Decode Target</text>
  <line class="divider" x1="1228" y1="330" x2="1442" y2="330"/>
  <text x="1228" y="358" class="small">target prepare：已接通</text>
  <text x="1228" y="382" class="small">adopt request：已接通</text>

  <path class="blueLine" d="M895 418 L895 472"/>

  <rect class="lane" x="80" y="470" width="1440" height="350"/>
  <text x="122" y="518" class="label">同一条状态链路上的实现进度</text>
  <text x="122" y="548" class="subtitle">现在的关键不是没有状态机，而是 MIGRATING 里的真实后端验证和客户端连续性还没有收口</text>

  <g>
    <rect class="processOk" x="135" y="586" width="160" height="62"/>
    <text x="176" y="612" class="state">SAFE</text>
    <text x="184" y="636" class="small">已实现</text>
    <path class="blueLine" d="M295 617 L360 617"/>

    <rect class="processOk" x="360" y="586" width="190" height="62"/>
    <text x="397" y="612" class="state">PREPARING</text>
    <text x="405" y="636" class="small">已实现</text>
    <path class="blueLine" d="M550 617 L615 617"/>

    <rect class="processPartial" x="615" y="586" width="190" height="62"/>
    <text x="658" y="612" class="state">MIGRATING</text>
    <text x="667" y="636" class="small">部分完成</text>
    <path class="amberLine" d="M805 617 L870 617"/>

    <rect class="processOk" x="870" y="586" width="180" height="62"/>
    <text x="916" y="612" class="state">FLIPPING</text>
    <text x="923" y="636" class="small">已实现</text>
    <path class="blueLine" d="M1050 617 L1115 617"/>

    <rect class="processOk" x="1115" y="586" width="210" height="62"/>
    <text x="1156" y="612" class="state">SAFE(新角色)</text>
    <text x="1186" y="636" class="small">已实现</text>
  </g>

  <g>
    <rect class="processOk" x="165" y="700" width="210" height="78"/>
    <text x="190" y="730" class="label">控制面</text>
    <text x="190" y="756" class="small">Router drain / refresh</text>
    <text x="190" y="776" class="small">Admission pause</text>

    <path class="blueLine" d="M375 739 L425 739"/>
    <rect class="processOk" x="425" y="700" width="270" height="78"/>
    <text x="450" y="730" class="label">Source 侧</text>
    <text x="450" y="756" class="small">manifest 导出</text>
    <text x="450" y="776" class="small">metadata buffer / sender</text>

    <path class="amberLine" d="M695 739 L745 739"/>
    <rect class="processBlock" x="745" y="700" width="250" height="78"/>
    <text x="770" y="730" class="label">真实 KV Backend</text>
    <text x="770" y="756" class="small">待 Linux/GPU 实测</text>
    <text x="770" y="776" class="small">失败清理待补强</text>

    <path class="redLine" d="M995 739 L1045 739"/>
    <rect class="processPartial" x="1045" y="700" width="300" height="78"/>
    <text x="1070" y="730" class="label">Target 侧</text>
    <text x="1070" y="756" class="small">prealloc / receiver / adopt 已接通</text>
    <text x="1070" y="776" class="small">客户端流连续性未实现</text>
  </g>

  <rect class="processGhost" x="1358" y="584" width="128" height="194"/>
  <text x="1381" y="620" class="label">下一步</text>
  <text x="1380" y="658" class="small">真实后端</text>
  <text x="1380" y="684" class="small">端到端测试</text>
  <text x="1380" y="724" class="small">资源释放</text>
  <text x="1380" y="750" class="small">流连续性</text>
</svg>
