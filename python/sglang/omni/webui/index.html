<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Omni Lab</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #eef3f1;
      --ink: #1b1d1f;
      --muted: #5d6864;
      --line: #c9d8d2;
      --panel: #fcfffd;
      --accent: #b24f35;
      --accent-2: #1d6b6b;
      --danger: #a13b3b;
      --shadow: 0 18px 44px rgba(19, 48, 43, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font: 15px/1.5 ui-serif, Georgia, "Times New Roman", serif;
    }

    button, input, textarea, select {
      font: inherit;
      color: inherit;
    }

    .shell {
      display: grid;
      grid-template-columns: minmax(320px, 380px) minmax(0, 1fr);
      gap: clamp(18px, 2.5vw, 34px);
      width: min(1440px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 34px 0;
    }

    .side-panel {
      align-self: start;
      display: grid;
      gap: 18px;
      position: sticky;
      top: 28px;
    }

    .side-header {
      border-top: 2px solid var(--ink);
      padding-top: 16px;
    }

    h1 {
      margin: 0;
      font-size: 44px;
      line-height: 1;
      font-weight: 500;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      line-height: 1.45;
    }

    .connection {
      display: grid;
      gap: 10px;
      border-block: 1px solid var(--line);
      padding: 13px 0;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .status,
    .model-strip {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }

    .model-strip {
      grid-template-columns: auto minmax(0, 1fr);
      align-items: baseline;
    }

    .model-strip span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .model-strip strong {
      color: #2b3532;
      font-size: 13px;
      font-weight: 750;
      word-break: break-word;
      text-align: right;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--danger);
      box-shadow: 0 0 0 5px rgba(161, 59, 59, 0.12);
    }

    .dot.ok {
      background: var(--accent-2);
      box-shadow: 0 0 0 5px rgba(35, 92, 86, 0.13);
    }

    .control {
      display: grid;
      gap: 8px;
    }

    .control-group {
      display: grid;
      gap: 12px;
      border-top: 1px solid var(--line);
      padding-top: 16px;
    }

    .control-group h3 {
      margin: 0;
      color: var(--muted);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    label {
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: #514c45;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    textarea, input, select {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 6px;
      padding: 11px 12px;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(0, 0, 0, 0.02);
    }

    textarea {
      min-height: 162px;
      resize: vertical;
    }

    textarea:focus, input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(157, 75, 47, 0.13);
    }

    .row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .checkline {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 12px 0 18px;
      color: var(--muted);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
    }

    .checkline input {
      width: 16px;
      height: 16px;
      accent-color: var(--accent-2);
    }

    .checkline.compact {
      margin: 0;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #edf4f1;
      padding: 4px;
    }

    button.segment-button {
      border-color: transparent;
      background: transparent;
      color: var(--muted);
      padding: 8px 12px;
      box-shadow: none;
    }

    button.segment-button.active {
      border-color: var(--ink);
      background: var(--ink);
      color: var(--paper);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .preset-actions,
    .side-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .render-actions {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .side-actions .warn {
      grid-column: 1 / -1;
    }

    button {
      border: 1px solid var(--ink);
      background: var(--ink);
      color: var(--paper);
      border-radius: 999px;
      padding: 10px 15px;
      cursor: pointer;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      font-weight: 750;
      transition: transform 160ms ease, background 160ms ease, color 160ms ease;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.55; cursor: wait; transform: none; }

    button.secondary {
      background: transparent;
      color: var(--ink);
    }

    button.warn {
      border-color: var(--danger);
      background: transparent;
      color: var(--danger);
    }

    .timeline {
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 68px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .timeline-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
      padding: 20px 22px;
      border-bottom: 1px solid var(--line);
      background: #f5faf7;
    }

    .timeline-head h2 {
      margin: 0;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 0;
    }

    .session {
      color: var(--muted);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 12px;
      word-break: break-all;
      text-align: right;
      max-width: 380px;
    }

    .feed {
      display: grid;
      gap: 0;
      padding: 0;
      overflow: auto;
      flex: 1;
    }

    .composer {
      border-top: 1px solid var(--line);
      background: #f5faf7;
      padding: 16px 18px 18px;
    }

    .composer textarea {
      min-height: 92px;
      max-height: 210px;
    }

    .composer-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: end;
      margin-top: 12px;
    }

    .composer-row .control {
      margin-bottom: 0;
    }

    .empty {
      padding: 42px 22px;
      color: var(--muted);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .turn {
      display: grid;
      grid-template-columns: 112px minmax(0, 1fr);
      border-bottom: 1px solid var(--line);
    }

    .turn.pending .turn-meta {
      color: var(--accent-2);
    }

    .turn-meta {
      padding: 18px 14px 18px 22px;
      border-right: 1px solid var(--line);
      color: var(--muted);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 12px;
      white-space: pre-line;
    }

    .turn-body {
      padding: 18px 22px 22px;
      display: grid;
      gap: 16px;
    }

    .prompt {
      white-space: pre-wrap;
      color: #403a34;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
    }

    .segment {
      border-top: 1px dashed var(--line);
      padding-top: 14px;
    }

    .segment:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    .tag {
      display: inline-flex;
      margin-bottom: 8px;
      border: 1px solid #c9bca9;
      border-radius: 999px;
      padding: 3px 8px;
      color: var(--accent-2);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .text {
      white-space: pre-wrap;
      font-size: 16px;
    }

    .thinking-trace {
      border-top: 1px dashed var(--line);
      padding-top: 12px;
      color: var(--muted);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 12px;
    }

    .thinking-trace summary {
      cursor: pointer;
      color: var(--accent-2);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .thinking-trace-text {
      max-height: 220px;
      overflow: auto;
      margin-top: 10px;
      border-left: 3px solid rgba(29, 107, 107, 0.28);
      background: #f6fbf7;
      padding: 10px 12px;
      white-space: pre-wrap;
      font: 12px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: #4f5f5a;
    }

    .image {
      display: block;
      width: min(100%, 560px);
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #eee6d8;
    }

    .image-placeholder {
      position: relative;
      display: grid;
      place-items: center;
      overflow: hidden;
      width: min(100%, 560px);
      min-height: 220px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background:
        linear-gradient(120deg, rgba(252, 255, 253, 0.96), rgba(229, 237, 233, 0.96)),
        repeating-linear-gradient(45deg, rgba(178, 79, 53, 0.08) 0 8px, rgba(29, 107, 107, 0.07) 8px 16px);
      color: var(--accent-2);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      font-weight: 750;
    }

    .image-placeholder::after {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.56), transparent);
      animation: imageSweep 1.4s ease-in-out infinite;
    }

    @keyframes imageSweep {
      100% { transform: translateX(100%); }
    }

    .error {
      color: var(--danger);
      white-space: pre-wrap;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
    }

    .pending-status {
      display: flex;
      align-items: center;
      gap: 12px;
      border-top: 1px dashed var(--line);
      padding-top: 14px;
      color: var(--accent-2);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      font-weight: 750;
    }

    .typing-dots {
      display: inline-grid;
      grid-template-columns: repeat(3, 6px);
      gap: 5px;
      align-items: center;
      min-width: 28px;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-2);
      opacity: 0.35;
      animation: typingPulse 1.15s ease-in-out infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 140ms; }
    .typing-dots span:nth-child(3) { animation-delay: 280ms; }

    @keyframes typingPulse {
      0%, 80%, 100% { opacity: 0.28; transform: translateY(0); }
      35% { opacity: 1; transform: translateY(-3px); }
    }

    @media (prefers-reduced-motion: reduce) {
      .typing-dots span {
        animation: none;
        opacity: 0.65;
      }

      .image-placeholder::after {
        animation: none;
      }
    }

    .raw {
      max-height: 240px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #f6fbf7;
      padding: 12px;
      font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: #33403b;
    }

    @media (max-width: 900px) {
      .shell { grid-template-columns: 1fr; }
      .side-panel { position: static; }
      h1 { font-size: 44px; }
      .timeline { min-height: 520px; }
      .turn { grid-template-columns: 1fr; }
      .turn-meta { border-right: 0; border-bottom: 1px solid var(--line); }
      .session { text-align: left; }
      .composer-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <aside class="side-panel">
      <header class="side-header">
        <h1>Omni Lab</h1>
        <p class="subtitle">Interleaved text-image conversations through SGLang /v1/omni/generate.</p>
      </header>

      <div class="connection">
        <div class="status">
          <span id="statusText">Checking backend</span>
          <span id="statusDot" class="dot"></span>
        </div>
        <div class="model-strip">
          <span>Model</span>
          <strong id="modelView">loading</strong>
        </div>
      </div>

      <div class="control-group">
        <h3>Request</h3>
        <div class="control">
          <label for="task">Task</label>
          <select id="task">
            <option value="interleave" selected>interleave</option>
            <option value="t2i">t2i</option>
            <option value="edit">edit</option>
            <option value="vlm">vlm</option>
          </select>
        </div>
        <div class="control">
          <label>Think Mode</label>
          <div class="segmented" role="group" aria-label="Think mode">
            <button class="segment-button" id="thinkOff" type="button">Off</button>
            <button class="segment-button active" id="thinkOn" type="button">On</button>
          </div>
          <input id="thinkMode" type="checkbox" checked hidden>
        </div>
        <div class="checkline compact">
          <input id="showThinkingTrace" type="checkbox" checked>
          <span>Show thinking trace</span>
        </div>
      </div>

      <div class="control-group">
        <h3>Multi-turn preset</h3>
        <div class="preset-actions">
          <button class="secondary" id="turn1">First image</button>
          <button class="secondary" id="turn2">Edit previous</button>
        </div>
      </div>

      <div class="control-group">
        <h3>Generation</h3>
        <div class="preset-actions render-actions">
          <button class="secondary" id="draftPreset">Draft</button>
          <button class="secondary" id="mediumPreset">Medium</button>
          <button class="secondary" id="qualityPreset">Quality</button>
        </div>

        <div class="row">
          <div class="control">
            <label for="width">Width</label>
            <input id="width" type="number" value="1024" min="128" max="1536" step="32">
          </div>
          <div class="control">
            <label for="height">Height</label>
            <input id="height" type="number" value="1024" min="128" max="1536" step="32">
          </div>
        </div>

        <div class="row">
          <div class="control">
            <label for="steps">Steps</label>
            <input id="steps" type="number" value="50" min="1" max="80">
          </div>
          <div class="control">
            <label for="seed">Seed</label>
            <input id="seed" type="number" value="223">
          </div>
        </div>

        <div class="row">
          <div class="control">
            <label for="cfgText">Text CFG</label>
            <input id="cfgText" type="number" value="4.0" min="0" max="12" step="0.1">
          </div>
          <div class="control">
            <label for="cfgImage">Image CFG</label>
            <input id="cfgImage" type="number" value="1.0" min="0" max="12" step="0.1">
          </div>
        </div>
      </div>

      <div class="control-group">
        <h3>Session</h3>
        <div class="checkline">
          <input id="usePreviousImage" type="checkbox">
          <span>Use previous image as input</span>
        </div>
        <div class="checkline">
          <input id="keepSession" type="checkbox">
          <span>Keep interleave session across turns</span>
        </div>
        <div class="side-actions">
          <button class="secondary" id="newChat">New chat</button>
          <button class="secondary" id="reset">Clear timeline</button>
          <button class="warn" id="closeSession">Close session</button>
        </div>
      </div>
    </aside>

    <section class="timeline">
      <div class="timeline-head">
        <h2>Conversation</h2>
        <div id="sessionView" class="session">session: none</div>
      </div>
      <div id="feed" class="feed">
        <div class="empty">No turns yet.</div>
      </div>
      <div class="composer">
        <div class="control">
          <label for="prompt">Message</label>
          <textarea id="prompt" placeholder="Ask U1 to generate, refine, or describe the current conversation."></textarea>
        </div>
        <div class="composer-row">
          <div class="control">
            <label for="imageInput">Optional input image</label>
            <input id="imageInput" type="file" accept="image/*">
          </div>
          <button id="send">Send</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const feed = $("feed");
    let requestModel = "sensenova-u1";
    let sessionId = "";
    let turnIndex = 0;
    let lastImagePayload = null;
    const activeImageObjectUrls = new Set();

    const prompts = {
      turn1: "Create one clean studio image of a matte cobalt-blue cube centered on a white tabletop, with a plain light-gray background. After the image, describe the cube color and table in one short sentence.",
      turn2: "Continue from the previous generated image. Edit it so the cube becomes bright red and add one glossy green sphere on its right. Keep the same tabletop, camera angle, and background, then explain exactly what changed."
    };

    const renderPresets = {
      draft: {width: "512", height: "512", steps: "12", cfgText: "1.0", cfgImage: "1.0"},
      medium: {width: "512", height: "512", steps: "24", cfgText: "1.0", cfgImage: "1.0"},
      quality: {width: "1024", height: "1024", steps: "50", cfgText: "4.0", cfgImage: "1.0"}
    };

    $("prompt").value = prompts.turn1;

    function setBusy(isBusy) {
      $("send").disabled = isBusy;
      $("newChat").disabled = isBusy;
      $("reset").disabled = isBusy;
      $("closeSession").disabled = isBusy;
    }

    function renderSessionView() {
      const turns = `${turnIndex} turn${turnIndex === 1 ? "" : "s"}`;
      $("sessionView").textContent = sessionId
        ? `session: ${sessionId}\n${turns}`
        : `session: none\n${turns}`;
    }

    function setSession(id) {
      sessionId = id || "";
      renderSessionView();
    }

    function applyRenderPreset(name) {
      const preset = renderPresets[name];
      $("width").value = preset.width;
      $("height").value = preset.height;
      $("steps").value = preset.steps;
      $("cfgText").value = preset.cfgText;
      $("cfgImage").value = preset.cfgImage;
    }

    function setThinkMode(enabled) {
      $("thinkMode").checked = Boolean(enabled);
      $("thinkOff").classList.toggle("active", !enabled);
      $("thinkOn").classList.toggle("active", Boolean(enabled));
    }

    function setStatus(ok, text) {
      $("statusText").textContent = text;
      $("statusDot").classList.toggle("ok", ok);
    }

    function releaseImageObjectUrl(objectUrl) {
      if (!objectUrl || !activeImageObjectUrls.has(objectUrl)) return;
      URL.revokeObjectURL(objectUrl);
      activeImageObjectUrls.delete(objectUrl);
    }

    window.addEventListener("pagehide", () => {
      for (const objectUrl of activeImageObjectUrls) {
        URL.revokeObjectURL(objectUrl);
      }
      activeImageObjectUrls.clear();
    });

    async function loadConfig() {
      try {
        const response = await fetch("/api/config");
        const config = await response.json();
        requestModel = config.request_model || requestModel;
        $("modelView").textContent = config.served_model || requestModel;
      } catch {
        $("modelView").textContent = requestModel;
      }
    }

    async function checkHealth() {
      try {
        const response = await fetch("/api/health");
        if (response.ok) {
          setStatus(true, "Backend is reachable");
          return;
        }
        const text = await response.text();
        let detail = text;
        try {
          detail = JSON.parse(text).error || text;
        } catch {
          detail = text;
        }
        setStatus(false, detail ? `Backend offline: ${detail}` : `Backend health ${response.status}`);
      } catch (error) {
        setStatus(false, `Backend offline: ${error.message}`);
      }
    }

    function ensureFeed() {
      const empty = feed.querySelector(".empty");
      if (empty) empty.remove();
    }

    function makeEl(tag, className, text) {
      const el = document.createElement(tag);
      if (className) el.className = className;
      if (text !== undefined) el.textContent = text;
      return el;
    }

    function appendTurnShell(prompt, payload) {
      ensureFeed();
      turnIndex += 1;
      renderSessionView();
      const turn = makeEl("article", "turn");
      const meta = makeEl(
        "div",
        "turn-meta",
        `turn ${turnIndex}\n${payload.task || "request"}\nthink ${payload.think ? "on" : "off"}`
      );
      const body = makeEl("div", "turn-body");
      body.appendChild(makeEl("div", "prompt", prompt));
      turn.append(meta, body);
      feed.append(turn);
      turn.scrollIntoView({block: "end", behavior: "smooth"});
      return {turn, body, payload};
    }

    function renderTurnBody(body, prompt, data, error) {
      const nodes = [makeEl("div", "prompt", prompt)];
      if (error) {
        nodes.push(makeEl("div", "error", error));
      } else {
        for (const segment of data.segments || []) {
          const rendered = renderSegment(segment);
          if (rendered) nodes.push(rendered);
        }
        const raw = makeEl("pre", "raw", JSON.stringify({
          session: data.session || null,
          stats: data.stats || null,
          metadata: data.metadata || null
        }, null, 2));
        nodes.push(raw);
      }
      body.replaceChildren(...nodes);
    }

    function appendTurn(prompt, payload, data, error) {
      const pending = appendTurnShell(prompt, payload);
      renderTurnBody(pending.body, prompt, data, error);
    }

    function appendPendingTurn(prompt, payload) {
      const pending = appendTurnShell(prompt, payload);
      pending.turn.classList.add("pending");
      pending.segments = new Map();
      pending.thinkingRaw = "";
      pending.thinkingTrace = null;
      pending.status = renderPendingStatus("Generating");
      pending.body.appendChild(pending.status);
      return pending;
    }

    function completePendingTurn(pending, prompt, data, error) {
      pending.turn.classList.remove("pending");
      renderTurnBody(pending.body, prompt, data, error);
      pending.turn.scrollIntoView({block: "end", behavior: "smooth"});
    }

    function renderPendingStatus(text) {
      const status = makeEl("div", "pending-status");
      status.setAttribute("aria-live", "polite");
      const dots = makeEl("span", "typing-dots");
      dots.setAttribute("aria-hidden", "true");
      dots.append(makeEl("span"), makeEl("span"), makeEl("span"));
      status.append(dots, makeEl("span", "pending-text", text || "Generating"));
      return status;
    }

    function setPendingStatus(pending, text) {
      const label = pending.status?.querySelector(".pending-text");
      if (label) label.textContent = text;
    }

    function shouldShowThinkingTrace() {
      return Boolean($("showThinkingTrace")?.checked);
    }

    function normalizeThinkingTrace(rawText) {
      return String(rawText || "")
        .replace(/<\/?think>/g, "")
        .replace(/<image(\d+)>/g, "\n[image boundary $1]\n")
        .replace(/\n{3,}/g, "\n\n")
        .trimStart();
    }

    function ensureThinkingTrace(pending) {
      if (pending.thinkingTrace) return pending.thinkingTrace;
      const wrap = document.createElement("details");
      wrap.className = "thinking-trace";
      wrap.open = true;
      wrap.appendChild(makeEl("summary", "", "Thinking trace"));
      const content = makeEl("div", "thinking-trace-text", "");
      wrap.appendChild(content);
      pending.thinkingTrace = {wrap, content};
      pending.body.insertBefore(wrap, pending.status || null);
      return pending.thinkingTrace;
    }

    function appendThinkingTrace(pending, delta) {
      pending.thinkingRaw = `${pending.thinkingRaw || ""}${delta || ""}`;
      if (!shouldShowThinkingTrace()) return;
      const trace = ensureThinkingTrace(pending);
      trace.content.textContent = normalizeThinkingTrace(pending.thinkingRaw);
      trace.content.scrollTop = trace.content.scrollHeight;
    }

    function renderSegment(segment) {
      if (segment?.metadata?.role === "think") {
        return null;
      }
      if (segment?.type === "text" && !(segment.text || "").trim()) {
        return null;
      }
      const wrap = makeEl("div", "segment");
      wrap.appendChild(makeEl("span", "tag", segment.type || "unknown"));
      if (segment.type === "text") {
        wrap.appendChild(makeEl("div", "text", segment.text || ""));
      } else if (segment.type === "image") {
        rememberGeneratedImage(segment.image || {});
        wrap.appendChild(renderImage(segment.image || {}));
      } else {
        wrap.appendChild(makeEl("pre", "raw", JSON.stringify(segment, null, 2)));
      }
      return wrap;
    }

    function rememberGeneratedImage(image) {
      const b64Json = image?.b64_json || image?.base64 || "";
      if (!b64Json) {
        return;
      }
      lastImagePayload = {
        b64_json: b64Json,
        mime_type: image.mime_type || "image/png"
      };
    }

    function imagePayloadToSource(image) {
      if (image?.url) {
        return {src: image.url, fallbackSrc: "", objectUrl: null};
      }
      let b64Json = image?.b64_json || image?.base64 || "";
      if (!b64Json) {
        return {src: "", fallbackSrc: "", objectUrl: null};
      }
      let mimeType = image.mime_type || "image/png";
      const dataUrlMatch = /^data:([^;,]+)?;base64,/.exec(b64Json);
      if (dataUrlMatch) {
        mimeType = dataUrlMatch[1] || mimeType;
        b64Json = b64Json.slice(dataUrlMatch[0].length);
      }
      b64Json = String(b64Json || "").replace(/\s/g, "");
      const dataUrl = `data:${mimeType};base64,${b64Json}`;
      const blob = base64ToBlob(b64Json, mimeType);
      const objectUrl = URL.createObjectURL(blob);
      activeImageObjectUrls.add(objectUrl);
      return {src: dataUrl, fallbackSrc: objectUrl, objectUrl};
    }

    function base64ToBlob(b64Json, mimeType) {
      const binary = atob(String(b64Json || ""));
      const chunks = [];
      for (let offset = 0; offset < binary.length; offset += 8192) {
        const slice = binary.slice(offset, offset + 8192);
        const bytes = new Uint8Array(slice.length);
        for (let index = 0; index < slice.length; index += 1) {
          bytes[index] = slice.charCodeAt(index);
        }
        chunks.push(bytes);
      }
      return new Blob(chunks, {type: mimeType || "image/png"});
    }

    function previousImageSegment() {
      if (!lastImagePayload) return null;
      return {
        type: "image",
        image: {...lastImagePayload}
      };
    }

    function renderImage(image) {
      const img = document.createElement("img");
      img.className = "image";
      img.alt = "generated image";
      try {
        const source = imagePayloadToSource(image || {});
        if (source.objectUrl) {
          img.dataset.objectUrl = source.objectUrl;
        }
        if (source.fallbackSrc) {
          img.dataset.fallbackSrc = source.fallbackSrc;
        }
        img.src = source.src;
      } catch (error) {
        return makeEl("div", "error", `Image render failed: ${error.message}`);
      }
      img.addEventListener("load", () => {
        const objectUrl = img.dataset.objectUrl;
        if (objectUrl && img.currentSrc !== objectUrl) {
          releaseImageObjectUrl(objectUrl);
          delete img.dataset.objectUrl;
        }
      });
      img.addEventListener("error", () => {
        const fallbackSrc = img.dataset.fallbackSrc;
        if (fallbackSrc && img.src !== fallbackSrc) {
          delete img.dataset.fallbackSrc;
          img.src = fallbackSrc;
          return;
        }
        const objectUrl = img.dataset.objectUrl;
        releaseImageObjectUrl(objectUrl);
        img.replaceWith(makeEl("div", "error", "Image load failed"));
      });
      return img;
    }

    function renderImagePlaceholder(payload) {
      const placeholder = makeEl("div", "image-placeholder", "Generating image");
      const params = payload.sampling_params || {};
      const width = Number(params.width || 1);
      const height = Number(params.height || 1);
      placeholder.style.aspectRatio = `${width} / ${height}`;
      return placeholder;
    }

    function getLiveSegment(pending, segmentId, type) {
      if (pending.segments.has(segmentId)) {
        return pending.segments.get(segmentId);
      }
      const wrap = makeEl("div", "segment");
      wrap.appendChild(makeEl("span", "tag", type));
      const entry = {wrap, type};
      if (type === "text") {
        entry.content = makeEl("div", "text", "");
        wrap.appendChild(entry.content);
      } else if (type === "image") {
        entry.content = renderImagePlaceholder(pending.payload || {});
        wrap.appendChild(entry.content);
      }
      pending.segments.set(segmentId, entry);
      pending.body.insertBefore(wrap, pending.status || null);
      return entry;
    }

    function appendRawSummary(pending, event) {
      const raw = makeEl("pre", "raw", JSON.stringify({
        session: event.session || null,
        stats: event.stats || null,
        metadata: event.metadata || null
      }, null, 2));
      pending.body.appendChild(raw);
    }

    function finishPendingStream(pending) {
      pending.turn.classList.remove("pending");
      pending.status?.remove();
      pending.status = null;
      pending.turn.scrollIntoView({block: "end", behavior: "smooth"});
    }

    function appendStreamError(pending, message) {
      pending.body.insertBefore(makeEl("div", "error", message), pending.status || null);
      finishPendingStream(pending);
    }

    function handleStreamEvent(pending, event) {
      if (event.type === "text_delta") {
        const role = event.metadata?.role || "";
        if (role === "think") {
          appendThinkingTrace(pending, event.delta || "");
          setPendingStatus(pending, "Thinking");
          return;
        }
        const segmentId = event.segment_id || "seg-text";
        if (!(event.delta || "").trim() && !pending.segments.has(segmentId)) {
          setPendingStatus(pending, "Writing");
          return;
        }
        const entry = getLiveSegment(
          pending,
          segmentId,
          "text"
        );
        entry.content.textContent += event.delta || "";
        setPendingStatus(pending, "Writing");
      } else if (event.type === "text_end") {
        setPendingStatus(
          pending,
          event.metadata?.role === "think" ? "Thinking" : "Generating"
        );
      } else if (event.type === "image_start") {
        getLiveSegment(pending, event.segment_id || "seg-image", "image");
        setPendingStatus(pending, "Generating image");
      } else if (event.type === "image") {
        const entry = getLiveSegment(pending, event.segment_id || "seg-image", "image");
        rememberGeneratedImage(event.image || {});
        entry.content.replaceWith(renderImage(event.image || {}));
        entry.content = entry.wrap.querySelector(".image");
        setPendingStatus(pending, "Finishing");
      } else if (event.type === "done") {
        if (event.session && event.session.id) setSession(event.session.id);
        finishPendingStream(pending);
        appendRawSummary(pending, event);
      } else if (event.type === "error") {
        appendStreamError(pending, event.error?.message || "Generation failed");
      }
    }

    function fileAsImageSegment(file) {
      return new Promise((resolve, reject) => {
        if (!file) {
          resolve(null);
          return;
        }
        const reader = new FileReader();
        reader.onload = () => {
          const result = String(reader.result || "");
          const comma = result.indexOf(",");
          resolve({
            type: "image",
            image: {
              b64_json: comma >= 0 ? result.slice(comma + 1) : result,
              mime_type: file.type || "image/png"
            }
          });
        };
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
      });
    }

    async function buildPayload() {
      const prompt = $("prompt").value.trim();
      if (!prompt) {
        throw new Error("Message is required");
      }
      const task = $("task").value;
      const uploadedImageSegment = await fileAsImageSegment($("imageInput").files[0]);
      const imageSegment =
        uploadedImageSegment ||
        (task !== "t2i" && $("usePreviousImage").checked
          ? previousImageSegment()
          : null);
      if (task === "edit" && !imageSegment) {
        throw new Error("Edit requires an uploaded image or a previous generated image");
      }
      const messages = [];
      if (imageSegment) messages.push(imageSegment);
      messages.push({type: "text", text: prompt});

      const payload = {
        model: requestModel,
        task,
        think: $("thinkMode").checked,
        stream: true,
        messages,
        sampling_params: {
          width: Number($("width").value),
          height: Number($("height").value),
          num_steps: Number($("steps").value),
          seed: Number($("seed").value),
          cfg_text_scale: Number($("cfgText").value),
          cfg_img_scale: Number($("cfgImage").value),
          cfg_interval: [0.0, 1.0],
          cfg_renorm_type: "none",
          timestep_shift: 3.0,
          t_eps: 0.02
        },
        max_images: 1,
        max_text_segments: task === "interleave" ? 3 : 0
      };

      if (task === "interleave" && sessionId) {
        payload.session_id = sessionId;
      } else if (task === "interleave" && $("keepSession").checked) {
        payload.keep_session = true;
      }
      return {payload, prompt};
    }

    async function consumeEventStream(response, pending) {
      if (!response.body) {
        throw new Error("Streaming response is not readable");
      }
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      let sawDone = false;
      while (true) {
        const {value, done} = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, {stream: true});
        let boundary = buffer.indexOf("\n\n");
        while (boundary >= 0) {
          const frame = buffer.slice(0, boundary).replace(/\r/g, "");
          buffer = buffer.slice(boundary + 2);
          const data = frame
            .split("\n")
            .filter((line) => line.startsWith("data:"))
            .map((line) => line.slice(5).trimStart())
            .join("\n");
          if (data === "[DONE]") {
            sawDone = true;
          } else if (data) {
            const event = JSON.parse(data);
            handleStreamEvent(pending, event);
            if (event.type === "done" || event.type === "error") {
              sawDone = true;
            }
          }
          boundary = buffer.indexOf("\n\n");
        }
      }
      if (!sawDone) {
        finishPendingStream(pending);
      }
    }

    async function send() {
      setBusy(true);
      let payload;
      let prompt;
      let pending;
      try {
        ({payload, prompt} = await buildPayload());
        pending = appendPendingTurn(prompt, payload);
        const response = await fetch("/api/omni/generate", {
          method: "POST",
          headers: {"content-type": "application/json"},
          body: JSON.stringify(payload)
        });
        if (
          response.ok &&
          response.body &&
          (response.headers.get("content-type") || "").includes("text/event-stream")
        ) {
          await consumeEventStream(response, pending);
          return;
        }
        const text = await response.text();
        let data;
        try {
          data = JSON.parse(text);
        } catch {
          data = {raw: text};
        }
        if (!response.ok) {
          completePendingTurn(pending, prompt, data, JSON.stringify(data, null, 2));
          return;
        }
        if (data.session && data.session.id) setSession(data.session.id);
        completePendingTurn(pending, prompt, data, "");
      } catch (error) {
        const errorPrompt = prompt || $("prompt").value.trim() || "(empty message)";
        if (pending) {
          completePendingTurn(pending, errorPrompt, null, error.message);
        } else {
          appendTurn(
            errorPrompt,
            payload || {task: $("task").value},
            null,
            error.message
          );
        }
      } finally {
        setBusy(false);
        checkHealth();
      }
    }

    async function closeCurrentSession() {
      if (!sessionId) return;
      await fetch("/api/omni/close", {
        method: "POST",
        headers: {"content-type": "application/json"},
        body: JSON.stringify({session_id: sessionId})
      });
      setSession("");
    }

    async function closeSession() {
      setBusy(true);
      try {
        await closeCurrentSession();
      } finally {
        setBusy(false);
      }
    }

    async function newChat() {
      setBusy(true);
      try {
        await closeCurrentSession();
        setSession("");
        turnIndex = 0;
        lastImagePayload = null;
        renderSessionView();
        $("prompt").value = "";
        $("imageInput").value = "";
        feed.innerHTML = '<div class="empty">New chat.</div>';
      } finally {
        setBusy(false);
      }
    }

    $("send").addEventListener("click", send);
    $("draftPreset").addEventListener("click", () => applyRenderPreset("draft"));
    $("mediumPreset").addEventListener("click", () => applyRenderPreset("medium"));
    $("qualityPreset").addEventListener("click", () => applyRenderPreset("quality"));
    $("thinkOff").addEventListener("click", () => setThinkMode(false));
    $("thinkOn").addEventListener("click", () => setThinkMode(true));
    $("newChat").addEventListener("click", newChat);
    $("closeSession").addEventListener("click", closeSession);
    $("reset").addEventListener("click", () => {
      turnIndex = 0;
      lastImagePayload = null;
      renderSessionView();
      feed.innerHTML = '<div class="empty">Timeline cleared.</div>';
    });
    $("turn1").addEventListener("click", () => {
      $("task").value = "t2i";
      setThinkMode(false);
      $("usePreviousImage").checked = false;
      $("keepSession").checked = false;
      $("prompt").value = prompts.turn1;
      $("seed").value = "223";
    });
    $("turn2").addEventListener("click", () => {
      $("task").value = "edit";
      setThinkMode(false);
      $("usePreviousImage").checked = true;
      $("keepSession").checked = false;
      $("prompt").value = prompts.turn2;
      $("seed").value = "224";
    });
    $("prompt").addEventListener("keydown", (event) => {
      if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
        event.preventDefault();
        if (!$("send").disabled) send();
      }
    });

    renderSessionView();
    setThinkMode($("thinkMode").checked);
    loadConfig();
    checkHealth();
    setInterval(checkHealth, 10000);
  </script>
</body>
</html>
