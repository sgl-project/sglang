[build-system]
requires = ["setuptools>=61.0", "setuptools-rust>=1.10", "setuptools-scm>=8.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sglang"
dynamic = ["version"]
description = "SGLang is a fast serving framework for large language models and vision language models."
readme = "README.md"
requires-python = ">=3.10"
license = { file = "LICENSE" }
classifiers = [
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: Apache Software License",
]
# Please keep dependency lists in this file sorted alphabetically by package name.
dependencies = ["aiohttp", "IPython", "numpy", "requests", "setproctitle", "tqdm"]

[project.optional-dependencies]
runtime_common = [
  "aiohttp",
  "anthropic>=0.20.0",
  "apache-tvm-ffi",
  "av",
  "blobfile==3.0.0",
  "build",
  "compressed-tensors",
  "datasets",
  "easydict",
  "einops",
  "fastapi",
  "gguf",
  "helion==0.2.6",
  "interegular",
  "IPython",
  "llguidance>=1.7.6,<2.0.0",
  "mistral_common>=1.11.5",
  "modelscope",
  "msgspec",
  "ninja",
  "numpy",
  "openai==2.6.1",
  "openai-harmony==0.0.4",
  "orjson",
  "outlines==0.1.11",
  "packaging",
  "partial_json_parser",
  "pillow",
  "prometheus-client>=0.20.0",
  "psutil",
  "py-spy",
  "pybase64",
  "pydantic",
  "python-multipart",
  "pyzmq>=25.1.2",
  "requests",
  "scipy",
  "sentencepiece",
  "setproctitle",
  "smg-grpc-servicer>=0.5.0",
  "soundfile==0.13.1",
  "tiktoken",
  "timm==1.0.16",
  "torchao==0.9.0",
  "tqdm",
  "transformers==5.12.1",
  "uvicorn",
  "uvloop",
  "xgrammar==0.2.1",
]

diffusion_common = [
  "addict",
  "cloudpickle",
  "diffusers==0.37.0",
  "imageio==2.36.0",
  "imageio-ffmpeg==0.5.1",
  "moviepy>=2.0.0",
  "opencv-python-headless==4.10.0.84",
  "PyYAML==6.0.1",
  "remote-pdb",
  "scikit-image==0.25.2",
  "trimesh>=4.0.0",
  "xatlas",
]

tracing = [
  "opentelemetry-api",
  "opentelemetry-exporter-otlp",
  "opentelemetry-exporter-otlp-proto-grpc",
  "opentelemetry-sdk",
]

# HIP (Heterogeneous-computing Interface for Portability) for AMD
# => base docker rocm/vllm-dev:20250114, not from public vllm whl
srt_hip = [
  # Pin to 0.15.0: 0.16.0 needs torch>=2.10 (incompatible with ROCm torch
  # 2.9.1). An open-ended `<0.16.0` made pip backtrack into an unbuildable
  # ancient setuptools sdist; an exact pin keeps the resolver converging.
  "compressed-tensors==0.15.0",
  "petit_kernel==0.0.2",
  "sglang[runtime_common]",
  "torch",
  "wave-lang==3.8.2",
]

diffusion_hip = [
  "cache-dit==1.3.0",
  "peft>=0.18.0,<0.19.0", # Pin to <0.19.0 due to torchao incompatibility
  "runai_model_streamer>=0.15.5",
  "sglang[diffusion_common]",
  "st_attn==0.0.7",
  "vsa==0.0.4",
]

# For Intel Gaudi(device : hpu) follow the installation guide
# https://docs.vllm.ai/en/latest/getting_started/gaudi-installation.html
srt_hpu = ["sglang[runtime_common]"]

# https://docs.sglang.io/platforms/mthreads_gpu.md
srt_musa = [
  "deep-gemm>=0.1.3",
  "flash_attn_3>=0.1.4",
  "mate>=0.2.0",
  "mthreads-ml-py",
  "numpy<2.0",
  "sglang[runtime_common]",
  "torch",
  "torch_musa",
  "torchada>=0.1.74",
]

diffusion_musa = [
  "cache-dit==1.1.8",
  "runai_model_streamer>=0.15.5",
  "sglang[diffusion_common]",
  "st_attn==0.0.7",
  "vsa==0.0.4",
]

# https://docs.sglang.io/platforms/mps.md
srt_mps = [
    "mlx",
    "mlx-lm",
    "sglang[runtime_common]",
    "torch==2.11.0",
    "torchao==0.9.0",
    "torchaudio==2.11.0",
    "torchvision",
]

diffusion_mps = [
  "addict==2.4.0",
  "av==16.1.0",
  "cache-dit==1.2.3",
  "cloudpickle==3.1.2",
  "remote-pdb==2.1.0",
  "scikit-image==0.25.2",
  "sglang[diffusion_common]",
  "trimesh>=4.0.0",
  "xatlas",
]

test = [
  "accelerate",
  "pymupdf",
  "expecttest",
  "gguf",
  "jsonlines",
  "matplotlib",
  "pandas",
  "peft>=0.18.0,<0.19.0", # Pin to <0.19.0 due to torchao incompatibility
  "pytest",
  "sentence_transformers",
  "tabulate",
]

all_hip = ["sglang[diffusion_hip]", "sglang[srt_hip]", "sglang[tracing]"]
all_hpu = ["sglang[srt_hpu]"]
all_musa = ["sglang[diffusion_musa]", "sglang[srt_musa]"]
all_mps = ["sglang[diffusion_mps]", "sglang[srt_mps]"]

dev_hip = ["sglang[all_hip]", "sglang[test]"]
dev_hpu = ["sglang[all_hpu]", "sglang[test]"]
dev_musa = ["sglang[all_musa]", "sglang[test]"]
dev_mps = ["sglang[all_mps]", "sglang[test]"]

[project.urls]
"Homepage" = "https://github.com/sgl-project/sglang"
"Bug Tracker" = "https://github.com/sgl-project/sglang/issues"

[project.scripts]
sglang = "sglang.cli.main:main"

# Rust-accelerated multimodal preprocessing (sglang.srt.multimodal._core).
# grpc is intentionally omitted here (it needs proto/tonic); ROCm only builds mm.
[[tool.setuptools-rust.ext-modules]]
target = "sglang.srt.multimodal._core"
path = "../rust/sglang-mm/Cargo.toml"
binding = "PyO3"

[tool.setuptools.package-data]
"sglang" = [
  "srt/**/*",
  "kernels/**/*"
]

[tool.setuptools.packages.find]
exclude = [
  "assets*",
  "benchmark*",
  "docs*",
  "dist*",
  "playground*",
  "scripts*",
  "tests*",
  "build*",
]

[tool.wheel]
exclude = [
  "assets*",
  "benchmark*",
  "docs*",
  "dist*",
  "playground*",
  "scripts*",
  "tests*",
]

[tool.setuptools_scm]
root = ".."
version_file = "sglang/_version.py"
git_describe_command = ["python3", "python/tools/get_version_tag.py"]
# Allow editable installs even when .git metadata is not available.
fallback_version = "0.0.0.dev0"
